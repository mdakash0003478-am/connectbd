<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConnectBD - Private Friend Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #eaf3f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 2rem;
            max-width: 1100px;
            width: 100%;
            box-shadow: 0 30px 60px -20px rgba(0, 20, 40, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(60, 130, 180, 0.15);
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            padding: 4px;
            border: 2px solid rgba(255, 255, 255, 0.9);
        }

        .app-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0b2b40;
        }

        .app-title span {
            color: #1976D2;
        }

        .app-title small {
            font-size: 0.8rem;
            font-weight: 400;
            color: #3b5c6e;
            display: block;
            margin-top: -4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.6);
            padding: 6px 16px 6px 10px;
            border-radius: 40px;
            border: 1px solid rgba(200, 215, 225, 0.5);
        }

        .user-profile-mini img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .user-profile-mini .user-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #0b2b40;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .header-btn {
            background: transparent;
            border: 1px solid #b6ccdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2f536b;
            cursor: pointer;
            transition: 0.15s;
        }

        .header-btn:hover {
            background: #e6eef5;
            border-color: #7f9bb3;
        }

        .header-btn.primary {
            background: #1976D2;
            border-color: #1976D2;
            color: white;
        }

        .header-btn.primary:hover {
            background: #1565C0;
        }

        .header-btn.danger {
            background: #d32f2f;
            border-color: #d32f2f;
            color: white;
        }

        .header-btn.danger:hover {
            background: #b71c1c;
        }

        .main-content {
            display: flex;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
            padding-top: 1.2rem;
        }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            max-height: 550px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-section {
            margin-bottom: 1rem;
        }

        .sidebar-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #53768b;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-count {
            background: #1976D2;
            color: white;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            margin-bottom: 4px;
        }

        .friend-item:hover {
            background: rgba(25, 118, 210, 0.08);
        }

        .friend-item.active {
            background: rgba(25, 118, 210, 0.15);
            font-weight: 600;
        }

        .friend-item img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .friend-item .friend-name {
            flex: 1;
            font-size: 0.9rem;
            color: #1f4c66;
        }

        .friend-item .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
        }

        .friend-item .status-dot.offline {
            background: #bdbdbd;
        }

        .request-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        .request-item img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .request-item .req-name {
            flex: 1;
            color: #1f4c66;
        }

        .request-item .req-actions {
            display: flex;
            gap: 6px;
        }

        .request-item .req-actions button {
            padding: 2px 10px;
            border: none;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-accept {
            background: #4caf50;
            color: white;
        }

        .btn-accept:hover {
            background: #388e3c;
        }

        .btn-reject {
            background: #ef5350;
            color: white;
        }

        .btn-reject:hover {
            background: #c62828;
        }

        .search-box {
            width: 100%;
            padding: 6px 12px;
            border: 1px solid #dce3e9;
            border-radius: 20px;
            font-size: 0.8rem;
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .search-box:focus {
            border-color: #1976D2;
        }

        .friend-list-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .friend-list-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .friend-list-scroll::-webkit-scrollbar-thumb {
            background: #b6ccdd;
            border-radius: 10px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(60, 130, 180, 0.1);
        }

        .chat-header .chat-friend-name {
            font-weight: 600;
            color: #0b2b40;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .chat-friend-name img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header .chat-status {
            font-size: 0.75rem;
            color: #53768b;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 4px;
            margin: 8px 0;
            max-height: 380px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid white;
        }

        .message .msg-bubble {
            background: white;
            padding: 10px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            word-wrap: break-word;
            flex: 1;
        }

        .message.own .msg-bubble {
            background: #1976D2;
            color: white;
            border-top-left-radius: 18px;
            border-top-right-radius: 4px;
        }

        .message .msg-sender {
            font-size: 0.7rem;
            font-weight: 600;
            color: #1976D2;
            margin-bottom: 2px;
        }

        .message.own .msg-sender {
            color: #bbdefb;
        }

        .message .msg-text {
            font-size: 0.92rem;
            line-height: 1.4;
        }

        .message .msg-time {
            font-size: 0.6rem;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .message.own .msg-time {
            color: #bbdefb;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(60, 130, 180, 0.1);
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #dce3e9;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            transition: 0.15s;
        }

        .input-area input:focus {
            border-color: #1976D2;
            background: white;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.08);
        }

        .input-area input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-area button {
            padding: 10px 24px;
            border: none;
            background: #1976D2;
            color: white;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
        }

        .input-area button:hover:not(:disabled) {
            background: #1565C0;
            transform: scale(1.02);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            color: #53768b;
            padding: 40px 0;
            font-size: 0.9rem;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e7e34;
            color: white;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: #d32f2f;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 1.2rem;
            }
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 200px;
            }
            .friend-list-scroll {
                max-height: 100px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-right {
                justify-content: space-between;
            }
            .messages-container {
                max-height: 250px;
                min-height: 180px;
            }
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 1rem;
                border-radius: 28px;
            }
            .app-title {
                font-size: 1.2rem;
            }
            .message {
                max-width: 95%;
            }
            .sidebar {
                max-height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-left">
                <img src="https://raw.githubusercontent.com/mdakash0003478-am/connectbd/main/logo.png.jpeg" alt="ConnectBD" class="app-logo" onerror="this.style.display='none'" />
                <div class="app-title">
                    Connect<span>BD</span>
                    <small>প্রাইভেট চ্যাট</small>
                </div>
            </div>
            <div class="header-right">
                <div id="userProfileMini" class="user-profile-mini" style="display: none;">
                    <img id="miniAvatar" src="" alt="avatar" />
                    <span class="user-name" id="miniName">User</span>
                </div>
                <button id="loginBtn" class="header-btn primary">🔑 লগইন</button>
                <button id="logoutBtn" class="header-btn danger" style="display: none;">সাইন আউট</button>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">
                        👥 বন্ধুরা
                        <span class="badge-count" id="friendCount">0</span>
                    </div>
                    <input type="text" class="search-box" id="searchFriend" placeholder="🔍 বন্ধু খুঁজুন..." />
                    <div class="friend-list-scroll" id="friendList">
                        <div class="empty-state" style="padding: 20px 0; font-size: 0.8rem;">
                            <div class="icon">👤</div>
                            কোনো বন্ধু নেই
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">
                        📨 রিকোয়েস্ট
                        <span class="badge-count" id="requestCount">0</span>
                    </div>
                    <div id="requestList">
                        <div style="color: #53768b; font-size: 0.8rem; padding: 4px 0;">কোনো রিকোয়েস্ট নেই</div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">🔍 ইউজার খুঁজুন</div>
                    <div style="display: flex; gap: 6px;">
                        <input type="text" id="searchUser" class="search-box" placeholder="ইমেইল বা নাম..." style="margin-bottom: 0;" />
                        <button id="searchUserBtn" class="header-btn" style="font-size: 0.7rem; padding: 6px 12px;">খুঁজুন</button>
                    </div>
                    <div id="searchResults" style="margin-top: 6px; font-size: 0.8rem;"></div>
                </div>
            </div>

            <div class="chat-area">
                <div class="chat-header">
                    <div class="chat-friend-name" id="chatFriendInfo">
                        <span>💬 বন্ধু নির্বাচন করুন</span>
                    </div>
                    <span class="chat-status" id="chatStatus">অনলাইন</span>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <div class="empty-state">
                        <div class="icon">💬</div>
                        চ্যাট শুরু করতে বাম দিক থেকে একজন বন্ধু নির্বাচন করুন
                    </div>
                </div>

                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="মেসেজ লিখুন..." disabled />
                    <button id="sendBtn" disabled>পাঠান</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            GoogleAuthProvider,
            signInWithPopup,
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getDatabase,
            ref,
            push,
            onChildAdded,
            set,
            get,
            child,
            update,
            onValue,
            query,
            limitToLast,
            orderByChild,
            remove,
            onChildRemoved
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZliPdFlc3iQRMGxs5-hgcDGQYNdACqm4",
            authDomain: "connectbd-4a8f2.firebaseapp.com",
            databaseURL: "https://connectbd-4a8f2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "connectbd-4a8f2",
            storageBucket: "connectbd-4a8f2.firebasestorage.app",
            messagingSenderId: "38217840543",
            appId: "1:38217840543:web:aeedd8517f697b16c12faa",
            measurementId: "G-RPBSS1M9LD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // DOM Elements
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userProfileMini = document.getElementById('userProfileMini');
        const miniAvatar = document.getElementById('miniAvatar');
        const miniName = document.getElementById('miniName');
        const friendList = document.getElementById('friendList');
        const requestList = document.getElementById('requestList');
        const friendCount = document.getElementById('friendCount');
        const requestCount = document.getElementById('requestCount');
        const chatFriendInfo = document.getElementById('chatFriendInfo');
        const chatStatus = document.getElementById('chatStatus');
        const searchUser = document.getElementById('searchUser');
        const searchUserBtn = document.getElementById('searchUserBtn');
        const searchResults = document.getElementById('searchResults');
        const searchFriend = document.getElementById('searchFriend');
        const toastEl = document.getElementById('toast');

        let currentUser = null;
        let currentChatFriend = null;
        let messageListener = null;
        let friends = {};
        let requests = {};
        let allUsersCache = {};

        // Toast
        let toastTimeout = null;

        function showToast(message, type = 'success') {
            if (toastTimeout) {
                clearTimeout(toastTimeout);
                toastEl.classList.remove('show');
            }
            toastEl.textContent = message;
            toastEl.className = 'toast';
            if (type === 'error') toastEl.classList.add('error');
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
                toastTimeout = null;
            }, 3500);
        }

        // ===== FIX: Save user data with complete info =====
        async function saveUserData(user) {
            try {
                const userRef = ref(db, `users/${user.uid}`);
                const snapshot = await get(userRef);
                const existingData = snapshot.val();
                
                // Complete user data object
                const completeUserData = {
                    displayName: user.displayName || 'ইউজার',
                    email: user.email || '',
                    photoURL: user.photoURL || '',
                    online: true,
                    lastSeen: Date.now()
                };
                
                // If user doesn't exist or missing displayName/email
                if (!existingData || !existingData.displayName || !existingData.email) {
                    console.log('📝 Creating/Updating user with complete data...');
                    await set(userRef, completeUserData);
                    showToast('✅ ইউজার ডেটা সেভ করা হয়েছে!', 'success');
                    return true;
                } else {
                    // Just update online status
                    await update(userRef, {
                        online: true,
                        lastSeen: Date.now()
                    });
                    console.log('🔄 Updated online status for existing user');
                    return false;
                }
            } catch (error) {
                console.error('❌ Error saving user data:', error);
                showToast('ডেটা সেভ করতে ব্যর্থ!', 'error');
                return false;
            }
        }

        // ===== FIX: Force fix all users =====
        async function fixAllUsers() {
            if (!currentUser) {
                showToast('প্রথমে লগইন করুন!', 'error');
                return;
            }
            
            try {
                const usersRef = ref(db, 'users');
                const snapshot = await get(usersRef);
                const users = snapshot.val();
                
                if (!users) {
                    showToast('কোনো ইউজার নেই!', 'error');
                    return;
                }
                
                let fixed = 0;
                for (const uid in users) {
                    const user = users[uid];
                    if (!user.displayName || !user.email) {
                        await update(ref(db, `users/${uid}`), {
                            displayName: user.displayName || 'ইউজার',
                            email: user.email || 'user@email.com',
                            photoURL: user.photoURL || ''
                        });
                        fixed++;
                        console.log(`✅ Fixed user: ${uid}`);
                    }
                }
                
                showToast(`✅ ${fixed} জন ইউজার ফিক্স করা হয়েছে!`);
                loadAllUsers(); // Reload cache
                return fixed;
            } catch (error) {
                showToast(`ফিক্স করতে ব্যর্থ: ${error.message}`, 'error');
                return 0;
            }
        }

        // Update UI based on auth state
        function updateUI(user) {
            currentUser = user;
            if (user) {
                userProfileMini.style.display = 'flex';
                miniAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=User&background=1976D2&color=fff';
                miniName.textContent = user.displayName || 'User';
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                messageInput.disabled = false;
                sendBtn.disabled = false;

                // Load friends and requests
                loadFriendsAndRequests();
                // Load user for search
                loadAllUsers();
                
                // Show fix button in console
                console.log('🔧 To fix all users, run: fixAllUsers()');
                console.log('📝 Current user:', user.displayName, user.email);
            } else {
                userProfileMini.style.display = 'none';
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                messageInput.disabled = true;
                sendBtn.disabled = true;
                messagesContainer.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">🔑</div>
                        চ্যাট শুরু করতে লগইন করুন
                    </div>
                `;
                chatFriendInfo.innerHTML = `<span>💬 বন্ধু নির্বাচন করুন</span>`;
                friendList.innerHTML = `<div class="empty-state" style="padding: 20px 0; font-size: 0.8rem;"><div class="icon">👤</div>কোনো বন্ধু নেই</div>`;
                requestList.innerHTML = `<div style="color: #53768b; font-size: 0.8rem; padding: 4px 0;">কোনো রিকোয়েস্ট নেই</div>`;
                friendCount.textContent = '0';
                requestCount.textContent = '0';
                currentChatFriend = null;
                if (messageListener) {
                    messageListener();
                    messageListener = null;
                }
            }
        }

        // Load all users for search
        function loadAllUsers() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    allUsersCache = data;
                    console.log('📊 Users loaded:', Object.keys(data).length);
                    // Log first user for debugging
                    const firstUid = Object.keys(data)[0];
                    if (firstUid) {
                        console.log('📝 Sample user:', data[firstUid]);
                    }
                }
            });
        }

        // Load friends and friend requests
        function loadFriendsAndRequests() {
            if (!currentUser) return;

            const friendsRef = ref(db, `friends/${currentUser.uid}`);
            onValue(friendsRef, (snapshot) => {
                const data = snapshot.val();
                friends = data || {};
                const count = Object.keys(friends).length;
                friendCount.textContent = count;
                renderFriends();
            });

            const requestsRef = ref(db, `friendRequests/${currentUser.uid}`);
            onValue(requestsRef, (snapshot) => {
                const data = snapshot.val();
                requests = data || {};
                const count = Object.keys(requests).filter(key => requests[key].status === 'pending').length;
                requestCount.textContent = count;
                renderRequests();
            });
        }

        // Render friends list
        function renderFriends() {
            const searchTerm = searchFriend.value.toLowerCase();
            let html = '';
            let friendKeys = Object.keys(friends);

            if (friendKeys.length === 0) {
                html = `<div class="empty-state" style="padding: 20px 0; font-size: 0.8rem;"><div class="icon">👤</div>কোনো বন্ধু নেই</div>`;
            } else {
                friendKeys.forEach(uid => {
                    const friend = friends[uid];
                    const name = friend.displayName || 'ইউজার';
                    const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) +
                        '&background=1976D2&color=fff';

                    if (searchTerm && !name.toLowerCase().includes(searchTerm)) return;

                    const isActive = currentChatFriend === uid;
                    html += `
                        <div class="friend-item ${isActive ? 'active' : ''}" data-uid="${uid}">
                            <img src="${photo}" alt="${name}" />
                            <span class="friend-name">${name}</span>
                            <span class="status-dot ${friend.online ? '' : 'offline'}"></span>
                        </div>
                    `;
                });
            }

            friendList.innerHTML = html;

            // Add click listeners
            document.querySelectorAll('.friend-item').forEach(el => {
                el.addEventListener('click', () => {
                    const uid = el.dataset.uid;
                    if (uid && friends[uid]) {
                        startChat(uid);
                    }
                });
            });
        }

        // Render friend requests
        function renderRequests() {
            let html = '';
            let pendingRequests = Object.keys(requests).filter(key => requests[key].status === 'pending');

            if (pendingRequests.length === 0) {
                html = `<div style="color: #53768b; font-size: 0.8rem; padding: 4px 0;">কোনো রিকোয়েস্ট নেই</div>`;
            } else {
                pendingRequests.forEach(uid => {
                    const req = requests[uid];
                    const name = req.displayName || 'ইউজার';
                    const photo = req.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) +
                        '&background=1976D2&color=fff';
                    html += `
                        <div class="request-item" data-uid="${uid}">
                            <img src="${photo}" alt="${name}" />
                            <span class="req-name">${name}</span>
                            <div class="req-actions">
                                <button class="btn-accept" data-uid="${uid}">✅</button>
                                <button class="btn-reject" data-uid="${uid}">❌</button>
                            </div>
                        </div>
                    `;
                });
            }

            requestList.innerHTML = html;

            // Add accept/reject listeners
            document.querySelectorAll('.btn-accept').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const uid = btn.dataset.uid;
                    acceptFriendRequest(uid);
                });
            });

            document.querySelectorAll('.btn-reject').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const uid = btn.dataset.uid;
                    rejectFriendRequest(uid);
                });
            });
        }

        // Accept friend request
        async function acceptFriendRequest(fromUid) {
            if (!currentUser) return;

            try {
                // Get sender info
                const senderRef = ref(db, `users/${fromUid}`);
                const snapshot = await get(senderRef);
                const senderData = snapshot.val();

                if (!senderData) {
                    showToast('ইউজার পাওয়া যায়নি!', 'error');
                    return;
                }

                // Add to current user's friends
                await set(ref(db, `friends/${currentUser.uid}/${fromUid}`), {
                    displayName: senderData.displayName || 'ইউজার',
                    photoURL: senderData.photoURL || '',
                    online: false,
                    addedAt: Date.now()
                });

                // Add to sender's friends
                await set(ref(db, `friends/${fromUid}/${currentUser.uid}`), {
                    displayName: currentUser.displayName || 'ইউজার',
                    photoURL: currentUser.photoURL || '',
                    online: true,
                    addedAt: Date.now()
                });

                // Remove request
                await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));

                showToast('বন্ধু রিকোয়েস্ট গ্রহণ করা হয়েছে! 🎉');
            } catch (error) {
                showToast(`এক্সেপ্ট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // Reject friend request
        async function rejectFriendRequest(fromUid) {
            if (!currentUser) return;
            try {
                await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
                showToast('রিকোয়েস্ট রিজেক্ট করা হয়েছে');
            } catch (error) {
                showToast(`রিজেক্ট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // Send friend request
        async function sendFriendRequest(toUid) {
            if (!currentUser) return;
            if (toUid === currentUser.uid) {
                showToast('নিজেকে ফ্রেন্ড রিকোয়েস্ট পাঠানো যায় না!', 'error');
                return;
            }

            // Check if already friends
            if (friends[toUid]) {
                showToast('ইতিমধ্যে বন্ধু!', 'error');
                return;
            }

            // Check if request already sent
            if (requests[toUid] && requests[toUid].status === 'pending') {
                showToast('ইতিমধ্যে রিকোয়েস্ট পাঠানো হয়েছে!', 'error');
                return;
            }

            try {
                // Get target user info
                const userRef = ref(db, `users/${toUid}`);
                const snapshot = await get(userRef);
                const userData = snapshot.val();

                if (!userData) {
                    showToast('ইউজার পাওয়া যায়নি!', 'error');
                    return;
                }

                // Send request to target user
                await set(ref(db, `friendRequests/${toUid}/${currentUser.uid}`), {
                    displayName: currentUser.displayName || 'ইউজার',
                    photoURL: currentUser.photoURL || '',
                    status: 'pending',
                    timestamp: Date.now()
                });

                showToast('ফ্রেন্ড রিকোয়েস্ট পাঠানো হয়েছে! 📨');
                searchResults.innerHTML = `<div style="color: #4caf50;">✅ রিকোয়েস্ট পাঠানো হয়েছে</div>`;
            } catch (error) {
                showToast(`রিকোয়েস্ট পাঠাতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // Start chat with a friend
        function startChat(friendUid) {
            if (!friends[friendUid]) {
                showToast('এই ইউজার আপনার বন্ধু নয়!', 'error');
                return;
            }

            currentChatFriend = friendUid;
            const friend = friends[friendUid];
            const name = friend.displayName || 'ইউজার';
            const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) +
                '&background=1976D2&color=fff';

            chatFriendInfo.innerHTML = `
                <img src="${photo}" alt="${name}" />
                <span>${name}</span>
            `;
            chatStatus.textContent = friend.online ? '🟢 অনলাইন' : '⚪ অফলাইন';

            // Update active state in friend list
            document.querySelectorAll('.friend-item').forEach(el => {
                el.classList.toggle('active', el.dataset.uid === friendUid);
            });

            // Load messages
            loadPrivateMessages(friendUid);
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
        }

        // Load private messages
        function loadPrivateMessages(friendUid) {
            if (messageListener) {
                messageListener();
                messageListener = null;
            }

            // Create chat room ID (sorted UIDs for consistency)
            const chatId = [currentUser.uid, friendUid].sort().join('_');
            const messagesRef = query(
                ref(db, `privateChats/${chatId}/messages`),
                orderByChild('timestamp'),
                limitToLast(50)
            );

            messagesContainer.innerHTML = '';

            messageListener = onChildAdded(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                const msgKey = snapshot.key;
                if (!msg) return;

                const existing = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
                if (existing) return;

                const isOwn = msg.uid === currentUser.uid;
                const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('bn-BD', { hour: '2-digit',
                        minute: '2-digit' }) : '';

                const div = document.createElement('div');
                div.className = `message ${isOwn ? 'own' : ''}`;
                div.dataset.key = msgKey;

                const avatar = msg.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(msg
                    .displayName || 'U') + '&background=1976D2&color=fff';

                div.innerHTML = `
                    <img src="${avatar}" alt="avatar" class="msg-avatar" />
                    <div class="msg-bubble">
                        <div class="msg-sender">${isOwn ? 'আপনি' : (msg.displayName || 'ইউজার')}</div>
                        <div class="msg-text">${msg.text}</div>
                        <div class="msg-time">${time}</div>
                    </div>
                `;

                messagesContainer.appendChild(div);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });
        }

        // Send private message
        async function sendPrivateMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser || !currentChatFriend) return;

            const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
            const messagesRef = ref(db, `privateChats/${chatId}/messages`);
            const newMsgRef = push(messagesRef);

            await set(newMsgRef, {
                text: text,
                uid: currentUser.uid,
                displayName: currentUser.displayName || 'ইউজার',
                photoURL: currentUser.photoURL || '',
                timestamp: Date.now()
            });

            messageInput.value = '';
            messageInput.focus();
        }

        // Search user
        searchUserBtn.addEventListener('click', async () => {
            const query = searchUser.value.trim().toLowerCase();
            if (!query) {
                searchResults.innerHTML = '';
                return;
            }

            if (!currentUser) {
                showToast('লগইন করুন প্রথমে!', 'error');
                return;
            }

            // Search in all users cache
            let foundUsers = [];
            Object.keys(allUsersCache).forEach(uid => {
                const user = allUsersCache[uid];
                if (uid === currentUser.uid) return;
                const name = (user.displayName || '').toLowerCase();
                const email = (user.email || '').toLowerCase();
                if (name.includes(query) || email.includes(query)) {
                    foundUsers.push({ uid, ...user });
                }
            });

            console.log('🔍 Search results:', foundUsers.length);

            if (foundUsers.length === 0) {
                searchResults.innerHTML = `<div style="color: #53768b; font-size: 0.8rem;">কোনো ইউজার পাওয়া যায়নি</div>`;
                return;
            }

            let html = '';
            foundUsers.forEach(user => {
                const isFriend = friends[user.uid];
                const isRequested = requests[user.uid] && requests[user.uid].status === 'pending';
                const photo = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user
                    .displayName || 'U') + '&background=1976D2&color=fff';

                html += `
                    <div style="display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.05);">
                        <img src="${photo}" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover;" />
                        <span style="flex: 1; font-size: 0.85rem;">${user.displayName || 'ইউজার'}</span>
                        ${isFriend ? '<span style="color: #4caf50; font-size: 0.7rem;">✅ বন্ধু</span>' :
                        isRequested ? '<span style="color: #ff9800; font-size: 0.7rem;">⏳ রিকোয়েস্ট পাঠানো</span>' :
                        `<button class="header-btn" style="font-size: 0.7rem; padding: 4px 12px;" data-uid="${user.uid}">➕ বন্ধু করুন</button>`
                        }
                    </div>
                `;
            });

            searchResults.innerHTML = html;

            // Add click listeners for add friend buttons
            document.querySelectorAll('#searchResults button[data-uid]').forEach(btn => {
                btn.addEventListener('click', () => {
                    sendFriendRequest(btn.dataset.uid);
                });
            });
        });

        // Search friend filter
        searchFriend.addEventListener('input', renderFriends);

        // Send message on enter or button click
        sendBtn.onclick = sendPrivateMessage;
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendPrivateMessage();
        });

        // ===== FIXED: Login with complete data save =====
        loginBtn.onclick = async () => {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                console.log('👤 User logged in:', user.displayName);
                console.log('📧 Email:', user.email);
                console.log('🆔 UID:', user.uid);
                
                // ===== IMPORTANT: Save complete user data =====
                await saveUserData(user);
                
                showToast(`স্বাগতম ${user.displayName || 'ইউজার'}! 🎉`);
                
                // Auto-fix all users after login (optional)
                setTimeout(async () => {
                    console.log('🔍 Checking if fix needed...');
                    const usersRef = ref(db, 'users');
                    const snapshot = await get(usersRef);
                    const users = snapshot.val();
                    let needsFix = false;
                    if (users) {
                        for (const uid in users) {
                            if (!users[uid].displayName || !users[uid].email) {
                                needsFix = true;
                                break;
                            }
                        }
                    }
                    if (needsFix) {
                        if (confirm('🔧 কিছু ইউজারের ডেটা ঠিক করতে হবে। এখনই ঠিক করবেন?')) {
                            await fixAllUsers();
                        }
                    } else {
                        console.log('✅ All users have complete data!');
                    }
                }, 2000);
                
            } catch (error) {
                if (error.code !== 'auth/popup-closed-by-user') {
                    showToast(`লগইন ব্যর্থ: ${error.message}`, 'error');
                    console.error('Login error:', error);
                }
            }
        };

        // Logout
        logoutBtn.onclick = async () => {
            try {
                if (currentUser) {
                    await set(ref(db, `users/${currentUser.uid}/online`), false);
                    await set(ref(db, `users/${currentUser.uid}/lastSeen`), Date.now());
                }
                await signOut(auth);
                showToast('সাইন আউট করা হয়েছে।');
            } catch (error) {
                showToast(`সাইন আউট ব্যর্থ: ${error.message}`, 'error');
            }
        };

        // Auth state
        onAuthStateChanged(auth, async (user) => {
            updateUI(user);
            if (user) {
                // Make sure user data is complete
                await saveUserData(user);
                // Set online status
                await set(ref(db, `users/${user.uid}/online`), true);
                await set(ref(db, `users/${user.uid}/lastSeen`), Date.now());
            }
        });

        // Handle page unload
        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                set(ref(db, `users/${currentUser.uid}/online`), false);
                set(ref(db, `users/${currentUser.uid}/lastSeen`), Date.now());
            }
        });

        // ===== EXPOSE functions to console =====
        window.fixAllUsers = fixAllUsers;
        window.saveUserData = saveUserData;
        window.db = db;
        window.auth = auth;

        console.log('🔥 ConnectBD Private Chat ready');
        console.log('🔧 To fix all users, run: fixAllUsers()');
        console.log('📝 To fix current user, run: saveUserData(auth.currentUser)');
        console.log('🔍 To check all users, run: get(ref(db, "users")).then(s => console.log(s.val()))');
    </script>
</body>
</html>
