<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConnectBD - ভয়েস কল সহ প্রাইভেট চ্যাট</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #eaf3f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 2rem;
            max-width: 1100px;
            width: 100%;
            box-shadow: 0 30px 60px -20px rgba(0, 20, 40, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(60, 130, 180, 0.15);
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            padding: 4px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: 0.3s;
        }

        .app-logo:hover {
            transform: scale(1.05);
        }

        .app-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0b2b40;
        }

        .app-title span {
            color: #1976D2;
        }

        .app-title small {
            font-size: 0.8rem;
            font-weight: 400;
            color: #3b5c6e;
            display: block;
            margin-top: -4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.6);
            padding: 6px 16px 6px 10px;
            border-radius: 40px;
            border: 1px solid rgba(200, 215, 225, 0.5);
            cursor: pointer;
            transition: 0.3s;
        }

        .user-profile-mini:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .user-profile-mini img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .user-profile-mini .user-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #0b2b40;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .header-btn {
            background: transparent;
            border: 1px solid #b6ccdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2f536b;
            cursor: pointer;
            transition: 0.15s;
        }

        .header-btn:hover {
            background: #e6eef5;
            border-color: #7f9bb3;
        }

        .header-btn.primary {
            background: #1976D2;
            border-color: #1976D2;
            color: white;
        }

        .header-btn.primary:hover {
            background: #1565C0;
        }

        .header-btn.danger {
            background: #d32f2f;
            border-color: #d32f2f;
            color: white;
        }

        .header-btn.danger:hover {
            background: #b71c1c;
        }

        .main-content {
            display: flex;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
            padding-top: 1.2rem;
        }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            max-height: 550px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-section {
            margin-bottom: 1rem;
        }

        .sidebar-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #53768b;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-count {
            background: #1976D2;
            color: white;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .badge-count.unread {
            background: #ff4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            margin-bottom: 4px;
            position: relative;
        }

        .friend-item:hover {
            background: rgba(25, 118, 210, 0.08);
        }

        .friend-item.active {
            background: rgba(25, 118, 210, 0.15);
            font-weight: 600;
        }

        .friend-item img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .friend-item .friend-name {
            flex: 1;
            font-size: 0.9rem;
            color: #1f4c66;
        }

        .friend-item .friend-phone {
            font-size: 0.7rem;
            color: #4caf50;
            margin-left: 4px;
        }

        .friend-item .friend-phone.verified {
            color: #4caf50;
        }

        .friend-item .friend-phone.unverified {
            color: #ff9800;
        }

        .friend-item .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
        }

        .friend-item .status-dot.offline {
            background: #bdbdbd;
        }

        .friend-item .unread-badge {
            background: #ff4444;
            color: white;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .request-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        .request-item img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .request-item .req-name {
            flex: 1;
            color: #1f4c66;
        }

        .request-item .req-actions {
            display: flex;
            gap: 6px;
        }

        .request-item .req-actions button {
            padding: 2px 10px;
            border: none;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-accept {
            background: #4caf50;
            color: white;
        }

        .btn-accept:hover {
            background: #388e3c;
        }

        .btn-reject {
            background: #ef5350;
            color: white;
        }

        .btn-reject:hover {
            background: #c62828;
        }

        .search-box {
            width: 100%;
            padding: 6px 12px;
            border: 1px solid #dce3e9;
            border-radius: 20px;
            font-size: 0.8rem;
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .search-box:focus {
            border-color: #1976D2;
        }

        .search-type-selector {
            display: flex;
            gap: 4px;
            margin-bottom: 8px;
            background: rgba(255,255,255,0.5);
            border-radius: 12px;
            padding: 4px;
        }

        .search-type-selector button {
            flex: 1;
            padding: 4px 8px;
            border: none;
            border-radius: 8px;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            background: transparent;
            color: #53768b;
        }

        .search-type-selector button.active {
            background: #1976D2;
            color: white;
        }

        .search-type-selector button:hover:not(.active) {
            background: rgba(25, 118, 210, 0.1);
        }

        .friend-list-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .friend-list-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .friend-list-scroll::-webkit-scrollbar-thumb {
            background: #b6ccdd;
            border-radius: 10px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(60, 130, 180, 0.1);
        }

        .chat-header .chat-friend-name {
            font-weight: 600;
            color: #0b2b40;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .chat-friend-name img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header .chat-status {
            font-size: 0.75rem;
            color: #53768b;
        }

        .chat-header .chat-status.online {
            color: #4caf50;
        }

        .chat-header .chat-status.typing {
            color: #1976D2;
            animation: pulse 1s infinite;
        }

        .chat-header .call-btn {
            padding: 6px 14px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .chat-header .call-btn:hover:not(:disabled) {
            background: #388e3c;
            transform: scale(1.02);
        }

        .chat-header .call-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .chat-header .call-btn.ringing {
            background: #ff9800;
            animation: pulse 1s infinite;
        }

        .chat-header .call-btn.in-call {
            background: #d32f2f;
        }

        .chat-header .call-btn.in-call:hover:not(:disabled) {
            background: #b71c1c;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 4px;
            margin: 8px 0;
            max-height: 380px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
            position: relative;
        }

        .message:hover .message-actions {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid white;
        }

        .message .msg-bubble {
            background: white;
            padding: 10px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            word-wrap: break-word;
            flex: 1;
            position: relative;
            max-width: 100%;
        }

        .message.own .msg-bubble {
            background: #1976D2;
            color: white;
            border-top-left-radius: 18px;
            border-top-right-radius: 4px;
        }

        .message .msg-sender {
            font-size: 0.7rem;
            font-weight: 600;
            color: #1976D2;
            margin-bottom: 2px;
        }

        .message.own .msg-sender {
            color: #bbdefb;
        }

        .message .msg-text {
            font-size: 0.92rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .message .msg-text .image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        .message .msg-text .image-container img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin: 4px 0;
            cursor: pointer;
            transition: 0.3s;
            display: block;
        }

        .message .msg-text .image-container img:hover {
            transform: scale(1.02);
        }

        .message .msg-text .image-container .image-actions {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: 0.3s;
        }

        .message .msg-text .image-container:hover .image-actions {
            opacity: 1;
        }

        .message .msg-text .image-container .image-actions button {
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message .msg-text .image-container .image-actions button:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.1);
        }

        .message .msg-text .image-container .image-actions .download-btn:hover {
            background: #1976D2;
        }

        .message .msg-time {
            font-size: 0.6rem;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .message.own .msg-time {
            color: #bbdefb;
        }

        .message .message-actions {
            display: none;
            position: absolute;
            top: -10px;
            right: -10px;
            gap: 4px;
            background: white;
            border-radius: 12px;
            padding: 2px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message.own .message-actions {
            right: auto;
            left: -10px;
        }

        .message .message-actions button {
            background: none;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 4px;
            transition: 0.2s;
        }

        .message .message-actions button:hover {
            background: #e0e0e0;
        }

        .message .message-actions .delete-btn:hover {
            color: #d32f2f;
        }

        .message .message-actions .edit-btn:hover {
            color: #1976D2;
        }

        .typing-indicator-global {
            font-size: 0.7rem;
            color: #1976D2;
            font-style: italic;
            padding: 4px 8px;
            min-height: 20px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(60, 130, 180, 0.1);
            flex-wrap: wrap;
        }

        .input-area .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            min-width: 0;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #dce3e9;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            transition: 0.15s;
            min-width: 0;
        }

        .input-area input[type="text"]:focus {
            border-color: #1976D2;
            background: white;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.08);
        }

        .input-area input[type="text"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-area .file-upload-btn {
            padding: 10px 16px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-area .file-upload-btn:hover:not(:disabled) {
            background: #388e3c;
            transform: scale(1.02);
        }

        .input-area .file-upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-area .send-btn {
            padding: 10px 24px;
            border: none;
            background: #1976D2;
            color: white;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
        }

        .input-area .send-btn:hover:not(:disabled) {
            background: #1565C0;
            transform: scale(1.02);
        }

        .input-area .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            color: #53768b;
            padding: 40px 0;
            font-size: 0.9rem;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e7e34;
            color: white;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: #d32f2f;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }

        .modal h2 {
            color: #0b2b40;
            margin-bottom: 1rem;
        }

        .modal .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1rem;
            display: block;
            border: 3px solid #1976D2;
        }

        .modal .profile-pic-wrapper {
            position: relative;
            width: 100px;
            margin: 0 auto 1rem;
        }

        .modal .profile-pic-wrapper .upload-overlay {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.6rem;
            cursor: pointer;
        }

        .modal .form-group {
            margin-bottom: 1rem;
        }

        .modal .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #53768b;
            margin-bottom: 4px;
        }

        .modal .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #dce3e9;
            border-radius: 12px;
            font-size: 0.95rem;
        }

        .modal .form-group input:focus {
            border-color: #1976D2;
            outline: none;
        }

        .modal .form-group .input-with-btn {
            display: flex;
            gap: 8px;
        }

        .modal .form-group .input-with-btn input {
            flex: 1;
        }

        .modal .form-group .input-with-btn button {
            padding: 8px 16px;
            border: none;
            border-radius: 12px;
            background: #1976D2;
            color: white;
            cursor: pointer;
            font-weight: 600;
            white-space: nowrap;
            transition: 0.2s;
        }

        .modal .form-group .input-with-btn button:hover:not(:disabled) {
            background: #1565C0;
        }

        .modal .form-group .input-with-btn button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal .form-group .otp-status {
            font-size: 0.75rem;
            margin-top: 4px;
            padding: 4px 8px;
            border-radius: 8px;
        }

        .modal .form-group .otp-status.verified {
            color: #4caf50;
            background: #e8f5e9;
        }

        .modal .form-group .otp-status.pending {
            color: #ff9800;
            background: #fff3e0;
        }

        .modal .form-group .otp-status.error {
            color: #d32f2f;
            background: #ffebee;
        }

        .modal .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
        }

        .modal .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal .modal-actions .save-btn {
            background: #1976D2;
            color: white;
        }

        .modal .modal-actions .save-btn:hover {
            background: #1565C0;
        }

        .modal .modal-actions .save-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .modal .modal-actions .cancel-btn {
            background: #e0e0e0;
            color: #333;
        }

        .modal .modal-actions .cancel-btn:hover {
            background: #d0d0d0;
        }

        .image-preview-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .image-preview-overlay.active {
            display: flex;
        }

        .image-preview-overlay .preview-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .image-preview-overlay img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }

        // ===== Compress Image =====
        function compressImage(file, maxWidth, maxHeight) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round(height * maxWidth / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round(width * maxHeight / height);
                                height = maxHeight;
                            }
                        }
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', 0.7);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        function imageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // ===== Audio Call Functions =====
        async function getAudioDevices() {
            try {
                const devices = await navigator.mediaDevices.enumerateDevices();
                return devices.filter(d => d.kind === 'audioinput');
            } catch (error) {
                console.error('Error getting audio devices:', error);
                return [];
            }
        }

        async function getUserMedia() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        autoGainControl: true
                    }
                });
                return stream;
            } catch (error) {
                console.error('Error getting user media:', error);
                showToast('মাইক্রোফোন অ্যাক্সেস করতে ব্যর্থ!', 'error');
                throw error;
            }
        }

        function setupVolumeMeter(stream) {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                updateVolume();
            } catch (error) {
                console.error('Volume meter error:', error);
            }
        }

        function updateVolume() {
            if (!analyser) return;
            analyser.getByteFrequencyData(dataArray);
            let sum = 0;
            for (let i = 0; i < dataArray.length; i++) {
                sum += dataArray[i];
            }
            const avg = sum / dataArray.length;
            const volume = Math.min((avg / 128) * 100, 100);
            volumeBar.style.width = `${volume}%`;
            if (isCallActive) {
                requestAnimationFrame(updateVolume);
            }
        }

        function createPeerConnection() {
            const configuration = {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    {
                        urls: 'turn:numb.viagenie.ca',
                        username: 'webrtc@live.com',
                        credential: 'muazkh'
                    }
                ]
            };
            peerConnection = new RTCPeerConnection(configuration);
            if (localStream) {
                localStream.getTracks().forEach(track => {
                    peerConnection.addTrack(track, localStream);
                });
            }
            peerConnection.ontrack = (event) => {
                remoteStream = event.streams[0];
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.autoplay = true;
                audio.volume = isSpeakerOn ? 1.0 : 0.5;
                setupVolumeMeter(remoteStream);
            };
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    sendSignal(currentCallId, {
                        type: 'candidate',
                        data: JSON.stringify(event.candidate),
                        from: currentUser.uid
                    });
                }
            };
            peerConnection.onconnectionstatechange = () => {
                console.log('Connection state:', peerConnection.connectionState);
                if (peerConnection.connectionState === 'connected') {
                    updateCallStatus('connected');
                } else if (peerConnection.connectionState === 'disconnected' ||
                    peerConnection.connectionState === 'failed' ||
                    peerConnection.connectionState === 'closed') {
                    endCall();
                }
            };
            return peerConnection;
        }

        async function sendSignal(callId, signal) {
            if (!callId) return;
            try {
                const signalRef = ref(db, `callSignals/${callId}`);
                const newSignalRef = push(signalRef);
                await set(newSignalRef, {
                    ...signal,
                    timestamp: Date.now()
                });
            } catch (error) {
                console.error('Error sending signal:', error);
            }
        }

        function listenForSignals(callId) {
            if (!callId) return;
            const signalsRef = ref(db, `callSignals/${callId}`);
            onChildAdded(signalsRef, async (snapshot) => {
                const signal = snapshot.val();
                if (!signal || signal.from === currentUser.uid) return;
                try {
                    switch (signal.type) {
                        case 'offer':
                            await handleOffer(signal.data);
                            break;
                        case 'answer':
                            await handleAnswer(signal.data);
                            break;
                        case 'candidate':
                            await handleCandidate(signal.data);
                            break;
                    }
                } catch (error) {
                    console.error('Error handling signal:', error);
                }
            });
        }

        async function handleOffer(offerData) {
            if (!peerConnection) {
                await startLocalStream();
                peerConnection = createPeerConnection();
            }
            try {
                const offer = JSON.parse(offerData);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
                const answer = await peerConnection.createAnswer();
                await peerConnection.setLocalDescription(answer);
                sendSignal(currentCallId, {
                    type: 'answer',
                    data: JSON.stringify(answer),
                    from: currentUser.uid
                });
            } catch (error) {
                console.error('Error handling offer:', error);
            }
        }

        async function handleAnswer(answerData) {
            try {
                const answer = JSON.parse(answerData);
                await peerConnection.setRemoteDescription(new RTCSessionDescription(answer));
            } catch (error) {
                console.error('Error handling answer:', error);
            }
        }

        async function handleCandidate(candidateData) {
            try {
                const candidate = JSON.parse(candidateData);
                await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
            } catch (error) {
                console.error('Error handling candidate:', error);
            }
        }

        async function startLocalStream() {
            try {
                localStream = await getUserMedia();
                setupVolumeMeter(localStream);
                return localStream;

                throw error;
            }
        }

        function listenForCallStatus(callId) {
            const callRef = ref(db, `calls/${callId}`);
            onValue(callRef, (snapshot) => {
                const data = snapshot.val();
                if (!data) {
                    endCall();
                    return;
                }
                switch (data.status) {
                    case 'ringing':
                        if (data.receiverId === currentUser.uid) {
                            showIncomingCall(data);
                        }
                        break;
                    case 'connected':
                        updateCallStatus('connected');
                        break;
                    case 'ended':
                    case 'rejected':
                    case 'missed':
                        endCall();
                        break;
                }
            });
        }

        function showIncomingCall(data) {
            if (isCallActive) return;
            currentCallId = data.callerId + '_' + data.receiverId + '_' + data.timestamp;
            notifAvatar.src = data.callerPhoto || 'https://ui-avatars.com/api/?name=' +
                encodeURIComponent(data.callerName || 'U') + '&background=1976D2&color=fff';
            notifName.textContent = data.callerName || 'ইউজার';

            callStatus.textContent = '📞 ইনকামিং কল...';
            callStatus.className = 'call-status ringing';
            playRingtone();
            listenForSignals(currentCallId);
            listenForCallStatus(currentCallId);

        function playRingtone() {
            try {
                const ctx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = ctx.createOscillator();
                const gainNode = ctx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(ctx.destination);
                oscillator.frequency.value = 440;
                oscillator.type = 'sine';
                gainNode.gain.value = 0.3;
                oscillator.start();
                setTimeout(() => {
                    oscillator.stop();
                }, 2000);
            } catch (error) {
                console.error('Ringtone error:', error);
            }
        }

        async function acceptCall() {
            if (!currentCallId) return;

                const callRef = ref(db, `calls/${currentCallId}`);
                await update(callRef, { status: 'connected', startTime: Date.now() });
                await startLocalStream();
                if (!peerConnection) {

                callNotification.classList.remove('show');
                showCallUI('ongoing');

        async function rejectCall() {

            try {
                const callRef = ref(db, `calls/${currentCallId}`);
                await update(callRef, { status: 'rejected' });
                callNotification.classList.remove('show');
                hideCallUI();
                showToast('📵 কল রিজেক্ট করা হয়েছে');

            }

        async function endCall() {
            try {
                if (currentCallId) {
                    const callRef = ref(db, `calls/${currentCallId}`);
                    await update(callRef, {
                        status: 'ended',
                        endTime: Date.now(),
                        duration: callStartTime ? Math.floor((Date.now() - callStartTime) / 1000) : 0
                    });
                }
                if (peerConnection) {
                    peerConnection.close();
                    peerConnection = null;
                }
                if (localStream) {
                    localStream.getTracks().forEach(track => track.stop());
                    localStream = null;
                }
                if (remoteStream) {
                    remoteStream.getTracks().forEach(track => track.stop());
                    remoteStream = null;
                }
                if (audioContext) {
                    audioContext.close();
                    audioContext = null;
                }
                if (callTimerInterval) {
                    clearInterval(callTimerInterval);
                    callTimerInterval = null;
                }
                isCallActive = false;
                isMuted = false;
                isSpeakerOn = false;
                callStartTime = null;
                callNotification.classList.remove('show');
                hideCallUI();
                callBtn.disabled = false;
                callBtn.textContent = '📞 কল';
                callBtn.className = 'call-btn';
                if (currentChatFriend && friends[currentChatFriend]) {
                    const friend = friends[currentChatFriend];
                    chatStatus.textContent = friend.online ? '🟢 অনলাইন' : '⚪ অফলাইন';
                    chatStatus.className = `chat-status ${friend.online ? 'online' : ''}`;
                }
                showToast('📞 কল শেষ হয়েছে');
            } catch (error) {
                console.error('End call error:', error);
            }
        }

        function updateCallStatus(status) {

        function startCallTimer() {
            if (callTimerInterval) clearInterval(callTimerInterval);
            callTimerInterval = setInterval(() => {
                if (!callStartTime) return;
                const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
                const minutes = String(Math.floor(elapsed / 60)).padStart(2, '0');
                const seconds = String(elapsed % 60).padStart(2, '0');
                callTimer.textContent = `${minutes}:${seconds}`;
            }, 1000);
        }
