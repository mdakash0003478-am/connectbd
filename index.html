<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ConnectBD - চ্যাট</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #00A884;
            --primary-dark: #008f72;
            --bg-dark: #111B21;
            --bg-secondary: #202C33;
            --bg-tertiary: #2A3942;
            --text-primary: #E9EDF0;
            --text-secondary: #AEBAC1;
            --border-color: #2A3942;
            --chat-own: #D9FDD3;
            --chat-own-text: #111B21;
            --radius: 8px;
            --header-height: 60px;
            --tab-height: 48px;
            --composer-height: 62px;
        }
        html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--bg-dark); color: var(--text-primary); }
        
        /* Status Bar */
        .status-bar { height: 24px; background: var(--bg-dark); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 12px; color: var(--text-secondary); flex-shrink: 0; }
        .status-bar .time { font-weight: 600; color: var(--text-primary); }
        
        /* App Container */
        .app-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: var(--bg-dark); max-width: 100%; overflow: hidden; }
        
        /* Header */
        .header { height: var(--header-height); background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; border-bottom: 1px solid var(--border-color); }
        .header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .header-left .logo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid var(--primary); }
        .header-left .title { font-size: 18px; font-weight: 700; color: var(--text-primary); }
        .header-left .title span { color: var(--primary); }
        .header-right { display: flex; align-items: center; gap: 8px; }
        
        .user-profile { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px 4px 4px; border-radius: 30px; }
        .user-profile img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid var(--primary); }
        .user-profile .name { font-size: 13px; font-weight: 500; color: var(--text-primary); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        
        .btn { padding: 8px 20px; border: none; border-radius: 30px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn:active { transform: scale(0.94); }
        .btn-primary { background: var(--primary); color: white; }
        .btn-danger { background: #FF3B30; color: white; padding: 8px 14px; font-size: 16px; }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-secondary); }
        
        /* Tabs */
        .tabs { display: flex; background: var(--bg-secondary); border-bottom: 1px solid var(--border-color); flex-shrink: 0; height: var(--tab-height); }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; color: var(--text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; padding: 0 8px; }
        .tab.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab .badge { background: var(--primary); color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 50%; min-width: 18px; text-align: center; }
        .tab .badge.danger { background: #FF3B30; }
        
        /* Main */
        .main-content { flex: 1; display: flex; overflow: hidden; background: var(--bg-dark); position: relative; }
        
        /* Chat List */
        .chat-list { width: 100%; max-width: 420px; flex-shrink: 0; background: var(--bg-dark); display: flex; flex-direction: column; border-right: 1px solid var(--border-color); overflow: hidden; position: relative; z-index: 5; }
        .chat-list.hidden { transform: translateX(-100%); position: absolute; width: 100%; max-width: 100%; z-index: 5; }
        
        .search-bar { padding: 6px 12px; background: var(--bg-secondary); flex-shrink: 0; display: flex; gap: 8px; align-items: center; }
        .search-bar input { flex: 1; background: var(--bg-tertiary); border: none; border-radius: var(--radius); padding: 8px 14px; color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none; }
        .search-bar input::placeholder { color: var(--text-secondary); }
        
        .friend-list { flex: 1; overflow-y: auto; overflow-x: hidden; }
        .friend-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--border-color); }
        .friend-item:active { background: var(--bg-tertiary); }
        .friend-item.active { background: var(--bg-tertiary); }
        .friend-item .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid transparent; }
        .friend-item .avatar.online { border-color: var(--primary); }
        .friend-item .info { flex: 1; min-width: 0; }
        .friend-item .info .name { font-size: 15px; font-weight: 500; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .friend-item .info .last-msg { font-size: 13px; color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .friend-item .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
        .friend-item .meta .time { font-size: 11px; color: var(--text-secondary); }
        .friend-item .meta .unread { background: var(--primary); color: white; font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 50%; min-width: 20px; text-align: center; }
        .friend-item .meta .unread.danger { background: #FF3B30; }
        
        .empty-state { text-align: center; padding: 40px 20px; color: var(--text-secondary); font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .empty-state .icon { font-size: 48px; opacity: 0.5; }
        
        /* Chat Area */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--bg-dark); min-width: 0; position: relative; }
        .chat-header { height: var(--header-height); background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--border-color); flex-shrink: 0; }
        .chat-header .back-btn { display: none; background: none; border: none; color: var(--text-primary); font-size: 22px; cursor: pointer; padding: 4px 8px; }
        .chat-header .chat-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .chat-header .chat-info img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .chat-header .chat-info .details { flex: 1; min-width: 0; }
        .chat-header .chat-info .details .name { font-size: 15px; font-weight: 600; color: var(--text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-header .chat-info .details .status { font-size: 12px; color: var(--text-secondary); }
        .chat-header .chat-info .details .status.online { color: var(--primary); }
        
        .messages { flex: 1; overflow-y: auto; padding: 12px 16px 8px; display: flex; flex-direction: column; gap: 4px; background: var(--bg-dark); }
        .message { display: flex; gap: 8px; max-width: 85%; animation: fadeIn 0.2s ease; }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        .message .msg-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; align-self: flex-end; border: 2px solid var(--bg-dark); }
        .message .msg-bubble { padding: 8px 12px; border-radius: 8px; word-wrap: break-word; max-width: 100%; position: relative; }
        .message:not(.own) .msg-bubble { background: var(--bg-tertiary); color: var(--text-primary); border-top-left-radius: 0; }
        .message.own .msg-bubble { background: var(--chat-own); color: var(--chat-own-text); border-top-right-radius: 0; }
        .message .msg-sender { font-size: 11px; font-weight: 600; color: var(--primary); margin-bottom: 2px; }
        .message.own .msg-sender { color: #075E54; }
        .message .msg-text { font-size: 14px; line-height: 1.5; word-break: break-word; }
        .message .msg-text img { max-width: min(100%, 200px); max-height: 150px; border-radius: 4px; cursor: pointer; display: block; }
        .message .msg-time { font-size: 10px; opacity: 0.6; margin-top: 2px; text-align: right; }
        .message.own .msg-time { color: var(--chat-own-text); }
        .message .msg-actions { display: flex; gap: 2px; margin-top: 2px; justify-content: flex-end; }
        .message .msg-actions button { background: none; border: none; font-size: 11px; cursor: pointer; opacity: 0.4; padding: 2px 4px; border-radius: 4px; color: inherit; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        
        .typing-indicator { font-size: 12px; color: var(--text-secondary); padding: 2px 20px 6px; min-height: 20px; flex-shrink: 0; }
        .typing-indicator.active { color: var(--primary); }
        
        /* Composer */
        .composer { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--bg-secondary); border-top: 1px solid var(--border-color); flex-shrink: 0; min-height: var(--composer-height); }
        .composer .attach-btn { background: none; border: none; color: var(--text-secondary); font-size: 22px; cursor: pointer; padding: 4px 6px; }
        .composer .attach-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .composer input { flex: 1; background: var(--bg-tertiary); border: none; border-radius: var(--radius); padding: 9px 14px; color: var(--text-primary); font-size: 14px; font-family: inherit; outline: none; min-width: 0; }
        .composer input::placeholder { color: var(--text-secondary); }
        .composer input:disabled { opacity: 0.4; cursor: not-allowed; }
        .composer .send-btn { background: var(--primary); color: white; border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .composer .send-btn:active { transform: scale(0.88); }
        .composer .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        
        /* Toast */
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg-secondary); color: var(--text-primary); padding: 10px 24px; border-radius: var(--radius); font-size: 14px; font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 999; opacity: 0; transition: all 0.4s ease; max-width: 92%; text-align: center; pointer-events: none; border: 1px solid var(--border-color); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: #FF3B30; }
        
        /* Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--bg-secondary); border-radius: 16px; padding: 28px; max-width: 400px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border-color); }
        .modal h2 { font-size: 20px; font-weight: 700; color: var(--text-primary); margin-bottom: 20px; text-align: center; }
        .modal .profile-pic-wrapper { position: relative; width: 100px; margin: 0 auto 20px; }
        .modal .profile-pic-wrapper img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: block; border: 3px solid var(--primary); }
        .modal .profile-pic-wrapper .upload-overlay { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 4px 14px; border-radius: 30px; font-size: 11px; font-weight: 500; cursor: pointer; white-space: nowrap; }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; }
        .modal .form-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--border-color); border-radius: var(--radius); font-size: 14px; font-family: inherit; background: var(--bg-dark); color: var(--text-primary); }
        .modal .form-group input:focus { border-color: var(--primary); outline: none; }
        .modal .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal .modal-actions button { flex: 1; padding: 10px; border: none; border-radius: var(--radius); font-weight: 600; font-size: 14px; cursor: pointer; }
        .modal .modal-actions .save-btn { background: var(--primary); color: white; }
        .modal .modal-actions .cancel-btn { background: var(--bg-tertiary); color: var(--text-primary); }
        
        /* Image Preview */
        .image-preview-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.92); z-index: 2000; justify-content: center; align-items: center; cursor: pointer; padding: 20px; }
        .image-preview-overlay.active { display: flex; }
        .image-preview-overlay .preview-content { position: relative; max-width: 95%; max-height: 95%; }
        .image-preview-overlay img { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 4px; }
        .image-preview-overlay .preview-actions { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .image-preview-overlay .preview-actions button { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .image-preview-overlay .preview-actions .download-btn { background: var(--primary); border-color: var(--primary); }
        
        @media (max-width: 768px) {
            .chat-list { max-width: 100%; position: absolute; z-index: 5; width: 100%; height: 100%; background: var(--bg-dark); transition: transform 0.3s ease; }
            .chat-list.hidden { transform: translateX(-100%); position: absolute; }
            .chat-list:not(.hidden) { transform: translateX(0); position: relative; }
            .chat-header .back-btn { display: flex !important; }
            .status-bar { display: none; }
            .friend-item .avatar { width: 44px; height: 44px; }
            .message { max-width: 90%; }
        }
        @media (min-width: 769px) {
            .chat-list.hidden { transform: none; position: relative; width: 420px; }
            .chat-header .back-btn { display: none !important; }
        }
    </style>
</head>
<body>

<!-- Status Bar -->
<div class="status-bar">
    <span class="time" id="statusTime">12:00</span>
    <span class="icons">📶 📶 🔋</span>
</div>

<!-- App -->
<div class="app-container">
    <!-- Header -->
    <header class="header">
        <div class="header-left">
            <img src="https://raw.githubusercontent.com/mdakash0003478-am/connectbd/main/logo.png.jpeg" alt="ConnectBD" class="logo" id="logoClick" />
            <div class="title">Connect<span>BD</span></div>
        </div>
        <div class="header-right">
            <div id="userProfile" class="user-profile" style="display:none;">
                <img id="miniAvatar" src="" alt="avatar" />
                <span class="name" id="miniName">User</span>
            </div>
            <button id="loginBtn" class="btn btn-primary">🔑 লগইন</button>
            <button id="logoutBtn" class="btn btn-danger" style="display:none;">🚪</button>
        </div>
    </header>

    <!-- Tabs -->
    <div class="tabs">
        <div class="tab active" data-tab="chats">💬 চ্যাট <span class="badge" id="friendCount">0</span></div>
        <div class="tab" data-tab="requests">📨 রিকোয়েস্ট <span class="badge danger" id="requestCount">0</span></div>
        <div class="tab" data-tab="search">🔍 খুঁজুন</div>
    </div>

    <!-- Main -->
    <div class="main-content">
        <!-- Chat List -->
        <div class="chat-list" id="chatList">
            <div class="search-bar">
                <input type="text" id="searchFriend" placeholder="বন্ধু খুঁজুন..." />
            </div>
            <div class="friend-list" id="friendList">
                <div class="empty-state"><div class="icon">💬</div><span>কোনো বন্ধু নেই</span></div>
            </div>
        </div>

        <!-- Chat Area -->
        <div class="chat-area">
            <div class="chat-header">
                <button class="back-btn" id="backBtn">←</button>
                <div class="chat-info" id="chatFriendInfo">
                    <span style="color:var(--text-secondary);font-weight:500;">💬 বন্ধু নির্বাচন করুন</span>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator"></div>

            <div class="messages" id="messagesContainer">
                <div class="empty-state"><div class="icon">💬</div><span>একটি চ্যাট শুরু করুন</span></div>
            </div>

            <div class="composer">
                <button class="attach-btn" id="fileUploadBtn" disabled>📎</button>
                <input type="text" id="messageInput" placeholder="মেসেজ লিখুন..." disabled />
                <button class="send-btn" id="sendBtn" disabled>➤</button>
            </div>
        </div>
    </div>
</div>

<!-- Profile Modal -->
<div class="modal-overlay" id="profileModal">
    <div class="modal">
        <h2>👤 প্রোফাইল</h2>
        <div class="profile-pic-wrapper">
            <img id="modalProfilePic" src="" alt="Profile" />
            <div class="upload-overlay" id="modalUploadPic">📸 পরিবর্তন</div>
        </div>
        <div class="form-group"><label>ডিসপ্লে নাম</label><input type="text" id="modalDisplayName" /></div>
        <div class="form-group"><label>ইমেইল</label><input type="email" id="modalEmail" disabled /></div>
        <div class="modal-actions">
            <button class="cancel-btn" id="modalCancel">বাতিল</button>
            <button class="save-btn" id="modalSave">💾 সেভ করুন</button>
        </div>
    </div>
</div>

<!-- Image Preview -->
<div class="image-preview-overlay" id="imagePreview">
    <div class="preview-content">
        <img id="previewImage" src="" alt="Preview" />
        <div class="preview-actions">
            <button class="download-btn" id="downloadPreviewBtn">⬇️</button>
            <button id="closePreviewBtn">✕</button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast" class="toast"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none;" />

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
    updateProfile as firebaseUpdateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
    getDatabase, ref, push, onChildAdded, set, get, update, onValue,
    query, limitToLast, orderByChild, remove, onChildRemoved, onChildChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// ===== FIREBASE CONFIG =====
const firebaseConfig = {
    apiKey: "AIzaSyDZliPdFlc3iQRMGxs5-hgcDGQYNdACqm4",
    authDomain: "connectbd-4a8f2.firebaseapp.com",
    databaseURL: "https://connectbd-4a8f2-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "connectbd-4a8f2",
    storageBucket: "connectbd-4a8f2.firebasestorage.app",
    messagingSenderId: "38217840543",
    appId: "1:38217840543:web:aeedd8517f697b16c12faa"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ===== DOM REFS =====
const $ = id => document.getElementById(id);
const DOM = {
    messages: $('messagesContainer'),
    messageInput: $('messageInput'),
    sendBtn: $('sendBtn'),
    loginBtn: $('loginBtn'),
    logoutBtn: $('logoutBtn'),
    userProfile: $('userProfile'),
    miniAvatar: $('miniAvatar'),
    miniName: $('miniName'),
    friendList: $('friendList'),
    friendCount: $('friendCount'),
    requestCount: $('requestCount'),
    chatFriendInfo: $('chatFriendInfo'),
    searchFriend: $('searchFriend'),
    toast: $('toast'),
    fileUpload: $('fileUploadBtn'),
    fileInput: $('fileInput'),
    logo: $('logoClick'),
    backBtn: $('backBtn'),
    chatList: $('chatList'),
    typingIndicator: $('typingIndicator'),
    profileModal: $('profileModal'),
    modalPic: $('modalProfilePic'),
    modalName: $('modalDisplayName'),
    modalEmail: $('modalEmail'),
    modalSave: $('modalSave'),
    modalCancel: $('modalCancel'),
    modalUpload: $('modalUploadPic'),
    imagePreview: $('imagePreview'),
    previewImage: $('previewImage'),
    downloadPreview: $('downloadPreviewBtn'),
    closePreview: $('closePreviewBtn')
};

const tabs = document.querySelectorAll('.tab');

// ===== STATE =====
let currentUser = null;
let currentChatFriend = null;
let messageListener = null;
let friends = {};
let requests = {};
let allUsersCache = {};
let unreadCounts = {};
let typingTimeout = null;
let toastTimeout = null;
let isMobile = window.innerWidth <= 768;
let friendsListener = null;
let requestsListener = null;
let allUsersListener = null;

// ===== TOAST =====
function showToast(msg, type = 'success') {
    if (toastTimeout) { clearTimeout(toastTimeout); DOM.toast.classList.remove('show'); }
    DOM.toast.textContent = msg;
    DOM.toast.className = 'toast';
    if (type === 'error') DOM.toast.classList.add('error');
    void DOM.toast.offsetWidth;
    DOM.toast.classList.add('show');
    toastTimeout = setTimeout(() => { DOM.toast.classList.remove('show'); toastTimeout = null; }, 3000);
}

// ===== STATUS TIME =====
function updateStatusTime() {
    const now = new Date();
    $('statusTime').textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
}
updateStatusTime();
setInterval(updateStatusTime, 30000);

// ===== IMAGE FUNCTIONS =====
function imageToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
    });
}

function downloadImage(src, filename = 'image.jpg') {
    try {
        const link = document.createElement('a');
        link.href = src;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('✅ ডাউনলোড শুরু!');
    } catch (e) { showToast('ডাউনলোড ব্যর্থ!', 'error'); }
}

// ===== SAVE USER =====
async function saveUserData(user) {
    try {
        const userRef = ref(db, `users/${user.uid}`);
        const snap = await get(userRef);
        if (!snap.exists()) {
            await set(userRef, {
                displayName: user.displayName || 'ইউজার',
                email: user.email || '',
                photoURL: user.photoURL || '',
                online: true,
                lastSeen: Date.now()
            });
        } else {
            await update(userRef, { online: true, lastSeen: Date.now() });
        }
        return true;
    } catch (e) { console.error('Save user error:', e); return false; }
}

// ===== UPDATE ONLINE STATUS =====
async function updateOnlineStatus(uid, isOnline) {
    if (!uid) return;
    try {
        await update(ref(db, `users/${uid}`), { online: isOnline, lastSeen: Date.now() });
        if (allUsersCache[uid]) allUsersCache[uid].online = isOnline;
        renderFriends();
        updateChatStatus();
        return true;
    } catch (e) { console.error('Online status error:', e); return false; }
}

// ===== UPDATE PROFILE =====
async function updateUserProfile(displayName, photoURL) {
    if (!currentUser) return;
    try {
        await update(ref(db, `users/${currentUser.uid}`), { displayName, photoURL });
        await firebaseUpdateProfile(auth.currentUser, { displayName, photoURL });
        showToast('✅ প্রোফাইল আপডেট!');
        updateUI(currentUser);
    } catch (e) { showToast(`আপডেট ব্যর্থ: ${e.message}`, 'error'); }
}

// ===== UPDATE UI =====
function updateUI(user) {
    currentUser = user;
    if (user) {
        DOM.userProfile.style.display = 'flex';
        DOM.miniAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=User&background=00A884&color=fff';
        DOM.miniName.textContent = user.displayName || 'User';
        DOM.loginBtn.style.display = 'none';
        DOM.logoutBtn.style.display = 'block';
        DOM.messageInput.disabled = false;
        DOM.sendBtn.disabled = false;
        DOM.fileUpload.disabled = false;
        loadFriendsAndRequests();
        loadAllUsers();
        switchTab('chats');
        // Update online status every 10 seconds
        if (window._onlineInterval) clearInterval(window._onlineInterval);
        window._onlineInterval = setInterval(() => {
            if (currentUser) updateOnlineStatus(currentUser.uid, true);
        }, 10000);
    } else {
        if (window._onlineInterval) clearInterval(window._onlineInterval);
        DOM.userProfile.style.display = 'none';
        DOM.loginBtn.style.display = 'block';
        DOM.logoutBtn.style.display = 'none';
        DOM.messageInput.disabled = true;
        DOM.sendBtn.disabled = true;
        DOM.fileUpload.disabled = true;
        DOM.messages.innerHTML = `<div class="empty-state"><div class="icon">🔑</div><span>চ্যাট শুরু করতে লগইন করুন</span></div>`;
        DOM.chatFriendInfo.innerHTML = `<span style="color:var(--text-secondary);font-weight:500;">💬 বন্ধু নির্বাচন করুন</span>`;
        DOM.friendList.innerHTML = `<div class="empty-state"><div class="icon">💬</div><span>কোনো বন্ধু নেই</span></div>`;
        DOM.friendCount.textContent = '0';
        DOM.requestCount.textContent = '0';
        currentChatFriend = null;
        if (messageListener) { messageListener(); messageListener = null; }
        if (friendsListener) { friendsListener(); friendsListener = null; }
        if (requestsListener) { requestsListener(); requestsListener = null; }
        if (allUsersListener) { allUsersListener(); allUsersListener = null; }
    }
}

// ===== LOAD ALL USERS =====
function loadAllUsers() {
    if (allUsersListener) { allUsersListener(); allUsersListener = null; }
    allUsersListener = onValue(ref(db, 'users'), (snapshot) => {
        const data = snapshot.val();
        if (data) {
            allUsersCache = data;
            Object.keys(friends).forEach(uid => {
                if (friends[uid] && allUsersCache[uid]) {
                    friends[uid].online = allUsersCache[uid].online || false;
                }
            });
            renderFriends();
            updateChatStatus();
        }
    });
}

// ===== LOAD FRIENDS & REQUESTS =====
function loadFriendsAndRequests() {
    if (!currentUser) return;
    if (friendsListener) { friendsListener(); friendsListener = null; }
    if (requestsListener) { requestsListener(); requestsListener = null; }
    
    friendsListener = onValue(ref(db, `friends/${currentUser.uid}`), (snapshot) => {
        const data = snapshot.val() || {};
        friends = {};
        Object.keys(data).forEach(uid => {
            friends[uid] = {
                ...data[uid],
                online: allUsersCache[uid]?.online || false
            };
        });
        DOM.friendCount.textContent = Object.keys(friends).length;
        const activeTab = document.querySelector('.tab.active');
        if (activeTab && activeTab.dataset.tab === 'chats') renderFriends();
        loadUnreadCounts();
    });
    
    requestsListener = onValue(ref(db, `friendRequests/${currentUser.uid}`), (snapshot) => {
        requests = snapshot.val() || {};
        const count = Object.keys(requests).filter(k => requests[k].status === 'pending').length;
        DOM.requestCount.textContent = count;
        const activeTab = document.querySelector('.tab.active');
        if (activeTab && activeTab.dataset.tab === 'requests') renderRequestsTab();
    });
}

// ===== LOAD UNREAD =====
function loadUnreadCounts() {
    if (!currentUser) return;
    onValue(ref(db, `unread/${currentUser.uid}`), (snapshot) => {
        unreadCounts = snapshot.val() || {};
        const activeTab = document.querySelector('.tab.active');
        if (activeTab && activeTab.dataset.tab === 'chats') renderFriends();
    });
}

// ===== MARK AS READ =====
async function markAsRead(friendUid) {
    if (!currentUser || !friendUid) return;
    await remove(ref(db, `unread/${currentUser.uid}/${friendUid}`));
    unreadCounts[friendUid] = 0;
    renderFriends();
}

// ===== RENDER FRIENDS =====
function renderFriends() {
    const searchTerm = DOM.searchFriend.value.toLowerCase();
    let html = '';
    const keys = Object.keys(friends);
    if (keys.length === 0) {
        html = `<div class="empty-state"><div class="icon">💬</div><span>কোনো বন্ধু নেই</span></div>`;
    } else {
        keys.forEach(uid => {
            const f = friends[uid];
            const name = f.displayName || 'ইউজার';
            const photo = f.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=00A884&color=fff';
            const unread = unreadCounts[uid] || 0;
            if (searchTerm && !name.toLowerCase().includes(searchTerm)) return;
            const isActive = currentChatFriend === uid;
            const isOnline = allUsersCache[uid]?.online || false;
            html += `
                <div class="friend-item ${isActive ? 'active' : ''}" data-uid="${uid}">
                    <img src="${photo}" class="avatar ${isOnline ? 'online' : ''}" loading="lazy" />
                    <div class="info">
                        <div class="name">${name}</div>
                        <div class="last-msg">${unread > 0 ? '🔴 নতুন মেসেজ' : isOnline ? '🟢 অনলাইন' : '⚪ অফলাইন'}</div>
                    </div>
                    <div class="meta">
                        <span class="time">${isOnline ? 'অনলাইন' : 'অফলাইন'}</span>
                        ${unread > 0 ? `<span class="unread danger">${unread}</span>` : ''}
                    </div>
                </div>
            `;
        });
    }
    DOM.friendList.innerHTML = html;
    document.querySelectorAll('.friend-item').forEach(el => {
        el.addEventListener('click', () => {
            const uid = el.dataset.uid;
            if (uid && friends[uid]) startChat(uid);
        });
    });
}

// ===== UPDATE CHAT STATUS =====
function updateChatStatus() {
    if (!currentChatFriend || !allUsersCache[currentChatFriend]) return;
    const isOnline = allUsersCache[currentChatFriend]?.online || false;
    const statusEl = document.querySelector('.chat-header .status');
    if (statusEl) {
        statusEl.textContent = isOnline ? '🟢 অনলাইন' : '⚪ অফলাইন';
        statusEl.className = `status ${isOnline ? 'online' : ''}`;
    }
}

// ===== TYPING =====
function handleTyping() {
    if (!currentUser || !currentChatFriend) return;
    const typingRef = ref(db, `typing/${currentChatFriend}/${currentUser.uid}`);
    set(typingRef, true);
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => remove(typingRef), 2000);
}

// ===== START CHAT =====
function startChat(friendUid) {
    if (!friends[friendUid]) { showToast('এই ইউজার আপনার বন্ধু নয়!', 'error'); return; }
    
    currentChatFriend = friendUid;
    const friend = friends[friendUid];
    const name = friend.displayName || 'ইউজার';
    const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=00A884&color=fff';
    const isOnline = allUsersCache[friendUid]?.online || false;
    
    DOM.chatFriendInfo.innerHTML = `
        <img src="${photo}" alt="${name}" />
        <div class="details">
            <div class="name">${name}</div>
            <div class="status ${isOnline ? 'online' : ''}">${isOnline ? '🟢 অনলাইন' : '⚪ অফলাইন'}</div>
        </div>
    `;
    
    markAsRead(friendUid);
    document.querySelectorAll('.friend-item').forEach(el => {
        el.classList.toggle('active', el.dataset.uid === friendUid);
    });
    
    if (isMobile) DOM.chatList.classList.add('hidden');
    
    loadPrivateMessages(friendUid);
    DOM.messageInput.disabled = false;
    DOM.sendBtn.disabled = false;
    DOM.fileUpload.disabled = false;
    DOM.messageInput.focus();
    
    // Listen for typing
    const typingRef = ref(db, `typing/${currentUser.uid}/${friendUid}`);
    onValue(typingRef, (snapshot) => {
        const isTyping = snapshot.val();
        const statusEl = document.querySelector('.chat-header .status');
        if (isTyping) {
            statusEl.textContent = '✍️ টাইপ করছে...';
            statusEl.className = 'status typing';
        } else {
            const online = allUsersCache[friendUid]?.online || false;
            statusEl.textContent = online ? '🟢 অনলাইন' : '⚪ অফলাইন';
            statusEl.className = `status ${online ? 'online' : ''}`;
        }
    });
}

// ===== LOAD MESSAGES =====
function loadPrivateMessages(friendUid) {
    if (messageListener) { messageListener(); messageListener = null; }
    const chatId = [currentUser.uid, friendUid].sort().join('_');
    const messagesRef = query(ref(db, `privateChats/${chatId}/messages`), orderByChild('timestamp'), limitToLast(50));
    DOM.messages.innerHTML = '';
    messageListener = onChildAdded(messagesRef, (snapshot) => {
        const msg = snapshot.val();
        if (!msg) return;
        if (DOM.messages.querySelector(`[data-key="${snapshot.key}"]`)) return;
        appendMessage(snapshot.key, msg);
    });
    onChildChanged(messagesRef, (snapshot) => {
        const msg = snapshot.val();
        const el = DOM.messages.querySelector(`[data-key="${snapshot.key}"]`);
        if (el) {
            const textEl = el.querySelector('.msg-text');
            if (textEl) {
                if (msg.image) textEl.innerHTML = `<img src="${msg.image}" onclick="window.openImagePreview('${msg.image}')" />`;
                else textEl.innerHTML = msg.text + (msg.edited ? ' <span style="font-size:10px;opacity:0.5;">(edited)</span>' : '');
            }
        }
    });
    onChildRemoved(messagesRef, (snapshot) => {
        const el = DOM.messages.querySelector(`[data-key="${snapshot.key}"]`);
        if (el) { el.style.opacity = '0.3'; el.querySelector('.msg-text').innerHTML = '🔴 ডিলিট করা হয়েছে'; }
    });
}

// ===== APPEND MESSAGE =====
function appendMessage(key, msg) {
    const isOwn = msg.uid === currentUser.uid;
    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' }) : '';
    const div = document.createElement('div');
    div.className = `message ${isOwn ? 'own' : ''}`;
    div.dataset.key = key;
    const avatar = msg.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(msg.displayName || 'U') + '&background=00A884&color=fff';
    let content = '';
    if (msg.image) {
        content = `<img src="${msg.image}" onclick="window.openImagePreview('${msg.image}')" />`;
    } else {
        content = msg.text + (msg.edited ? ' <span style="font-size:10px;opacity:0.5;">(edited)</span>' : '');
    }
    div.innerHTML = `
        <img src="${avatar}" class="msg-avatar" loading="lazy" />
        <div class="msg-bubble">
            <div class="msg-sender">${isOwn ? 'আপনি' : (msg.displayName || 'ইউজার')}</div>
            <div class="msg-text">${content}</div>
            <div class="msg-time">${time}</div>
            ${isOwn ? `<div class="msg-actions"><button class="edit-btn" data-key="${key}">✏️</button><button class="delete-btn" data-key="${key}">🗑️</button></div>` : ''}
        </div>
    `;
    DOM.messages.appendChild(div);
    DOM.messages.scrollTop = DOM.messages.scrollHeight;
    if (isOwn) {
        div.querySelector('.edit-btn')?.addEventListener('click', () => editMessage(key, msg.text));
        div.querySelector('.delete-btn')?.addEventListener('click', () => deleteMessage(key));
    }
}

// ===== GLOBAL IMAGE PREVIEW =====
window.openImagePreview = function(src) {
    DOM.previewImage.src = src;
    DOM.imagePreview.classList.add('active');
};

// ===== DELETE / EDIT MESSAGE =====
async function deleteMessage(key) {
    if (!currentUser || !currentChatFriend || !confirm('মেসেজ ডিলিট করতে চান?')) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    try {
        await update(ref(db, `privateChats/${chatId}/messages/${key}`), { text: '🔴 ডিলিট করা হয়েছে', deleted: true });
        showToast('✅ ডিলিট করা হয়েছে');
    } catch(e) { showToast('ডিলিট ব্যর্থ!', 'error'); }
}
async function editMessage(key, oldText) {
    if (!currentUser || !currentChatFriend) return;
    const newText = prompt('মেসেজ এডিট করুন:', oldText);
    if (!newText || newText === oldText) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    try {
        await update(ref(db, `privateChats/${chatId}/messages/${key}`), { text: newText, edited: true, editedAt: Date.now() });
        showToast('✅ এডিট করা হয়েছে');
    } catch(e) { showToast('এডিট ব্যর্থ!', 'error'); }
}

// ===== SEND MESSAGE =====
async function sendPrivateMessage() {
    const text = DOM.messageInput.value.trim();
    if (!text || !currentUser || !currentChatFriend) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    const newMsgRef = push(ref(db, `privateChats/${chatId}/messages`));
    await set(newMsgRef, {
        text, uid: currentUser.uid, displayName: currentUser.displayName || 'ইউজার',
        photoURL: currentUser.photoURL || '', timestamp: Date.now()
    });
    const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
    const snap = await get(unreadRef);
    await set(unreadRef, (snap.val() || 0) + 1);
    DOM.messageInput.value = '';
    DOM.messageInput.focus();
}

// ===== SEND IMAGE =====
async function sendImageMessage(file) {
    if (!file || !currentUser || !currentChatFriend) { showToast('ছবি পাঠাতে ব্যর্থ!', 'error'); return; }
    try {
        showToast('📤 ছবি প্রস্তুত হচ্ছে...', 'success');
        const base64 = await imageToBase64(file);
        const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
        const newMsgRef = push(ref(db, `privateChats/${chatId}/messages`));
        await set(newMsgRef, {
            text: '📷',
            image: base64,
            uid: currentUser.uid,
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            timestamp: Date.now(),
            fileName: file.name
        });
        const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
        const snap = await get(unreadRef);
        await set(unreadRef, (snap.val() || 0) + 1);
        showToast('✅ ছবি পাঠানো হয়েছে!');
    } catch (e) { showToast(`ছবি পাঠাতে ব্যর্থ: ${e.message}`, 'error'); }
}

// ===== FILE UPLOAD =====
DOM.fileUpload.addEventListener('click', () => {
    if (!currentUser || !currentChatFriend) { showToast('প্রথমে চ্যাট নির্বাচন করুন!', 'error'); return; }
    DOM.fileInput.click();
});
DOM.fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('শুধু ছবি আপলোড করুন!', 'error'); DOM.fileInput.value = ''; return; }
    if (file.size > 2 * 1024 * 1024) { showToast('ছবি 2MB এর কম হতে হবে!', 'error'); DOM.fileInput.value = ''; return; }
    await sendImageMessage(file);
    DOM.fileInput.value = '';
});

// ===== SWITCH TAB =====
function switchTab(tabName) {
    tabs.forEach(t => t.classList.remove('active'));
    const target = document.querySelector(`[data-tab="${tabName}"]`);
    if (target) target.classList.add('active');
    if (isMobile) { DOM.chatList.classList.remove('hidden'); DOM.chatList.style.display = 'flex'; }
    if (tabName === 'chats') renderFriends();
    else if (tabName === 'requests') renderRequestsTab();
    else if (tabName === 'search') renderSearchTab();
}

tabs.forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));

// ===== RENDER REQUESTS TAB =====
function renderRequestsTab() {
    let html = '';
    const pending = Object.keys(requests).filter(k => requests[k].status === 'pending');
    if (pending.length === 0) {
        html = `<div class="empty-state"><div class="icon">📨</div><span>কোনো রিকোয়েস্ট নেই</span></div>`;
    } else {
        pending.forEach(uid => {
            const req = requests[uid];
            const name = req.displayName || 'ইউজার';
            const photo = req.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=00A884&color=fff';
            html += `
                <div class="friend-item" style="cursor:default;" data-uid="${uid}">
                    <img src="${photo}" class="avatar" loading="lazy" />
                    <div class="info"><div class="name">${name}</div><div class="last-msg" style="color:var(--text-secondary);">📨 রিকোয়েস্ট</div></div>
                    <div class="meta" style="flex-direction:row;gap:4px;">
                        <button class="btn btn-primary" style="padding:4px 12px;font-size:12px;" data-uid="${uid}">✅ গ্রহণ</button>
                        <button class="btn btn-danger" style="padding:4px 12px;font-size:12px;" data-uid="${uid}">❌ বাতিল</button>
                    </div>
                </div>
            `;
        });
    }
    DOM.friendList.innerHTML = html;
    document.querySelectorAll('.btn-primary[data-uid]').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); acceptFriendRequest(b.dataset.uid); }));
    document.querySelectorAll('.btn-danger[data-uid]').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); rejectFriendRequest(b.dataset.uid); }));
}

// ===== RENDER SEARCH TAB =====
function renderSearchTab() {
    let html = `
        <div style="padding:12px;">
            <div style="display:flex;gap:8px;margin-bottom:12px;">
                <input type="text" id="searchUserInput" placeholder="ইমেইল বা নাম..." style="flex:1;background:var(--bg-tertiary);border:none;border-radius:8px;padding:8px 14px;color:var(--text-primary);font-size:14px;font-family:inherit;outline:none;" />
                <button id="searchUserBtn" class="btn btn-primary" style="padding:8px 16px;font-size:12px;">খুঁজুন</button>
            </div>
            <div id="searchResults"></div>
        </div>
    `;
    DOM.friendList.innerHTML = html;
    $('searchUserBtn')?.addEventListener('click', async () => {
        const query = $('searchUserInput').value.trim().toLowerCase();
        if (!query) { $('searchResults').innerHTML = ''; return; }
        if (!currentUser) { showToast('লগইন করুন!', 'error'); return; }
        const found = Object.keys(allUsersCache).filter(uid => {
            if (uid === currentUser.uid) return false;
            const u = allUsersCache[uid];
            const name = (u.displayName || '').toLowerCase();
            const email = (u.email || '').toLowerCase();
            return name.includes(query) || email.includes(query);
        });
        const results = $('searchResults');
        if (found.length === 0) { results.innerHTML = `<div style="color:var(--text-secondary);text-align:center;padding:20px;">কোনো ইউজার পাওয়া যায়নি</div>`; return; }
        let html2 = '';
        found.forEach(uid => {
            const u = allUsersCache[uid];
            const isFriend = friends[uid];
            const isRequested = requests[uid] && requests[uid].status === 'pending';
            const photo = u.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(u.displayName || 'U') + '&background=00A884&color=fff';
            html2 += `
                <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border-color);">
                    <img src="${photo}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;" loading="lazy" />
                    <span style="flex:1;font-size:14px;font-weight:500;">${u.displayName || 'ইউজার'}</span>
                    ${isFriend ? '<span style="color:var(--primary);font-size:12px;font-weight:600;">✅ বন্ধু</span>' :
                    isRequested ? '<span style="color:#F59E0B;font-size:12px;font-weight:600;">⏳ রিকোয়েস্ট পাঠানো</span>' :
                    `<button class="btn btn-primary" style="padding:4px 14px;font-size:12px;" data-uid="${uid}">➕ বন্ধু করুন</button>`
                    }
                </div>
            `;
        });
        results.innerHTML = html2;
        document.querySelectorAll('#searchResults .btn-primary').forEach(b => b.addEventListener('click', () => sendFriendRequest(b.dataset.uid)));
    });
}

// ===== FRIEND REQUESTS =====
async function acceptFriendRequest(fromUid) {
    if (!currentUser) return;
    try {
        const snap = await get(ref(db, `users/${fromUid}`));
        const senderData = snap.val();
        if (!senderData) { showToast('ইউজার পাওয়া যায়নি!', 'error'); return; }
        await set(ref(db, `friends/${currentUser.uid}/${fromUid}`), {
            displayName: senderData.displayName || 'ইউজার',
            photoURL: senderData.photoURL || '',
            online: senderData.online || false,
            addedAt: Date.now()
        });
        await set(ref(db, `friends/${fromUid}/${currentUser.uid}`), {
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            online: true,
            addedAt: Date.now()
        });
        await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
        showToast('বন্ধু রিকোয়েস্ট গ্রহণ করা হয়েছে! 🎉');
        friends[fromUid] = senderData;
        DOM.friendCount.textContent = Object.keys(friends).length;
        switchTab('chats');
        setTimeout(() => { renderFriends(); if (isMobile) { DOM.chatList.classList.remove('hidden'); DOM.chatList.style.display = 'flex'; } }, 200);
    } catch(e) { showToast(`এক্সেপ্ট ব্যর্থ: ${e.message}`, 'error'); }
}
async function rejectFriendRequest(fromUid) {
    if (!currentUser) return;
    try { await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`)); showToast('রিকোয়েস্ট রিজেক্ট করা হয়েছে'); renderRequestsTab(); }
    catch(e) { showToast(`রিজেক্ট ব্যর্থ: ${e.message}`, 'error'); }
}
async function sendFriendRequest(toUid) {
    if (!currentUser) return;
    if (toUid === currentUser.uid) { showToast('নিজেকে রিকোয়েস্ট পাঠানো যায় না!', 'error'); return; }
    if (friends[toUid]) { showToast('ইতিমধ্যে বন্ধু!', 'error'); return; }
    if (requests[toUid] && requests[toUid].status === 'pending') { showToast('ইতিমধ্যে রিকোয়েস্ট পাঠানো!', 'error'); return; }
    try {
        const snap = await get(ref(db, `users/${toUid}`));
        if (!snap.exists()) { showToast('ইউজার পাওয়া যায়নি!', 'error'); return; }
        await set(ref(db, `friendRequests/${toUid}/${currentUser.uid}`), {
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            status: 'pending',
            timestamp: Date.now()
        });
        showToast('ফ্রেন্ড রিকোয়েস্ট পাঠানো হয়েছে! 📨');
        $('searchResults').innerHTML = `<div style="color:var(--primary);text-align:center;padding:8px;">✅ রিকোয়েস্ট পাঠানো হয়েছে</div>`;
    } catch(e) { showToast(`রিকোয়েস্ট ব্যর্থ: ${e.message}`, 'error'); }
}

// ===== EVENT LISTENERS =====
DOM.sendBtn.onclick = sendPrivateMessage;
DOM.messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendPrivateMessage(); });
DOM.messageInput.addEventListener('input', handleTyping);
DOM.backBtn.addEventListener('click', () => { DOM.chatList.classList.remove('hidden'); DOM.chatList.style.display = 'flex'; });

// ===== LOGIN =====
DOM.loginBtn.onclick = async () => {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        await saveUserData(user);
        showToast(`স্বাগতম ${user.displayName || 'ইউজার'}! 🎉`);
    } catch (e) {
        if (e.code !== 'auth/popup-closed-by-user') {
            showToast(`লগইন ব্যর্থ: ${e.message}`, 'error');
            console.error('Login error:', e);
        }
    }
};

// ===== LOGOUT =====
DOM.logoutBtn.onclick = async () => {
    try {
        if (currentUser) await updateOnlineStatus(currentUser.uid, false);
        await signOut(auth);
        showToast('সাইন আউট করা হয়েছে।');
    } catch(e) { showToast(`সাইন আউট ব্যর্থ: ${e.message}`, 'error'); }
};

// ===== AUTH STATE =====
onAuthStateChanged(auth, async (user) => {
    updateUI(user);
    if (user) {
        await saveUserData(user);
        await updateOnlineStatus(user.uid, true);
    }
});

// ===== PROFILE MODAL =====
DOM.userProfile.addEventListener('click', () => {
    if (!currentUser) return;
    DOM.modalPic.src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=00A884&color=fff';
    DOM.modalName.value = currentUser.displayName || '';
    DOM.modalEmail.value = currentUser.email || '';
    DOM.profileModal.classList.add('active');
});
DOM.logo.addEventListener('click', () => {
    if (!currentUser) return;
    DOM.modalPic.src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=00A884&color=fff';
    DOM.modalName.value = currentUser.displayName || '';
    DOM.modalEmail.value = currentUser.email || '';
    DOM.profileModal.classList.add('active');
});
DOM.modalUpload.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) { showToast('ছবি 2MB এর কম হতে হবে!', 'error'); return; }
        showToast('📤 আপলোড হচ্ছে...', 'success');
        const base64 = await imageToBase64(file);
        if (base64) { DOM.modalPic.src = base64; showToast('✅ প্রোফাইল ছবি আপলোড হয়েছে!'); }
    };
    input.click();
});
DOM.modalCancel.addEventListener('click', () => DOM.profileModal.classList.remove('active'));
DOM.modalSave.addEventListener('click', async () => {
    const name = DOM.modalName.value.trim();
    const photo = DOM.modalPic.src;
    if (!name) { showToast('নাম দেওয়া আবশ্যক!', 'error'); return; }
    await updateUserProfile(name, photo);
    DOM.profileModal.classList.remove('active');
});
DOM.profileModal.addEventListener('click', (e) => { if (e.target === DOM.profileModal) DOM.profileModal.classList.remove('active'); });

// ===== IMAGE PREVIEW =====
DOM.downloadPreview.addEventListener('click', () => {
    const src = DOM.previewImage.src;
    if (src) downloadImage(src);
});
DOM.closePreview.addEventListener('click', () => DOM.imagePreview.classList.remove('active'));
DOM.imagePreview.addEventListener('click', (e) => { if (e.target === DOM.imagePreview) DOM.imagePreview.classList.remove('active'); });

// ===== WINDOW RESIZE =====
window.addEventListener('resize', () => {
    isMobile = window.innerWidth <= 768;
    if (!isMobile) { DOM.chatList.classList.remove('hidden'); DOM.chatList.style.display = 'flex'; }
});

// ===== BEFORE UNLOAD =====
window.addEventListener('beforeunload', () => {
    if (currentUser) updateOnlineStatus(currentUser.uid, false);
});

console.log('✅ ConnectBD Ready!');
console.log('📱 চ্যাট, বন্ধু, রিকোয়েস্ট সব কাজ করবে!');
</script>
</body>
