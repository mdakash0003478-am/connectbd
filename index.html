<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ConnectBD - Private Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #1976D2;
            --primary-dark: #1565C0;
            --primary-light: #bbdefb;
            --success: #4caf50;
            --danger: #d32f2f;
            --bg-start: #f6f9fc;
            --bg-end: #eaf3f9;
            --shadow: 0 30px 60px -20px rgba(0, 20, 40, 0.3);
            --radius: 24px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(145deg, var(--bg-start) 0%, var(--bg-end) 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            margin: 0;
            touch-action: manipulation;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: var(--radius);
            padding: clamp(12px, 3vw, 32px);
            max-width: 1100px;
            width: 100%;
            box-shadow: var(--shadow);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-height: 98vh;
            max-height: 98dvh;
            display: flex;
            flex-direction: column;
            transition: var(--transition);
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: clamp(8px, 1.5vw, 16px);
            border-bottom: 2px solid rgba(60, 130, 180, 0.12);
            flex-wrap: wrap;
            gap: 8px;
            flex-shrink: 0;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .app-logo {
            width: clamp(36px, 5vw, 48px);
            height: clamp(36px, 5vw, 48px);
            border-radius: 50%;
            object-fit: cover;
            background: white;
            padding: 3px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
        }

        .app-logo:active {
            transform: scale(0.92);
        }

        .app-title {
            font-size: clamp(1.1rem, 3vw, 1.6rem);
            font-weight: 700;
            color: #0b2b40;
            line-height: 1.1;
        }

        .app-title span {
            color: var(--primary);
        }

        .app-title small {
            font-size: clamp(0.55rem, 1.2vw, 0.75rem);
            font-weight: 400;
            color: #3b5c6e;
            display: block;
            margin-top: -2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.6);
            padding: 4px 12px 4px 6px;
            border-radius: 40px;
            border: 1px solid rgba(200, 215, 225, 0.5);
            cursor: pointer;
            transition: var(--transition);
        }

        .user-profile-mini:active {
            transform: scale(0.96);
        }

        .user-profile-mini img {
            width: clamp(28px, 4vw, 32px);
            height: clamp(28px, 4vw, 32px);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .user-profile-mini .user-name {
            font-size: clamp(0.7rem, 1.5vw, 0.85rem);
            font-weight: 500;
            color: #0b2b40;
            max-width: clamp(80px, 15vw, 120px);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .header-btn {
            background: transparent;
            border: 1px solid #b6ccdd;
            padding: clamp(4px, 1vw, 6px) clamp(10px, 2vw, 16px);
            border-radius: 40px;
            font-size: clamp(0.65rem, 1.2vw, 0.8rem);
            font-weight: 500;
            color: #2f536b;
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
            white-space: nowrap;
        }

        .header-btn:active {
            transform: scale(0.94);
        }

        .header-btn.primary {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }

        .header-btn.primary:active {
            background: var(--primary-dark);
        }

        .header-btn.danger {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .header-btn.danger:active {
            background: #b71c1c;
        }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            display: flex;
            gap: clamp(10px, 2vw, 24px);
            flex: 1;
            min-height: 0;
            padding-top: clamp(8px, 1.5vw, 16px);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: clamp(200px, 28vw, 260px);
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: clamp(8px, 1.5vw, 16px);
            border: 1px solid rgba(255, 255, 255, 0.6);
            max-height: clamp(300px, 60vh, 550px);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: var(--transition);
        }

        .sidebar-section {
            margin-bottom: clamp(6px, 1vw, 12px);
            flex-shrink: 0;
        }

        .sidebar-section:last-child {
            margin-bottom: 0;
        }

        .sidebar-title {
            font-size: clamp(0.6rem, 1vw, 0.75rem);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #53768b;
            font-weight: 600;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-count {
            background: var(--primary);
            color: white;
            font-size: clamp(0.5rem, 0.8vw, 0.6rem);
            padding: 1px 8px;
            border-radius: 20px;
            min-width: 20px;
            text-align: center;
        }

        .badge-count.unread {
            background: #ff4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .search-box {
            width: 100%;
            padding: clamp(4px, 0.8vw, 6px) clamp(8px, 1.5vw, 12px);
            border: 1px solid #dce3e9;
            border-radius: 20px;
            font-size: clamp(0.7rem, 1.2vw, 0.8rem);
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            margin-bottom: 4px;
            transition: var(--transition);
            -webkit-appearance: none;
        }

        .search-box:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.08);
        }

        .friend-list-scroll {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 0;
        }

        .friend-list-scroll::-webkit-scrollbar {
            width: 3px;
        }

        .friend-list-scroll::-webkit-scrollbar-thumb {
            background: #b6ccdd;
            border-radius: 10px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: clamp(6px, 1vw, 10px);
            padding: clamp(6px, 1vw, 8px) clamp(8px, 1.5vw, 12px);
            border-radius: 12px;
            cursor: pointer;
            transition: var(--transition);
            margin-bottom: 2px;
            position: relative;
            touch-action: manipulation;
        }

        .friend-item:active {
            transform: scale(0.97);
            background: rgba(25, 118, 210, 0.12);
        }

        .friend-item.active {
            background: rgba(25, 118, 210, 0.15);
            font-weight: 600;
        }

        .friend-item img {
            width: clamp(28px, 4vw, 32px);
            height: clamp(28px, 4vw, 32px);
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
            flex-shrink: 0;
        }

        .friend-item .friend-name {
            flex: 1;
            font-size: clamp(0.75rem, 1.3vw, 0.9rem);
            color: #1f4c66;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            min-width: 0;
        }

        .friend-item .status-dot {
            width: clamp(6px, 1vw, 8px);
            height: clamp(6px, 1vw, 8px);
            border-radius: 50%;
            background: var(--success);
            display: inline-block;
            flex-shrink: 0;
        }

        .friend-item .status-dot.offline {
            background: #bdbdbd;
        }

        .friend-item .unread-badge {
            background: #ff4444;
            color: white;
            font-size: clamp(0.5rem, 0.8vw, 0.6rem);
            padding: 1px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        .request-item {
            display: flex;
            align-items: center;
            gap: clamp(6px, 1vw, 10px);
            padding: clamp(4px, 0.8vw, 6px) clamp(6px, 1vw, 10px);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 4px;
            font-size: clamp(0.7rem, 1.2vw, 0.85rem);
        }

        .request-item img {
            width: clamp(24px, 3vw, 28px);
            height: clamp(24px, 3vw, 28px);
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .request-item .req-name {
            flex: 1;
            color: #1f4c66;
            font-size: clamp(0.7rem, 1.1vw, 0.8rem);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .request-item .req-actions {
            display: flex;
            gap: 4px;
            flex-shrink: 0;
        }

        .request-item .req-actions button {
            padding: 2px 10px;
            border: none;
            border-radius: 20px;
            font-size: clamp(0.6rem, 1vw, 0.7rem);
            cursor: pointer;
            font-weight: 600;
            touch-action: manipulation;
            transition: var(--transition);
        }

        .request-item .req-actions button:active {
            transform: scale(0.92);
        }

        .btn-accept {
            background: var(--success);
            color: white;
        }
        .btn-accept:active { background: #388e3c; }

        .btn-reject {
            background: #ef5350;
            color: white;
        }
        .btn-reject:active { background: #c62828; }

        /* ===== CHAT AREA ===== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: clamp(4px, 0.8vw, 8px);
            border-bottom: 1px solid rgba(60, 130, 180, 0.1);
            flex-shrink: 0;
            flex-wrap: wrap;
            gap: 4px;
        }

        .chat-header .chat-friend-name {
            font-weight: 600;
            color: #0b2b40;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            display: flex;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .chat-header .chat-friend-name img {
            width: clamp(24px, 3vw, 28px);
            height: clamp(24px, 3vw, 28px);
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }

        .chat-header .chat-friend-name span {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-header .chat-status {
            font-size: clamp(0.6rem, 1vw, 0.75rem);
            color: #53768b;
            flex-shrink: 0;
        }

        .chat-header .chat-status.online {
            color: var(--success);
        }

        .chat-header .chat-status.typing {
            color: var(--primary);
            animation: pulse 1s infinite;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: clamp(8px, 1.5vw, 12px) 4px;
            margin: clamp(4px, 0.8vw, 8px) 0;
            max-height: clamp(200px, 55vh, 380px);
            min-height: clamp(120px, 30vh, 200px);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .message {
            display: flex;
            gap: 8px;
            max-width: 88%;
            animation: fadeIn 0.2s ease;
            position: relative;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message .msg-avatar {
            width: clamp(24px, 3vw, 32px);
            height: clamp(24px, 3vw, 32px);
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid white;
        }

        .message .msg-bubble {
            background: white;
            padding: clamp(6px, 1.2vw, 10px) clamp(10px, 1.8vw, 14px);
            border-radius: 18px;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            word-wrap: break-word;
            flex: 1;
            position: relative;
            max-width: 100%;
        }

        .message.own .msg-bubble {
            background: var(--primary);
            color: white;
            border-top-left-radius: 18px;
            border-top-right-radius: 4px;
        }

        .message .msg-sender {
            font-size: clamp(0.55rem, 0.9vw, 0.7rem);
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 2px;
        }

        .message.own .msg-sender {
            color: var(--primary-light);
        }

        .message .msg-text {
            font-size: clamp(0.8rem, 1.4vw, 0.92rem);
            line-height: 1.4;
            word-break: break-word;
        }

        .message .msg-text .image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        .message .msg-text .image-container img {
            max-width: min(100%, 280px);
            max-height: clamp(120px, 40vh, 300px);
            border-radius: 8px;
            margin: 4px 0;
            cursor: pointer;
            transition: var(--transition);
            display: block;
        }

        .message .msg-text .image-container img:active {
            transform: scale(0.98);
        }

        .message .msg-text .image-container .image-actions {
            position: absolute;
            bottom: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: var(--transition);
        }

        .message .msg-text .image-container:hover .image-actions,
        .message .msg-text .image-container:active .image-actions {
            opacity: 1;
        }

        .message .msg-text .image-container .image-actions button {
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: clamp(28px, 4vw, 32px);
            height: clamp(28px, 4vw, 32px);
            cursor: pointer;
            font-size: clamp(0.6rem, 1vw, 0.8rem);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .message .msg-text .image-container .image-actions button:active {
            transform: scale(0.88);
        }

        .message .msg-time {
            font-size: clamp(0.5rem, 0.8vw, 0.6rem);
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .message.own .msg-time {
            color: var(--primary-light);
        }

        .typing-indicator-global {
            font-size: clamp(0.6rem, 0.9vw, 0.7rem);
            color: var(--primary);
            font-style: italic;
            padding: 2px 8px;
            min-height: 18px;
            flex-shrink: 0;
        }

        .input-area {
            display: flex;
            gap: 6px;
            margin-top: 4px;
            padding-top: 8px;
            border-top: 1px solid rgba(60, 130, 180, 0.1);
            flex-wrap: wrap;
            flex-shrink: 0;
        }

        .input-area .input-wrapper {
            flex: 1;
            display: flex;
            gap: 6px;
            min-width: 0;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: clamp(8px, 1.5vw, 10px) clamp(12px, 2vw, 16px);
            border: 1px solid #dce3e9;
            border-radius: 30px;
            font-size: clamp(0.85rem, 1.5vw, 0.95rem);
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            transition: var(--transition);
            min-width: 0;
            -webkit-appearance: none;
        }

        .input-area input[type="text"]:focus {
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.08);
        }

        .input-area input[type="text"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-area .file-upload-btn {
            padding: clamp(8px, 1.5vw, 10px) clamp(12px, 2vw, 16px);
            background: var(--success);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: clamp(0.8rem, 1.5vw, 1rem);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 4px;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .input-area .file-upload-btn:active:not(:disabled) {
            transform: scale(0.92);
            background: #388e3c;
        }

        .input-area .file-upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-area .send-btn {
            padding: clamp(8px, 1.5vw, 10px) clamp(16px, 3vw, 24px);
            border: none;
            background: var(--primary);
            color: white;
            border-radius: 30px;
            font-weight: 600;
            font-size: clamp(0.85rem, 1.5vw, 0.95rem);
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            touch-action: manipulation;
            flex-shrink: 0;
        }

        .input-area .send-btn:active:not(:disabled) {
            transform: scale(0.92);
            background: var(--primary-dark);
        }

        .input-area .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            color: #53768b;
            padding: clamp(20px, 5vh, 40px) 0;
            font-size: clamp(0.8rem, 1.4vw, 0.9rem);
        }

        .empty-state .icon {
            font-size: clamp(2rem, 5vw, 3rem);
            margin-bottom: 8px;
        }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: clamp(16px, 3vh, 24px);
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e7e34;
            color: white;
            padding: clamp(10px, 2vw, 14px) clamp(20px, 4vw, 32px);
            border-radius: 40px;
            font-weight: 500;
            font-size: clamp(0.8rem, 1.5vw, 0.95rem);
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 92%;
            text-align: center;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: var(--danger);
        }

        /* ===== MODALS ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: clamp(20px, 4vw, 32px);
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h2 {
            color: #0b2b40;
            margin-bottom: 1rem;
            font-size: clamp(1.2rem, 3vw, 1.5rem);
        }

        .modal .profile-pic-wrapper {
            position: relative;
            width: 100px;
            margin: 0 auto 1rem;
        }

        .modal .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 3px solid var(--primary);
        }

        .modal .profile-pic-wrapper .upload-overlay {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: clamp(0.5rem, 0.8vw, 0.6rem);
            cursor: pointer;
            touch-action: manipulation;
            white-space: nowrap;
        }

        .modal .profile-pic-wrapper .upload-overlay:active {
            transform: translateX(-50%) scale(0.94);
        }

        .modal .form-group {
            margin-bottom: 1rem;
        }

        .modal .form-group label {
            display: block;
            font-size: clamp(0.7rem, 1.2vw, 0.8rem);
            color: #53768b;
            margin-bottom: 4px;
        }

        .modal .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #dce3e9;
            border-radius: 12px;
            font-size: clamp(0.85rem, 1.5vw, 0.95rem);
            -webkit-appearance: none;
        }

        .modal .form-group input:focus {
            border-color: var(--primary);
            outline: none;
        }

        .modal .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
        }

        .modal .modal-actions button {
            flex: 1;
            padding: clamp(8px, 1.5vw, 10px);
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: clamp(0.8rem, 1.3vw, 0.9rem);
            cursor: pointer;
            transition: var(--transition);

        /* ===== IMAGE PREVIEW ===== */
        .image-preview-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.92);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            padding: 20px;
        }

        .image-preview-overlay.active {
            display: flex;
        }

        .image-preview-overlay .preview-content {
            position: relative;
            max-width: 95%;
            max-height: 95%;
        }

        .image-preview-overlay img {
            max-width: 100%;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .image-preview-overlay .preview-actions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .image-preview-overlay .preview-actions button {
            background: rgba(255,255,255,0.15);

            height: clamp(40px, 6vw, 44px);

            font-size: clamp(1rem, 2vw, 1.2rem);
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }

        .image-preview-overlay .preview-actions button:active {
            transform: scale(0.88);
        }

        .image-preview-overlay .preview-actions .download-btn-preview {
            background: var(--primary);
            border-color: var(--primary);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            body { padding: 6px; }
            .app-container { padding: 12px; border-radius: 20px; }
            .main-content { flex-direction: column; gap: 10px; }
            .sidebar {
                width: 100%;
                max-height: 180px;
                flex-direction: row;
                flex-wrap: wrap;

                gap: 6px;
            }
            .sidebar-section {
                flex: 1;
                min-width: 120px;

            }
            .sidebar-section:last-child { flex: 0 0 100%; }
            .friend-list-scroll { max-height: 60px; }
            .messages-container { max-height: 200px; min-height: 120px; }

            .header-right .header-btn { padding: 4px 10px; font-size: 0.65rem; }
            .user-profile-mini { padding: 3px 8px 3px 4px; }
        }

        @media (max-width: 480px) {
            .app-container { padding: 8px; border-radius: 16px; }
            .sidebar { max-height: 150px; padding: 8px; }
            .friend-list-scroll { max-height: 50px; }
            .messages-container { max-height: 160px; min-height: 100px; }
            .message .msg-text .image-container img { max-height: 100px; }
            .input-area .input-wrapper { flex-wrap: wrap; }
            .input-area .send-btn { flex: 1; }
        }

        @media (max-width: 380px) {
            .sidebar { max-height: 130px; }
            .friend-list-scroll { max-height: 40px; }
            .messages-container { max-height: 120px; min-height: 80px; }
            .app-title { font-size: 0.95rem; }
        }

        /* ===== SAFE AREA ===== */
        @supports (padding: max(0px)) {
            .app-container {
                padding-left: max(12px, env(safe-area-inset-left));
                padding-right: max(12px, env(safe-area-inset-right));
                padding-top: max(12px, env(safe-area-inset-top));
                padding-bottom: max(12px, env(safe-area-inset-bottom));
            }
        }

        /* ===== DARK MODE SUPPORT ===== */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-start: #1a2634;
                --bg-end: #0f1a24;
            }
            .app-container {
                background: rgba(30, 40, 50, 0.92);

            .search-box::placeholder { color: #8aa3b8; }

            .modal { background: #1a2634; }

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            GoogleAuthProvider,
            signInWithPopup,
            signOut,
            onAuthStateChanged,
            updateProfile as firebaseUpdateProfile
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getDatabase,
            ref,
            push,
            onChildAdded,
            set,
            get,
            update,
            onValue,
            query,
            limitToLast,
            orderByChild,
            remove,
            onChildRemoved,
            onChildChanged
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZliPdFlc3iQRMGxs5-hgcDGQYNdACqm4",
            authDomain: "connectbd-4a8f2.firebaseapp.com",
            databaseURL: "https://connectbd-4a8f2-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "connectbd-4a8f2",
            storageBucket: "connectbd-4a8f2.firebasestorage.app",
            messagingSenderId: "38217840543",
            appId: "1:38217840543:web:aeedd8517f697b16c12faa",
            measurementId: "G-RPBSS1M9LD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // DOM Elements
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userProfileMini = document.getElementById('userProfileMini');
        const miniAvatar = document.getElementById('miniAvatar');
        const miniName = document.getElementById('miniName');
        const friendList = document.getElementById('friendList');
        const requestList = document.getElementById('requestList');
        const friendCount = document.getElementById('friendCount');
        const requestCount = document.getElementById('requestCount');
        const chatFriendInfo = document.getElementById('chatFriendInfo');
        const chatStatus = document.getElementById('chatStatus');
        const searchUser = document.getElementById('searchUser');
        const searchUserBtn = document.getElementById('searchUserBtn');
        const searchResults = document.getElementById('searchResults');
        const searchFriend = document.getElementById('searchFriend');
        const toastEl = document.getElementById('toast');
        const fileUploadBtn = document.getElementById('fileUploadBtn');
        const fileInput = document.getElementById('fileInput');
        const logoClick = document.getElementById('logoClick');

        // Modal Elements
        const profileModal = document.getElementById('profileModal');
        const modalProfilePic = document.getElementById('modalProfilePic');
        const modalDisplayName = document.getElementById('modalDisplayName');
        const modalEmail = document.getElementById('modalEmail');
        const modalSave = document.getElementById('modalSave');
        const modalCancel = document.getElementById('modalCancel');
        const modalUploadPic = document.getElementById('modalUploadPic');

        // Image Preview
        const imagePreview = document.getElementById('imagePreview');
        const previewImage = document.getElementById('previewImage');
        const downloadPreviewBtn = document.getElementById('downloadPreviewBtn');
        const closePreviewBtn = document.getElementById('closePreviewBtn');

        let currentUser = null;
        let currentChatFriend = null;
        let messageListener = null;
        let friends = {};
        let requests = {};
        let allUsersCache = {};
        let unreadCounts = {};
        let typingTimeout = null;
        let toastTimeout = null;

        // ===== TOAST =====
        function showToast(message, type = 'success') {
            if (toastTimeout) { clearTimeout(toastTimeout); toastEl.classList.remove('show'); }
            toastEl.textContent = message;
            toastEl.className = 'toast';
            if (type === 'error') toastEl.classList.add('error');
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
                toastTimeout = null;
            }, 3500);
        }

        // ===== DOWNLOAD IMAGE =====
        function downloadImage(imageSrc, filename = 'image.jpg') {
            try {
                const link = document.createElement('a');
                link.href = imageSrc;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('✅ ছবি ডাউনলোড শুরু হয়েছে!');
            } catch (error) {
                showToast('ডাউনলোড করতে ব্যর্থ!', 'error');
            }
        }

        // ===== IMAGE TO BASE64 =====
        function imageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // ===== SEND IMAGE =====
        async function sendImageMessageBase64(file) {
            if (!file || !currentUser || !currentChatFriend) {
                showToast('ছবি পাঠাতে ব্যর্থ!', 'error');
                return;
            }
            try {
                showToast('📤 ছবি প্রস্তুত হচ্ছে...', 'success');
                const base64Image = await imageToBase64(file);
                const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
                const messagesRef = ref(db, `privateChats/${chatId}/messages`);
                const newMsgRef = push(messagesRef);
                const fileExt = file.name.split('.').pop() || 'jpg';
                const fileName = `image_${Date.now()}.${fileExt}`;
                await set(newMsgRef, {
                    text: '📷',
                    image: base64Image,
                    uid: currentUser.uid,
                    displayName: currentUser.displayName || 'ইউজার',
                    photoURL: currentUser.photoURL || '',
                    timestamp: Date.now(),
                    isBase64: true,
                    fileName: fileName
                });
                const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
                const snapshot = await get(unreadRef);
                const count = (snapshot.val() || 0) + 1;
                await set(unreadRef, count);
                showToast('✅ ছবি পাঠানো হয়েছে!');
            } catch (error) {
                showToast(`ছবি পাঠাতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== SAVE USER =====
        async function saveUserData(user) {
            try {
                const userRef = ref(db, `users/${user.uid}`);
                const snapshot = await get(userRef);
                const existingData = snapshot.val();
                const completeUserData = {
                    displayName: user.displayName || 'ইউজার',
                    email: user.email || '',
                    photoURL: user.photoURL || '',
                    online: true,
                    lastSeen: Date.now()
                };
                if (!existingData || !existingData.displayName || !existingData.email) {
                    await set(userRef, completeUserData);
                    return true;
                } else {
                    await update(userRef, { online: true, lastSeen: Date.now() });
                    return false;
                }
            } catch (error) {
                console.error('Error saving user:', error);
                return false;
            }
        }

        // ===== UPDATE PROFILE =====
        async function updateUserProfile(displayName, photoURL) {
            if (!currentUser) return;
            try {
                await update(ref(db, `users/${currentUser.uid}`), { displayName, photoURL });
                await firebaseUpdateProfile(auth.currentUser, { displayName, photoURL });
                showToast('✅ প্রোফাইল আপডেট করা হয়েছে!');
                updateUI(currentUser);
            } catch (error) {
                showToast(`প্রোফাইল আপডেট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== UPDATE UI =====
        function updateUI(user) {
            currentUser = user;
            if (user) {
                userProfileMini.style.display = 'flex';
                miniAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=User&background=1976D2&color=fff';
                miniName.textContent = user.displayName || 'User';
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                messageInput.disabled = false;
                sendBtn.disabled = false;
                fileUploadBtn.disabled = false;
                loadFriendsAndRequests();
                loadAllUsers();
            } else {
                userProfileMini.style.display = 'none';
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                messageInput.disabled = true;
                sendBtn.disabled = true;
                fileUploadBtn.disabled = true;
                messagesContainer.innerHTML = `<div class="empty-state"><div class="icon">🔑</div>চ্যাট শুরু করতে লগইন করুন</div>`;
                chatFriendInfo.innerHTML = `<span>💬 বন্ধু নির্বাচন করুন</span>`;
                friendList.innerHTML = `<div class="empty-state" style="padding:12px 0;font-size:0.75rem;"><div class="icon">👤</div>কোনো বন্ধু নেই</div>`;
                requestList.innerHTML = `<div style="color:#53768b;font-size:0.7rem;padding:4px 0;">কোনো রিকোয়েস্ট নেই</div>`;
                friendCount.textContent = '0';
                requestCount.textContent = '0';
                currentChatFriend = null;
                if (messageListener) { messageListener(); messageListener = null; }
            }
        }

        // ===== LOAD ALL USERS =====
        function loadAllUsers() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const data = snapshot.val();
                if (data) allUsersCache = data;
            });
        }

        // ===== LOAD FRIENDS & REQUESTS =====
        function loadFriendsAndRequests() {
            if (!currentUser) return;
            const friendsRef = ref(db, `friends/${currentUser.uid}`);
            onValue(friendsRef, (snapshot) => {
                friends = snapshot.val() || {};
                friendCount.textContent = Object.keys(friends).length;
                renderFriends();
                loadUnreadCounts();
            });
            const requestsRef = ref(db, `friendRequests/${currentUser.uid}`);
            onValue(requestsRef, (snapshot) => {
                requests = snapshot.val() || {};
                const count = Object.keys(requests).filter(key => requests[key].status === 'pending').length;
                requestCount.textContent = count;
                renderRequests();
            });
        }

        // ===== LOAD UNREAD =====
        function loadUnreadCounts() {
            if (!currentUser) return;
            const unreadRef = ref(db, `unread/${currentUser.uid}`);
            onValue(unreadRef, (snapshot) => {
                unreadCounts = snapshot.val() || {};
                renderFriends();
            });
        }

        // ===== MARK AS READ =====
        async function markAsRead(friendUid) {
            if (!currentUser || !friendUid) return;
            const unreadRef = ref(db, `unread/${currentUser.uid}/${friendUid}`);
            await remove(unreadRef);
            unreadCounts[friendUid] = 0;
            renderFriends();
        }

        // ===== RENDER FRIENDS =====
        function renderFriends() {
            const searchTerm = searchFriend.value.toLowerCase();
            let html = '';
            let friendKeys = Object.keys(friends);
            if (friendKeys.length === 0) {
                html = `<div class="empty-state" style="padding:12px 0;font-size:0.75rem;"><div class="icon">👤</div>কোনো বন্ধু নেই</div>`;
            } else {
                friendKeys.forEach(uid => {
                    const friend = friends[uid];
                    const name = friend.displayName || 'ইউজার';
                    const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=1976D2&color=fff';
                    const unread = unreadCounts[uid] || 0;
                    if (searchTerm && !name.toLowerCase().includes(searchTerm)) return;
                    const isActive = currentChatFriend === uid;
                    html += `
                        <div class="friend-item ${isActive ? 'active' : ''}" data-uid="${uid}">
                            <img src="${photo}" alt="${name}" loading="lazy" />
                            <span class="friend-name">${name}</span>
                            ${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}
                            <span class="status-dot ${friend.online ? '' : 'offline'}"></span>
                        </div>
                    `;
                });
            }
            friendList.innerHTML = html;
            document.querySelectorAll('.friend-item').forEach(el => {
                el.addEventListener('click', () => {
                    const uid = el.dataset.uid;
                    if (uid && friends[uid]) startChat(uid);
                });
                el.addEventListener('touchend', (e) => {
                    // Prevent double tap on mobile
                    e.preventDefault();
                    const uid = el.dataset.uid;
                    if (uid && friends[uid]) startChat(uid);
                });
            });
        }

        // ===== RENDER REQUESTS =====
        function renderRequests() {
            let html = '';
            let pendingRequests = Object.keys(requests).filter(key => requests[key].status === 'pending');
            if (pendingRequests.length === 0) {
                html = `<div style="color:#53768b;font-size:0.7rem;padding:4px 0;">কোনো রিকোয়েস্ট নেই</div>`;
            } else {
                pendingRequests.forEach(uid => {
                    const req = requests[uid];
                    const name = req.displayName || 'ইউজার';
                    const photo = req.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=1976D2&color=fff';
                    html += `
                        <div class="request-item" data-uid="${uid}">
                            <img src="${photo}" alt="${name}" loading="lazy" />
                            <span class="req-name">${name}</span>
                            <div class="req-actions">
                                <button class="btn-accept" data-uid="${uid}">✅</button>
                                <button class="btn-reject" data-uid="${uid}">❌</button>
                            </div>
                        </div>
                    `;
                });
            }
            requestList.innerHTML = html;
            document.querySelectorAll('.btn-accept').forEach(btn => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); acceptFriendRequest(btn.dataset.uid); });
            });
            document.querySelectorAll('.btn-reject').forEach(btn => {
                btn.addEventListener('click', (e) => { e.stopPropagation(); rejectFriendRequest(btn.dataset.uid); });
            });
        }

        // ===== ACCEPT REQUEST =====
        async function acceptFriendRequest(fromUid) {
            if (!currentUser) return;
            try {
                const senderRef = ref(db, `users/${fromUid}`);
                const snapshot = await get(senderRef);
                const senderData = snapshot.val();
                if (!senderData) { showToast('ইউজার পাওয়া যায়নি!', 'error'); return; }
                await set(ref(db, `friends/${currentUser.uid}/${fromUid}`), {
                    displayName: senderData.displayName || 'ইউজার',
                    photoURL: senderData.photoURL || '',
                    online: false,
                    addedAt: Date.now()
                });
                await set(ref(db, `friends/${fromUid}/${currentUser.uid}`), {
                    displayName: currentUser.displayName || 'ইউজার',
                    photoURL: currentUser.photoURL || '',
                    online: true,
                    addedAt: Date.now()
                });
                await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
                showToast('বন্ধু রিকোয়েস্ট গ্রহণ করা হয়েছে! 🎉');
            } catch (error) {
                showToast(`এক্সেপ্ট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== REJECT REQUEST =====
        async function rejectFriendRequest(fromUid) {
            if (!currentUser) return;
            try {
                await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
                showToast('রিকোয়েস্ট রিজেক্ট করা হয়েছে');
            } catch (error) {
                showToast(`রিজেক্ট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== SEND FRIEND REQUEST =====
        async function sendFriendRequest(toUid) {
            if (!currentUser) return;
            if (toUid === currentUser.uid) { showToast('নিজেকে রিকোয়েস্ট পাঠানো যায় না!', 'error'); return; }
            if (friends[toUid]) { showToast('ইতিমধ্যে বন্ধু!', 'error'); return; }
            if (requests[toUid] && requests[toUid].status === 'pending') { showToast('ইতিমধ্যে রিকোয়েস্ট পাঠানো!', 'error'); return; }
            try {
                const userRef = ref(db, `users/${toUid}`);
                const snapshot = await get(userRef);
                const userData = snapshot.val();
                if (!userData) { showToast('ইউজার পাওয়া যায়নি!', 'error'); return; }
                await set(ref(db, `friendRequests/${toUid}/${currentUser.uid}`), {
                    displayName: currentUser.displayName || 'ইউজার',
                    photoURL: currentUser.photoURL || '',
                    status: 'pending',
                    timestamp: Date.now()
                });
                showToast('ফ্রেন্ড রিকোয়েস্ট পাঠানো হয়েছে! 📨');
                searchResults.innerHTML = `<div style="color:#4caf50;">✅ রিকোয়েস্ট পাঠানো হয়েছে</div>`;
            } catch (error) {
                showToast(`রিকোয়েস্ট পাঠাতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== TYPING =====
        function handleTyping() {
            if (!currentUser || !currentChatFriend) return;
            const typingRef = ref(db, `typing/${currentChatFriend}/${currentUser.uid}`);
            set(typingRef, true);
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => remove(typingRef), 2000);
        }

        // ===== START CHAT =====
        function startChat(friendUid) {
            if (!friends[friendUid]) { showToast('এই ইউজার আপনার বন্ধু নয়!', 'error'); return; }
            currentChatFriend = friendUid;
            const friend = friends[friendUid];
            const name = friend.displayName || 'ইউজার';
            const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=1976D2&color=fff';
            chatFriendInfo.innerHTML = `<img src="${photo}" alt="${name}" loading="lazy" /><span>${name}</span>`;
            chatStatus.textContent = friend.online ? '🟢 অনলাইন' : '⚪ অফলাইন';
            chatStatus.className = `chat-status ${friend.online ? 'online' : ''}`;
            markAsRead(friendUid);
            document.querySelectorAll('.friend-item').forEach(el => {
                el.classList.toggle('active', el.dataset.uid === friendUid);
            });
            loadPrivateMessages(friendUid);
            messageInput.disabled = false;
            sendBtn.disabled = false;
            fileUploadBtn.disabled = false;
            messageInput.focus();
            const typingRef = ref(db, `typing/${currentUser.uid}/${friendUid}`);
            onValue(typingRef, (snapshot) => {
                const isTyping = snapshot.val();
                if (isTyping) {
                    chatStatus.textContent = '✍️ টাইপ করছে...';
                    chatStatus.className = 'chat-status typing';
                } else {
                    const f = friends[friendUid];
                    chatStatus.textContent = f?.online ? '🟢 অনলাইন' : '⚪ অফলাইন';
                    chatStatus.className = `chat-status ${f?.online ? 'online' : ''}`;
                }
            });
        }

        // ===== LOAD MESSAGES =====
        function loadPrivateMessages(friendUid) {
            if (messageListener) { messageListener(); messageListener = null; }
            const chatId = [currentUser.uid, friendUid].sort().join('_');
            const messagesRef = query(ref(db, `privateChats/${chatId}/messages`), orderByChild('timestamp'), limitToLast(50));
            messagesContainer.innerHTML = '';
            messageListener = onChildAdded(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                const msgKey = snapshot.key;
                if (!msg) return;
                const existing = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
                if (existing) return;
                appendMessage(msgKey, msg);
            });
            onChildChanged(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                const msgKey = snapshot.key;
                if (!msg) return;
                const msgElement = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
                if (msgElement) {
                    const textElement = msgElement.querySelector('.msg-text');
                    if (textElement) {
                        if (msg.image) {
                            textElement.innerHTML = createImageHTML(msg.image, msg.fileName);
                        } else {
                            textElement.innerHTML = msg.text + (msg.edited ? ' <span style="font-size:0.6rem;">(edited)</span>' : '');
                        }
                    }
                }
            });
            onChildRemoved(messagesRef, (snapshot) => {
                const msgKey = snapshot.key;
                const msgElement = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
                if (msgElement) {
                    msgElement.style.opacity = '0.3';
                    msgElement.querySelector('.msg-text').innerHTML = '🔴 This message was deleted';
                }
            });
        }

        // ===== CREATE IMAGE HTML =====
        function createImageHTML(imageSrc, fileName = 'image.jpg') {
            return `
                <div class="image-container">
                    <img src="${imageSrc}" alt="Image" onclick="window.openImagePreview('${imageSrc}', '${fileName}')" loading="lazy" />
                    <div class="image-actions">
                        <button class="download-btn" onclick="event.stopPropagation(); window.downloadImageFromSrc('${imageSrc}', '${fileName}')" title="ডাউনলোড করুন">⬇️</button>
                    </div>
                </div>
            `;
        }

        // ===== APPEND MESSAGE =====
        function appendMessage(msgKey, msg) {
            const isOwn = msg.uid === currentUser.uid;
            const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' }) : '';
            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : ''}`;
            div.dataset.key = msgKey;
            div.dataset.uid = msg.uid;
            const avatar = msg.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(msg.displayName || 'U') + '&background=1976D2&color=fff';
            let content = '';
            if (msg.image) {
                const fileName = msg.fileName || `image_${Date.now()}.jpg`;
                content = createImageHTML(msg.image, fileName);
            } else {
                content = msg.text + (msg.edited ? ' <span style="font-size:0.6rem;">(edited)</span>' : '');
            }
            div.innerHTML = `
                <img src="${avatar}" alt="avatar" class="msg-avatar" loading="lazy" />
                <div class="msg-bubble">
                    <div class="msg-sender">${isOwn ? 'আপনি' : (msg.displayName || 'ইউজার')}</div>
                    <div class="msg-text">${content}</div>
                    <div class="msg-time">${time}</div>
                    <div class="message-actions">
                        ${isOwn ? `
                            <button class="edit-btn" data-key="${msgKey}" title="Edit">✏️</button>
                            <button class="delete-btn" data-key="${msgKey}" title="Delete">🗑️</button>
                        ` : ''}
                    </div>
                </div>
            `;
            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
            if (isOwn) {
                div.querySelector('.edit-btn')?.addEventListener('click', () => editMessage(msgKey, msg.text));
                div.querySelector('.delete-btn')?.addEventListener('click', () => deleteMessage(msgKey));
            }
        }

        // ===== GLOBAL FUNCTIONS =====
        window.openImagePreview = function(imageSrc, fileName) {
            previewImage.src = imageSrc;
            previewImage.dataset.src = imageSrc;
            previewImage.dataset.filename = fileName || 'image.jpg';
            imagePreview.classList.add('active');
        };
        window.downloadImageFromSrc = function(imageSrc, fileName) {
            downloadImage(imageSrc, fileName || 'image.jpg');
        };

        // ===== DELETE MESSAGE =====
        async function deleteMessage(msgKey) {
            if (!currentUser || !currentChatFriend) return;
            if (!confirm('এই মেসেজ ডিলিট করতে চান?')) return;
            const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
            try {
                await update(ref(db, `privateChats/${chatId}/messages/${msgKey}`), {
                    text: '🔴 This message was deleted',
                    deleted: true
                });
                showToast('✅ মেসেজ ডিলিট করা হয়েছে');
            } catch (error) {
                showToast(`ডিলিট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== EDIT MESSAGE =====
        async function editMessage(msgKey, oldText) {
            if (!currentUser || !currentChatFriend) return;
            const newText = prompt('মেসেজ এডিট করুন:', oldText);
            if (!newText || newText === oldText) return;
            const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
            try {
                await update(ref(db, `privateChats/${chatId}/messages/${msgKey}`), {
                    text: newText,
                    edited: true,
                    editedAt: Date.now()
                });
                showToast('✅ মেসেজ এডিট করা হয়েছে');
            } catch (error) {
                showToast(`এডিট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== SEND MESSAGE =====
        async function sendPrivateMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser || !currentChatFriend) return;
            const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
            const newMsgRef = push(ref(db, `privateChats/${chatId}/messages`));
            await set(newMsgRef, {
                text: text,
                uid: currentUser.uid,
                displayName: currentUser.displayName || 'ইউজার',
                photoURL: currentUser.photoURL || '',
                timestamp: Date.now()
            });
            const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
            const snapshot = await get(unreadRef);
            const count = (snapshot.val() || 0) + 1;
            await set(unreadRef, count);
            messageInput.value = '';
            messageInput.focus();
        }

        // ===== FILE UPLOAD =====
        fileUploadBtn.addEventListener('click', () => {
            if (!currentUser || !currentChatFriend) {
                showToast('প্রথমে একটি চ্যাট নির্বাচন করুন!', 'error');
                return;
            }
            fileInput.click();
        });
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) { showToast('শুধু ছবি আপলোড করতে পারবেন!', 'error'); fileInput.value = ''; return; }
            if (file.size > 2 * 1024 * 1024) { showToast('ছবি 2MB এর কম হতে হবে!', 'error'); fileInput.value = ''; return; }
            await sendImageMessageBase64(file);
            fileInput.value = '';
        });

        // ===== SEARCH =====
        searchUserBtn.addEventListener('click', async () => {
            const query = searchUser.value.trim().toLowerCase();
            if (!query) { searchResults.innerHTML = ''; return; }
            if (!currentUser) { showToast('লগইন করুন প্রথমে!', 'error'); return; }
            let foundUsers = [];
            Object.keys(allUsersCache).forEach(uid => {
                const user = allUsersCache[uid];
                if (uid === currentUser.uid) return;
                const name = (user.displayName || '').toLowerCase();
                const email = (user.email || '').toLowerCase();
                if (name.includes(query) || email.includes(query)) {
                    foundUsers.push({ uid, ...user });
                }
            });
            if (foundUsers.length === 0) {
                searchResults.innerHTML = `<div style="color:#53768b;font-size:0.7rem;">কোনো ইউজার পাওয়া যায়নি</div>`;
                return;
            }
            let html = '';
            foundUsers.forEach(user => {
                const isFriend = friends[user.uid];
                const isRequested = requests[user.uid] && requests[user.uid].status === 'pending';
                const photo = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || 'U') + '&background=1976D2&color=fff';
                html += `
                    <div style="display:flex;align-items:center;gap:6px;padding:4px 0;border-bottom:1px solid rgba(0,0,0,0.05);">
                        <img src="${photo}" style="width:24px;height:24px;border-radius:50%;object-fit:cover;" loading="lazy" />
                        <span style="flex:1;font-size:0.75rem;">${user.displayName || 'ইউজার'}</span>
                        ${isFriend ? '<span style="color:#4caf50;font-size:0.6rem;">✅ বন্ধু</span>' :
                        isRequested ? '<span style="color:#ff9800;font-size:0.6rem;">⏳ রিকোয়েস্ট পাঠানো</span>' :
                        `<button class="header-btn" style="font-size:0.6rem;padding:2px 10px;" data-uid="${user.uid}">➕ বন্ধু করুন</button>`
                        }
                    </div>
                `;
            });
            searchResults.innerHTML = html;
            document.querySelectorAll('#searchResults button[data-uid]').forEach(btn => {
                btn.addEventListener('click', () => sendFriendRequest(btn.dataset.uid));
            });
        });

        searchFriend.addEventListener('input', renderFriends);

        // ===== EVENT LISTENERS =====
        sendBtn.onclick = sendPrivateMessage;
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendPrivateMessage(); });
        messageInput.addEventListener('input', handleTyping);

        // ===== LOGIN =====
        loginBtn.onclick = async () => {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                await saveUserData(user);
                showToast(`স্বাগতম ${user.displayName || 'ইউজার'}! 🎉`);
            } catch (error) {
                if (error.code !== 'auth/popup-closed-by-user') {
                    showToast(`লগইন ব্যর্থ: ${error.message}`, 'error');
                }
            }
        };

        // ===== LOGOUT =====
        logoutBtn.onclick = async () => {
            try {
                if (currentUser) {
                    await set(ref(db, `users/${currentUser.uid}/online`), false);
                    await set(ref(db, `users/${currentUser.uid}/lastSeen`), Date.now());
                }
                await signOut(auth);
                showToast('সাইন আউট করা হয়েছে।');
            } catch (error) {
                showToast(`সাইন আউট ব্যর্থ: ${error.message}`, 'error');
            }
        };

        // ===== AUTH STATE =====
        onAuthStateChanged(auth, async (user) => {
            updateUI(user);
            if (user) {
                await saveUserData(user);
                await set(ref(db, `users/${user.uid}/online`), true);
                await set(ref(db, `users/${user.uid}/lastSeen`), Date.now());
            }
        });

        // ===== PROFILE MODAL =====
        userProfileMini.addEventListener('click', () => {
            if (!currentUser) return;
            modalProfilePic.src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=1976D2&color=fff';
            modalDisplayName.value = currentUser.displayName || '';
            modalEmail.value = currentUser.email || '';
            profileModal.classList.add('active');
        });
        logoClick.addEventListener('click', () => {
            if (!currentUser) return;
            modalProfilePic.src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=1976D2&color=fff';
            modalDisplayName.value = currentUser.displayName || '';
            modalEmail.value = currentUser.email || '';
            profileModal.classList.add('active');
        });
        modalUploadPic.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.size > 2 * 1024 * 1024) { showToast('ছবি 2MB এর কম হতে হবে!', 'error'); return; }
                showToast('📤 আপলোড হচ্ছে...', 'success');
                const base64 = await imageToBase64(file);
                if (base64) { modalProfilePic.src = base64; showToast('✅ প্রোফাইল ছবি আপলোড হয়েছে!'); }
            };
            input.click();
        });
        modalCancel.addEventListener('click', () => profileModal.classList.remove('active'));
        modalSave.addEventListener('click', async () => {
            const displayName = modalDisplayName.value.trim();
            const photoURL = modalProfilePic.src;
            if (!displayName) { showToast('নাম দেওয়া আবশ্যক!', 'error'); return; }
            await updateUserProfile(displayName, photoURL);
            profileModal.classList.remove('active');
        });
        profileModal.addEventListener('click', (e) => { if (e.target === profileModal) profileModal.classList.remove('active'); });

        // ===== IMAGE PREVIEW =====
        downloadPreviewBtn.addEventListener('click', () => {
            const src = previewImage.dataset.src || previewImage.src;
            const filename = previewImage.dataset.filename || 'image.jpg';
            downloadImage(src, filename);
        });
        closePreviewBtn.addEventListener('click', () => imagePreview.classList.remove('active'));
        imagePreview.addEventListener('click', (e) => { if (e.target === imagePreview) imagePreview.classList.remove('active'); });

        // ===== BEFORE UNLOAD =====
        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                set(ref(db, `users/${currentUser.uid}/online`), false);
                set(ref(db, `users/${currentUser.uid}/lastSeen`), Date.now());
            }
        });

        console.log('🔥 ConnectBD Mobile & PC Ready!');
        console.log('📱 Optimized for both mobile and desktop');
    </script>
</body>
</html>
