<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ConnectBD - WhatsApp Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- PeerJS for WebRTC -->
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        /* Previous CSS styles remain same, adding new call UI styles */
        
        /* ===== CALL UI ===== */
        .call-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            padding: 20px;
        }
        .call-overlay.active { display: flex; }
        
        .call-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--whatsapp-green);
            margin-bottom: 20px;
        }
        .call-name {
            font-size: 24px;
            font-weight: 600;
            color: white;
            margin-bottom: 8px;
        }
        .call-status {
            font-size: 16px;
            color: var(--whatsapp-text-secondary);
            margin-bottom: 30px;
        }
        .call-status.ringing { color: var(--whatsapp-green); animation: pulse 1s infinite; }
        
        .call-actions {
            display: flex;
            gap: 30px;
            margin-top: 20px;
        }
        .call-actions button {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .call-actions button:active { transform: scale(0.9); }
        .call-actions .call-end {
            background: #FF3B30;
            color: white;
        }
        .call-actions .call-answer {
            background: var(--whatsapp-green);
            color: white;
        }
        .call-actions .call-mute {
            background: var(--whatsapp-dark-tertiary);
            color: white;
        }
        .call-actions .call-mute.active { background: #FF3B30; }
        
        .call-timer {
            font-size: 20px;
            color: white;
            font-weight: 300;
            margin-bottom: 20px;
        }
        
        /* Video call styles */
        .video-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        .video-container video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .video-container .remote-video {
            width: 100%;
            height: 100%;
        }
        .video-container .local-video {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 160px;
            border-radius: 8px;
            border: 2px solid rgba(255,255,255,0.3);
            object-fit: cover;
        }
        
        .call-badge {
            background: var(--whatsapp-green);
            color: white;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 4px;
        }
        .call-badge.incoming { background: #FF3B30; animation: pulse 1s infinite; }
    </style>
</head>
<body>
    <!-- Previous HTML remains same, adding call UI -->

    <!-- ===== CALL OVERLAY ===== -->
    <div class="call-overlay" id="callOverlay">
        <img id="callAvatar" class="call-avatar" src="" alt="Caller" />
        <div class="call-name" id="callName">Caller Name</div>
        <div class="call-status" id="callStatus">🔔 কল হচ্ছে...</div>
        <div class="call-timer" id="callTimer">00:00</div>
        
        <!-- Video Container -->
        <div class="video-container" id="videoContainer" style="display:none;">
            <video class="remote-video" id="remoteVideo" autoplay playsinline></video>
            <video class="local-video" id="localVideo" autoplay playsinline muted></video>
        </div>
        
        <div class="call-actions">
            <button class="call-mute" id="callMuteBtn" title="মিউট">🔇</button>
            <button class="call-end" id="callEndBtn">📞</button>
            <button class="call-answer" id="callAnswerBtn" style="display:none;">📞</button>
        </div>
    </div>

    <!-- Rest of the HTML remains same -->
    <!-- ... -->

    <script type="module">
    // Previous imports and code remain same, adding call system below

    // ===== CALL SYSTEM =====
    let peer = null;
    let currentCall = null;
    let callTimerInterval = null;
    let callStartTime = null;
    let localStream = null;
    let isMuted = false;
    
    // Call state
    const callState = {
        IDLE: 'idle',
        CALLING: 'calling',
        RINGING: 'ringing',
        ANSWERED: 'answered',
        REJECTED: 'rejected',
        ENDED: 'ended'
    };
    
    // Initialize PeerJS
    function initPeer(userId) {
        if (peer) {
            peer.destroy();
        }
        
        peer = new Peer(userId, {
            debug: 2,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'turn:turn.anyfirewall.com:443?transport=tcp', 
                      credential: 'webrtc', username: 'webrtc' }
                ]
            }
        });
        
        peer.on('open', (id) => {
            console.log('Peer connected with ID:', id);
            // Update user's peer ID in database
            if (currentUser) {
                update(ref(db, `users/${currentUser.uid}/peerId`), id);
            }
        });
        
        peer.on('call', (incomingCall) => {
            // Incoming call
            const callerId = incomingCall.peer;
            showIncomingCall(callerId, incomingCall);
        });
        
        peer.on('error', (err) => {
            console.error('Peer error:', err);
            showToast('কল সংযোগে সমস্যা!', 'error');
            endCall();
        });
        
        peer.on('disconnected', () => {
            console.log('Peer disconnected');
        });
        
        return peer;
    }
    
    // ===== START CALL =====
    async function startCall(receiverId, callType = 'voice') {
        if (!peer) {
            showToast('পিয়ার সংযোগ তৈরি হচ্ছে...', 'success');
            await initPeer(currentUser.uid);
        }
        
        try {
            // Get receiver's peer ID
            const receiverRef = ref(db, `users/${receiverId}`);
            const snapshot = await get(receiverRef);
            const receiverData = snapshot.val();
            
            if (!receiverData || !receiverData.peerId) {
                showToast('ব্যবহারকারী অনলাইনে নেই!', 'error');
                return;
            }
            
            // Create call record in database
            const callRef = push(ref(db, 'calls'));
            const callId = callRef.key;
            
            await set(callRef, {
                callerId: currentUser.uid,
                receiverId: receiverId,
                status: 'calling',
                callType: callType,
                startTime: Date.now(),
                callId: callId
            });
            
            // Get local media stream
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: true,
                video: callType === 'video'
            });
            
            localStream = stream;
            
            // Show local video if video call
            if (callType === 'video') {
                document.getElementById('videoContainer').style.display = 'block';
                document.getElementById('localVideo').srcObject = stream;
            }
            
            // Make the call
            const call = peer.call(receiverData.peerId, stream, {
                metadata: {
                    callerName: currentUser.displayName,
                    callerPhoto: currentUser.photoURL,
                    callType: callType
                }
            });
            
            currentCall = call;
            
            // Show call UI
            showCallUI(receiverData, 'calling');
            
            // Handle call events
            call.on('stream', (remoteStream) => {
                // Remote user answered
                const videoContainer = document.getElementById('videoContainer');
                const remoteVideo = document.getElementById('remoteVideo');
                
                if (callType === 'video') {
                    videoContainer.style.display = 'block';
                    remoteVideo.srcObject = remoteStream;
                } else {
                    // Voice call - create audio element
                    const audio = new Audio();
                    audio.srcObject = remoteStream;
                    audio.play();
                }
                
                updateCallStatus('answered');
                document.getElementById('callAnswerBtn').style.display = 'none';
                startCallTimer();
                
                // Update call status in database
                update(ref(db, `calls/${callId}`), {
                    status: 'answered',
                    answeredAt: Date.now()
                });
            });
            
            call.on('close', () => {
                endCall();
            });
            
        } catch (error) {
            console.error('Call error:', error);
            showToast('কল শুরু করতে ব্যর্থ!', 'error');
            endCall();
        }
    }
    
    // ===== SHOW INCOMING CALL =====
    function showIncomingCall(callerPeerId, incomingCall) {
        // Get caller info from database
        const callerRef = ref(db, 'users');
        onValue(callerRef, (snapshot) => {
            const users = snapshot.val();
            let callerData = null;
            
            for (const uid in users) {
                if (users[uid].peerId === callerPeerId) {
                    callerData = { uid, ...users[uid] };
                    break;
                }
            }
            
            if (callerData) {
                currentCall = incomingCall;
                showCallUI(callerData, 'ringing');
                document.getElementById('callAnswerBtn').style.display = 'flex';
                
                // Play ringtone
                playRingtone();
            }
        }, { onlyOnce: true });
    }
    
    // ===== ANSWER CALL =====
    async function answerCall() {
        if (!currentCall) return;
        
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                audio: true,
                video: currentCall.metadata?.callType === 'video'
            });
            
            localStream = stream;
            
            if (currentCall.metadata?.callType === 'video') {
                document.getElementById('videoContainer').style.display = 'block';
                document.getElementById('localVideo').srcObject = stream;
            }
            
            currentCall.answer(stream);
            
            currentCall.on('stream', (remoteStream) => {
                const remoteVideo = document.getElementById('remoteVideo');
                if (currentCall.metadata?.callType === 'video') {
                    remoteVideo.srcObject = remoteStream;
                } else {
                    const audio = new Audio();
                    audio.srcObject = remoteStream;
                    audio.play();
                }
                updateCallStatus('answered');
                document.getElementById('callAnswerBtn').style.display = 'none';
                startCallTimer();
            });
            
            currentCall.on('close', () => {
                endCall();
            });
            
        } catch (error) {
            console.error('Answer call error:', error);
            showToast('কল গ্রহণ করতে ব্যর্থ!', 'error');
        }
    }
    
    // ===== SHOW CALL UI =====
    function showCallUI(userData, status) {
        const overlay = document.getElementById('callOverlay');
        document.getElementById('callAvatar').src = userData.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(userData.displayName || 'User') + '&background=00A884&color=fff';
        document.getElementById('callName').textContent = userData.displayName || 'ইউজার';
        document.getElementById('callStatus').textContent = status === 'calling' ? '🔔 কল হচ্ছে...' : '📞 ইনকামিং কল...';
        document.getElementById('callStatus').className = 'call-status ringing';
        document.getElementById('callTimer').textContent = '00:00';
        document.getElementById('videoContainer').style.display = 'none';
        overlay.classList.add('active');
    }
    
    // ===== UPDATE CALL STATUS =====
    function updateCallStatus(status) {
        const statusEl = document.getElementById('callStatus');
        const statusMap = {
            'ringing': '🔔 রিং হচ্ছে...',
            'answered': '📞 সংযুক্ত',
            'rejected': '❌ কল rejected',
            'ended': '📞 কল শেষ'
        };
        statusEl.textContent = statusMap[status] || status;
        statusEl.className = 'call-status';
        if (status === 'ringing') statusEl.classList.add('ringing');
    }
    
    // ===== CALL TIMER =====
    function startCallTimer() {
        callStartTime = Date.now();
        if (callTimerInterval) clearInterval(callTimerInterval);
        callTimerInterval = setInterval(() => {
            const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
            const minutes = String(Math.floor(elapsed / 60)).padStart(2, '0');
            const seconds = String(elapsed % 60).padStart(2, '0');
            document.getElementById('callTimer').textContent = `${minutes}:${seconds}`;
        }, 1000);
    }
    
    // ===== END CALL =====
    function endCall() {
        // Stop local stream
        if (localStream) {
            localStream.getTracks().forEach(track => track.stop());
            localStream = null;
        }
        
        // Close call
        if (currentCall) {
            currentCall.close();
            currentCall = null;
        }
        
        // Hide call UI
        document.getElementById('callOverlay').classList.remove('active');
        document.getElementById('videoContainer').style.display = 'none';
        document.getElementById('callAnswerBtn').style.display = 'none';
        
        // Clear timer
        if (callTimerInterval) {
            clearInterval(callTimerInterval);
            callTimerInterval = null;
        }
        
        // Stop ringtone
        stopRingtone();
    }
    
    // ===== TOGGLE MUTE =====
    function toggleMute() {
        if (!localStream) return;
        isMuted = !isMuted;
        localStream.getAudioTracks().forEach(track => {
            track.enabled = !isMuted;
        });
        document.getElementById('callMuteBtn').classList.toggle('active', isMuted);
        document.getElementById('callMuteBtn').textContent = isMuted ? '🔇' : '🔊';
    }
    
    // ===== RINGTONE =====
    let ringtoneAudio = null;
    
    function playRingtone() {
        try {
            // Create simple ringtone using Web Audio API
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            ringtoneAudio = audioCtx;
            
            function playBeep(frequency, duration) {
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = frequency;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + duration);
            }
            
            // Play ringtone pattern
            let count = 0;
            const ringInterval = setInterval(() => {
                if (count >= 10) {
                    clearInterval(ringInterval);
                    return;
                }
                playBeep(440, 0.4);
                setTimeout(() => playBeep(440, 0.4), 500);
                count += 2;
            }, 1000);
            
            ringtoneAudio._ringInterval = ringInterval;
            
        } catch (error) {
            console.log('Ringtone error:', error);
        }
    }
    
    function stopRingtone() {
        if (ringtoneAudio) {
            if (ringtoneAudio._ringInterval) {
                clearInterval(ringtoneAudio._ringInterval);
            }
            if (ringtoneAudio.close) {
                ringtoneAudio.close();
            }
            ringtoneAudio = null;
        }
    }
    
    // ===== ADD CALL BUTTONS TO CHAT HEADER =====
    function addCallButtonsToChat() {
        const headerActions = document.querySelector('.chat-header .header-actions');
        if (!headerActions) return;
        
        // Check if buttons already exist
        if (document.getElementById('voiceCallBtn')) return;
        
        const voiceCallBtn = document.createElement('button');
        voiceCallBtn.id = 'voiceCallBtn';
        voiceCallBtn.textContent = '📞';
        voiceCallBtn.title = 'ভয়েস কল';
        voiceCallBtn.style.fontSize = '18px';
        voiceCallBtn.style.padding = '6px 10px';
        voiceCallBtn.style.cursor = 'pointer';
        voiceCallBtn.style.background = 'none';
        voiceCallBtn.style.border = 'none';
        voiceCallBtn.style.color = 'var(--whatsapp-text-secondary)';
        voiceCallBtn.style.borderRadius = '50%';
        
        const videoCallBtn = document.createElement('button');
        videoCallBtn.id = 'videoCallBtn';
        videoCallBtn.textContent = '📹';
        videoCallBtn.title = 'ভিডিও কল';
        videoCallBtn.style.fontSize = '18px';
        videoCallBtn.style.padding = '6px 10px';
        videoCallBtn.style.cursor = 'pointer';
        videoCallBtn.style.background = 'none';
        videoCallBtn.style.border = 'none';
        videoCallBtn.style.color = 'var(--whatsapp-text-secondary)';
        videoCallBtn.style.borderRadius = '50%';
        
        voiceCallBtn.addEventListener('click', () => {
            if (currentChatFriend && friends[currentChatFriend]) {
                startCall(currentChatFriend, 'voice');
            } else {
                showToast('প্রথমে একটি চ্যাট নির্বাচন করুন!', 'error');
            }
        });
        
        videoCallBtn.addEventListener('click', () => {
            if (currentChatFriend && friends[currentChatFriend]) {
                startCall(currentChatFriend, 'video');
            } else {
                showToast('প্রথমে একটি চ্যাট নির্বাচন করুন!', 'error');
            }
        });
        
        headerActions.appendChild(voiceCallBtn);
        headerActions.appendChild(videoCallBtn);
    }
    
    // ===== CALL EVENT LISTENERS =====
    document.getElementById('callEndBtn').addEventListener('click', endCall);
    document.getElementById('callAnswerBtn').addEventListener('click', answerCall);
    document.getElementById('callMuteBtn').addEventListener('click', toggleMute);
    
    // ===== MODIFY STARTCHAT TO ADD CALL BUTTONS =====
    const originalStartChat = startChat;
    startChat = function(friendUid) {
        originalStartChat(friendUid);
        setTimeout(addCallButtonsToChat, 100);
    };
    
    // ===== INIT PEER ON LOGIN =====
    const originalUpdateUI = updateUI;
    updateUI = function(user) {
        originalUpdateUI(user);
        if (user) {
            setTimeout(() => {
                initPeer(user.uid);
                // Listen for call status changes
                const callsRef = ref(db, 'calls');
                onValue(callsRef, (snapshot) => {
                    const calls = snapshot.val();
                    if (!calls) return;
                    
                    // Check for incoming calls for this user
                    for (const callId in calls) {
                        const call = calls[callId];
                        if (call.receiverId === currentUser?.uid && call.status === 'calling') {
                            // Show incoming call notification
                            const caller = allUsersCache[call.callerId];
                            if (caller) {
                                showIncomingCallNotification(caller, callId);
                            }
                        }
                    }
                });
            }, 500);
        }
    };
    
    // ===== SHOW INCOMING CALL NOTIFICATION =====
    function showIncomingCallNotification(caller, callId) {
        // Check if call is already active
        if (document.getElementById('callOverlay').classList.contains('active')) return;
        
        showToast(`📞 ${caller.displayName || 'ইউজার'} থেকে কল আসছে!`, 'success');
        
        // Play notification sound
        try {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.frequency.value = 800;
            oscillator.type = 'sine';
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        } catch (e) {}
        
        // Show call UI after short delay
        setTimeout(() => {
            showCallUI(caller, 'ringing');
            document.getElementById('callAnswerBtn').style.display = 'flex';
            playRingtone();
            
            // Store call ID for answering
            window._currentCallId = callId;
        }, 500);
    }
    
    console.log('📞 Call System Added!');
    console.log('📱 Voice & Video call ready');
    </script>
</body>
</html>
