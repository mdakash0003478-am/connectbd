<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ConnectBD - প্রাইভেট চ্যাট</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --primary: #2563EB;
            --primary-dark: #1D4ED8;
            --primary-light: #DBEAFE;
            --primary-gradient: linear-gradient(135deg, #2563EB 0%, #7C3AED 100%);
            --success: #10B981;
            --danger: #EF4444;
            --warning: #F59E0B;
            --bg-primary: #F8FAFC;
            --bg-secondary: #FFFFFF;
            --bg-sidebar: #FFFFFF;
            --text-primary: #0F172A;
            --text-secondary: #475569;
            --text-muted: #94A3B8;
            --border-color: #E2E8F0;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
            --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -1px rgba(0,0,0,0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -2px rgba(0,0,0,0.05);
            --shadow-xl: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
            --radius: 16px;
            --radius-sm: 10px;
            --radius-full: 9999px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            margin: 0;
            color: var(--text-primary);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* App Container */
        .app-container {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            box-shadow: var(--shadow-xl);
            max-width: 1400px;
            width: 100%;
            max-height: 98vh;
            max-height: 98dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            transition: var(--transition);
            border: 1px solid rgba(255,255,255,0.1);
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            gap: 12px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .app-logo {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            object-fit: cover;
            cursor: pointer;
            transition: var(--transition);
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
        }
        .app-logo:active { transform: scale(0.92); }

        .app-title {
            font-size: 1.25rem;
            font-weight: 800;
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            line-height: 1.2;
        }

        .app-title small {
            font-size: 0.6rem;
            font-weight: 400;
            -webkit-text-fill-color: var(--text-muted);
            display: block;
            margin-top: -2px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 4px 14px 4px 4px;
            border-radius: var(--radius-full);
            background: var(--bg-primary);
            border: 1px solid var(--border-color);
            cursor: pointer;
            transition: var(--transition);
        }
        .user-profile-mini:hover { border-color: var(--primary); box-shadow: var(--shadow-sm); }
        .user-profile-mini:active { transform: scale(0.96); }

        .user-profile-mini img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .user-profile-mini .user-name {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-primary);
            max-width: 100px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn {
            padding: 8px 18px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
            white-space: nowrap;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn:active { transform: scale(0.94); }

        .btn-primary {
            background: var(--primary-gradient);
            color: white;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }
        .btn-primary:hover { box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); transform: translateY(-1px); }

        .btn-danger {
            background: var(--danger);
            color: white;
        }
        .btn-danger:hover { background: #DC2626; }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
        }
        .btn-outline:hover { background: var(--bg-primary); border-color: var(--primary); }

        .btn-success {
            background: var(--success);
            color: white;
        }
        .btn-success:hover { background: #059669; }

        /* ===== MAIN LAYOUT ===== */
        .main-content {
            display: flex;
            flex: 1;
            min-height: 0;
            background: var(--bg-primary);
        }

        /* ===== SIDEBAR ===== */
        .sidebar {
            width: 300px;
            min-width: 260px;
            flex-shrink: 0;
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            max-height: calc(98vh - 72px);
            overflow-y: auto;
        }

        .sidebar-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .sidebar-title {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            color: var(--text-muted);
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-count {
            background: var(--primary);
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 1px 10px;
            border-radius: var(--radius-full);
            min-width: 20px;
            text-align: center;
        }
        .badge-count.unread { background: var(--danger); animation: pulse 1.5s infinite; }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        .search-box {
            width: 100%;
            padding: 8px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 0.8rem;
            outline: none;
            background: var(--bg-primary);
            transition: var(--transition);
            font-family: inherit;
        }
        .search-box:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background: white;
        }
        .search-box::placeholder { color: var(--text-muted); }

        .friend-list-scroll {
            flex: 1;
            overflow-y: auto;
            max-height: 200px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            position: relative;
        }
        .friend-item:hover { background: var(--bg-primary); }
        .friend-item:active { transform: scale(0.97); }
        .friend-item.active { background: var(--primary-light); }

        .friend-item img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid white;
            box-shadow: var(--shadow-sm);
        }

        .friend-item .friend-name {
            flex: 1;
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .friend-item .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
            flex-shrink: 0;
            border: 1px solid white;
            box-shadow: var(--shadow-sm);
        }
        .friend-item .status-dot.offline { background: var(--text-muted); }

        .friend-item .unread-badge {
            background: var(--danger);
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: var(--radius-full);
            min-width: 18px;
            text-align: center;
            flex-shrink: 0;
        }

        .request-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            font-size: 0.8rem;
        }
        .request-item img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .request-item .req-name {
            flex: 1;
            color: var(--text-primary);
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .request-item .req-actions { display: flex; gap: 4px; flex-shrink: 0; }
        .request-item .req-actions button {
            padding: 2px 10px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 0.7rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }
        .request-item .req-actions button:active { transform: scale(0.92); }

        .search-results {
            margin-top: 4px;
            max-height: 120px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .search-result-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 10px;
            border-radius: var(--radius-sm);
            background: var(--bg-primary);
            font-size: 0.8rem;
        }
        .search-result-item img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .search-result-item .result-name {
            flex: 1;
            font-weight: 500;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .search-result-item .result-action {
            padding: 2px 12px;
            border: none;
            border-radius: var(--radius-full);
            font-size: 0.65rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            background: var(--primary);
            color: white;
        }
        .search-result-item .result-action:active { transform: scale(0.92); }

        /* ===== CHAT AREA ===== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-secondary);
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            border-bottom: 1px solid var(--border-color);
            flex-shrink: 0;
            gap: 8px;
            background: var(--bg-secondary);
        }

        .chat-friend-info {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }
        .chat-friend-info img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid white;
            box-shadow: var(--shadow-sm);
        }
        .chat-friend-info .friend-name {
            font-weight: 600;
            font-size: 1rem;
            color: var(--text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .chat-status {
            font-size: 0.75rem;
            color: var(--text-muted);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .chat-status.online { color: var(--success); }
        .chat-status.typing { color: var(--primary); animation: pulse 1s infinite; }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 16px 24px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            min-height: 200px;
            max-height: 400px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 80%;
            animation: fadeIn 0.25s ease;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own { align-self: flex-end; flex-direction: row-reverse; }

        .message .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid white;
            box-shadow: var(--shadow-sm);
        }

        .message .msg-bubble {
            background: var(--bg-primary);
            padding: 10px 16px;
            border-radius: 16px;
            border-top-left-radius: 4px;
            box-shadow: var(--shadow-sm);
            word-wrap: break-word;
            max-width: 100%;
            position: relative;
        }

        .message.own .msg-bubble {
            background: var(--primary-gradient);
            color: white;
            border-top-left-radius: 16px;
            border-top-right-radius: 4px;
        }

        .message .msg-sender {
            font-size: 0.65rem;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 4px;
        }
        .message.own .msg-sender { color: rgba(255,255,255,0.8); }

        .message .msg-text {
            font-size: 0.9rem;
            line-height: 1.5;
            word-break: break-word;
        }

        .message .msg-text .image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }
        .message .msg-text .image-container img {
            max-width: min(100%, 280px);
            max-height: 200px;
            border-radius: 8px;
            margin: 4px 0;
            cursor: pointer;
            transition: var(--transition);
            display: block;
            box-shadow: var(--shadow-sm);
        }
        .message .msg-text .image-container img:active { transform: scale(0.98); }

        .message .msg-text .image-container .image-actions {
            position: absolute;
            bottom: 8px;
            right: 8px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: var(--transition);
        }
        .message .msg-text .image-container:hover .image-actions,
        .message .msg-text .image-container:active .image-actions { opacity: 1; }

        .message .msg-text .image-container .image-actions button {
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            cursor: pointer;
            font-size: 0.7rem;
            transition: var(--transition);
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .message .msg-text .image-container .image-actions button:active { transform: scale(0.88); }

        .message .msg-time {
            font-size: 0.6rem;
            opacity: 0.5;
            margin-top: 4px;
            text-align: right;
        }
        .message.own .msg-time { color: rgba(255,255,255,0.7); }

        .message .msg-actions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
            justify-content: flex-end;
        }
        .message .msg-actions button {
            background: transparent;
            border: none;
            font-size: 0.65rem;
            cursor: pointer;
            opacity: 0.5;
            transition: var(--transition);
            padding: 2px 4px;
            border-radius: 4px;
        }
        .message .msg-actions button:hover { opacity: 1; background: rgba(0,0,0,0.05); }
        .message.own .msg-actions button { color: white; }
        .message.own .msg-actions button:hover { background: rgba(255,255,255,0.1); }

        .typing-indicator {
            font-size: 0.7rem;
            color: var(--primary);
            font-style: italic;
            padding: 2px 24px;
            min-height: 20px;
            flex-shrink: 0;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 40px 0;
            font-size: 0.9rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .empty-state .icon { font-size: 2.5rem; }

        /* ===== INPUT AREA ===== */
        .input-area {
            display: flex;
            gap: 8px;
            padding: 12px 24px;
            border-top: 1px solid var(--border-color);
            background: var(--bg-secondary);
            flex-shrink: 0;
        }

        .input-area .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            min-width: 0;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 10px 18px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 0.9rem;
            outline: none;
            background: var(--bg-primary);
            transition: var(--transition);
            font-family: inherit;
            min-width: 0;
        }
        .input-area input[type="text"]:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            background: white;
        }
        .input-area input[type="text"]:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-area .file-upload-btn {
            padding: 10px 14px;
            background: var(--bg-primary);
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-full);
            font-size: 1rem;
            cursor: pointer;
            transition: var(--transition);
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .input-area .file-upload-btn:hover { background: var(--border-color); }
        .input-area .file-upload-btn:active:not(:disabled) { transform: scale(0.92); }
        .input-area .file-upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .input-area .send-btn {
            padding: 10px 24px;
            border: none;
            background: var(--primary-gradient);
            color: white;
            border-radius: var(--radius-full);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
            touch-action: manipulation;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(37, 99, 235, 0.3);
        }
        .input-area .send-btn:hover { box-shadow: 0 4px 12px rgba(37, 99, 235, 0.4); transform: translateY(-1px); }
        .input-area .send-btn:active:not(:disabled) { transform: scale(0.94); }
        .input-area .send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--text-primary);
            color: white;
            padding: 12px 28px;
            border-radius: var(--radius-full);
            font-weight: 500;
            font-size: 0.9rem;
            box-shadow: var(--shadow-xl);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 92%;
            text-align: center;
            pointer-events: none;
            backdrop-filter: blur(10px);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { background: var(--danger); }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--bg-secondary);
            border-radius: var(--radius);
            padding: 32px;
            max-width: 420px;
            width: 100%;
            box-shadow: var(--shadow-xl);
            animation: fadeIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal h2 {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .profile-pic-wrapper {
            position: relative;
            width: 100px;
            margin: 0 auto 20px;
        }
        .profile-pic-wrapper .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 3px solid var(--primary);
            box-shadow: var(--shadow-md);
        }
        .profile-pic-wrapper .upload-overlay {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 14px;
            border-radius: var(--radius-full);
            font-size: 0.6rem;
            font-weight: 500;
            cursor: pointer;
            backdrop-filter: blur(4px);
            white-space: nowrap;
        }
        .profile-pic-wrapper .upload-overlay:active { transform: translateX(-50%) scale(0.94); }

        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }
        .modal .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: inherit;
            transition: var(--transition);
            background: var(--bg-primary);
        }
        .modal .form-group input:focus {
            border-color: var(--primary);
            outline: none;

        /* Dark Mode */

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
    updateProfile as firebaseUpdateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
    getDatabase, ref, push, onChildAdded, set, get, update, onValue,
    query, limitToLast, orderByChild, remove, onChildRemoved, onChildChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDZliPdFlc3iQRMGxs5-hgcDGQYNdACqm4",
    authDomain: "connectbd-4a8f2.firebaseapp.com",
    databaseURL: "https://connectbd-4a8f2-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "connectbd-4a8f2",
    storageBucket: "connectbd-4a8f2.firebasestorage.app",
    messagingSenderId: "38217840543",
    appId: "1:38217840543:web:aeedd8517f697b16c12faa",
    measurementId: "G-RPBSS1M9LD"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// DOM Elements
const messagesContainer = document.getElementById('messagesContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const userProfileMini = document.getElementById('userProfileMini');
const miniAvatar = document.getElementById('miniAvatar');
const miniName = document.getElementById('miniName');
const friendList = document.getElementById('friendList');
const requestList = document.getElementById('requestList');
const friendCount = document.getElementById('friendCount');
const requestCount = document.getElementById('requestCount');
const chatFriendInfo = document.getElementById('chatFriendInfo');
const chatStatus = document.getElementById('chatStatus');
const searchUser = document.getElementById('searchUser');
const searchUserBtn = document.getElementById('searchUserBtn');
const searchResults = document.getElementById('searchResults');
const searchFriend = document.getElementById('searchFriend');
const toastEl = document.getElementById('toast');
const fileUploadBtn = document.getElementById('fileUploadBtn');
const fileInput = document.getElementById('fileInput');
const logoClick = document.getElementById('logoClick');

// Modal Elements
const profileModal = document.getElementById('profileModal');
const modalProfilePic = document.getElementById('modalProfilePic');
const modalDisplayName = document.getElementById('modalDisplayName');
const modalEmail = document.getElementById('modalEmail');
const modalSave = document.getElementById('modalSave');
const modalCancel = document.getElementById('modalCancel');
const modalUploadPic = document.getElementById('modalUploadPic');

// Image Preview
const imagePreview = document.getElementById('imagePreview');
const previewImage = document.getElementById('previewImage');
const downloadPreviewBtn = document.getElementById('downloadPreviewBtn');
const closePreviewBtn = document.getElementById('closePreviewBtn');

let currentUser = null;
let currentChatFriend = null;
let messageListener = null;
let friends = {};
let requests = {};
let allUsersCache = {};
let unreadCounts = {};
let typingTimeout = null;
let toastTimeout = null;

// Toast
function showToast(message, type = 'success') {
    if (toastTimeout) { clearTimeout(toastTimeout); toastEl.classList.remove('show'); }
    toastEl.textContent = message;
    toastEl.className = 'toast';
    if (type === 'error') toastEl.classList.add('error');
    void toastEl.offsetWidth;
    toastEl.classList.add('show');
    toastTimeout = setTimeout(() => {
        toastEl.classList.remove('show');
        toastTimeout = null;
    }, 3500);
}

// Download Image
function downloadImage(imageSrc, filename = 'image.jpg') {
    try {
        const link = document.createElement('a');
        link.href = imageSrc;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('✅ ছবি ডাউনলোড শুরু হয়েছে!');
    } catch (error) {
        showToast('ডাউনলোড করতে ব্যর্থ!', 'error');
    }
}

// Image to Base64
function imageToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

// Send Image
async function sendImageMessageBase64(file) {
    if (!file || !currentUser || !currentChatFriend) {
        showToast('ছবি পাঠাতে ব্যর্থ!', 'error');
        return;
    }
    try {
        showToast('📤 ছবি প্রস্তুত হচ্ছে...', 'success');
        const base64Image = await imageToBase64(file);
        const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
        const messagesRef = ref(db, `privateChats/${chatId}/messages`);
        const newMsgRef = push(messagesRef);
        const fileExt = file.name.split('.').pop() || 'jpg';
        const fileName = `image_${Date.now()}.${fileExt}`;
        await set(newMsgRef, {
            text: '📷',
            image: base64Image,
            uid: currentUser.uid,
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            timestamp: Date.now(),
            isBase64: true,
            fileName: fileName
        });
        const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
        const snapshot = await get(unreadRef);
        const count = (snapshot.val() || 0) + 1;
        await set(unreadRef, count);
        showToast('✅ ছবি পাঠানো হয়েছে!');
    } catch (error) {
        showToast(`ছবি পাঠাতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// Save User
async function saveUserData(user) {
    try {
        const userRef = ref(db, `users/${user.uid}`);
        const snapshot = await get(userRef);
        const existingData = snapshot.val();
        const completeUserData = {
            displayName: user.displayName || 'ইউজার',
            email: user.email || '',
            photoURL: user.photoURL || '',
            online: true,
            lastSeen: Date.now()
        };
        if (!existingData || !existingData.displayName || !existingData.email) {
            await set(userRef, completeUserData);
            return true;
        } else {
            await update(userRef, { online: true, lastSeen: Date.now() });
            return false;
        }
    } catch (error) {
        console.error('Error saving user:', error);
        return false;
    }
}

// Update Profile
async function updateUserProfile(displayName, photoURL) {
    if (!currentUser) return;
    try {
        await update(ref(db, `users/${currentUser.uid}`), { displayName, photoURL });
        await firebaseUpdateProfile(auth.currentUser, { displayName, photoURL });
        showToast('✅ প্রোফাইল আপডেট করা হয়েছে!');
        updateUI(currentUser);
    } catch (error) {
        showToast(`প্রোফাইল আপডেট করতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// Update UI
function updateUI(user) {
    currentUser = user;
    if (user) {
        userProfileMini.style.display = 'flex';
        miniAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=User&background=2563EB&color=fff';
        miniName.textContent = user.displayName || 'User';
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'inline-flex';
        messageInput.disabled = false;
        sendBtn.disabled = false;
        fileUploadBtn.disabled = false;
        loadFriendsAndRequests();
        loadAllUsers();
    } else {
        userProfileMini.style.display = 'none';
        loginBtn.style.display = 'inline-flex';
        logoutBtn.style.display = 'none';
        messageInput.disabled = true;
        sendBtn.disabled = true;
        fileUploadBtn.disabled = true;
        messagesContainer.innerHTML = `<div class="empty-state"><div class="icon">🔑</div>চ্যাট শুরু করতে লগইন করুন</div>`;
        chatFriendInfo.innerHTML = `<span class="friend-name" style="color:var(--text-muted);">💬 বন্ধু নির্বাচন করুন</span>`;
        friendList.innerHTML = `<div class="empty-state" style="padding:12px 0;font-size:0.75rem;"><div class="icon">👤</div>কোনো বন্ধু নেই</div>`;
        requestList.innerHTML = `<div style="color:var(--text-muted);font-size:0.75rem;padding:4px 0;">কোনো রিকোয়েস্ট নেই</div>`;
        friendCount.textContent = '0';
        requestCount.textContent = '0';
        currentChatFriend = null;
        if (messageListener) { messageListener(); messageListener = null; }
    }
}

// Load All Users
function loadAllUsers() {
    const usersRef = ref(db, 'users');
    onValue(usersRef, (snapshot) => {
        const data = snapshot.val();
        if (data) allUsersCache = data;
    });
}

// Load Friends & Requests
function loadFriendsAndRequests() {
    if (!currentUser) return;
    const friendsRef = ref(db, `friends/${currentUser.uid}`);
    onValue(friendsRef, (snapshot) => {
        friends = snapshot.val() || {};
        friendCount.textContent = Object.keys(friends).length;
        renderFriends();
        loadUnreadCounts();
    });
    const requestsRef = ref(db, `friendRequests/${currentUser.uid}`);
    onValue(requestsRef, (snapshot) => {
        requests = snapshot.val() || {};
        const count = Object.keys(requests).filter(key => requests[key].status === 'pending').length;
        requestCount.textContent = count;
        renderRequests();
    });
}

// Load Unread
function loadUnreadCounts() {
    if (!currentUser) return;
    const unreadRef = ref(db, `unread/${currentUser.uid}`);
    onValue(unreadRef, (snapshot) => {
        unreadCounts = snapshot.val() || {};
        renderFriends();
    });
}

// Mark as Read
async function markAsRead(friendUid) {
    if (!currentUser || !friendUid) return;
    const unreadRef = ref(db, `unread/${currentUser.uid}/${friendUid}`);
    await remove(unreadRef);
    unreadCounts[friendUid] = 0;
    renderFriends();
}

// Render Friends
function renderFriends() {
    const searchTerm = searchFriend.value.toLowerCase();
    let html = '';
    let friendKeys = Object.keys(friends);
    if (friendKeys.length === 0) {
        html = `<div class="empty-state" style="padding:12px 0;font-size:0.75rem;"><div class="icon">👤</div>কোনো বন্ধু নেই</div>`;
    } else {
        friendKeys.forEach(uid => {
            const friend = friends[uid];
            const name = friend.displayName || 'ইউজার';
            const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=2563EB&color=fff';
            const unread = unreadCounts[uid] || 0;
            if (searchTerm && !name.toLowerCase().includes(searchTerm)) return;
            const isActive = currentChatFriend === uid;
            html += `
                <div class="friend-item ${isActive ? 'active' : ''}" data-uid="${uid}">
                    <img src="${photo}" alt="${name}" loading="lazy" />
                    <span class="friend-name">${name}</span>
                    ${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}
                    <span class="status-dot ${friend.online ? '' : 'offline'}"></span>
                </div>
            `;
        });
    }
    friendList.innerHTML = html;
    document.querySelectorAll('.friend-item').forEach(el => {
        el.addEventListener('click', () => {
            const uid = el.dataset.uid;
            if (uid && friends[uid]) startChat(uid);
        });
    });
}

// Render Requests
function renderRequests() {
    let html = '';
    let pendingRequests = Object.keys(requests).filter(key => requests[key].status === 'pending');
    if (pendingRequests.length === 0) {
        html = `<div style="color:var(--text-muted);font-size:0.75rem;padding:4px 0;">কোনো রিকোয়েস্ট নেই</div>`;
    } else {
        pendingRequests.forEach(uid => {
            const req = requests[uid];
            const name = req.displayName || 'ইউজার';
            const photo = req.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=2563EB&color=fff';
            html += `
                <div class="request-item" data-uid="${uid}">
                    <img src="${photo}" alt="${name}" loading="lazy" />
                    <span class="req-name">${name}</span>
                    <div class="req-actions">
                        <button class="btn-success" style="padding:2px 10px;border:none;border-radius:9999px;font-size:0.7rem;font-weight:600;cursor:pointer;" data-uid="${uid}">✅ গ্রহণ</button>
                        <button class="btn-danger" style="padding:2px 10px;border:none;border-radius:9999px;font-size:0.7rem;font-weight:600;cursor:pointer;" data-uid="${uid}">❌ বাতিল</button>
                    </div>
                </div>
            `;
        });
    }
    requestList.innerHTML = html;
    document.querySelectorAll('.request-item .btn-success').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); acceptFriendRequest(btn.dataset.uid); });
    });
    document.querySelectorAll('.request-item .btn-danger').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); rejectFriendRequest(btn.dataset.uid); });
    });
}

// Accept Request
async function acceptFriendRequest(fromUid) {
    if (!currentUser) return;
    try {
        const senderRef = ref(db, `users/${fromUid}`);
        const snapshot = await get(senderRef);
        const senderData = snapshot.val();
        if (!senderData) { showToast('ইউজার পাওয়া যায়নি!', 'error'); return; }
        await set(ref(db, `friends/${currentUser.uid}/${fromUid}`), {
            displayName: senderData.displayName || 'ইউজার',
            photoURL: senderData.photoURL || '',
            online: false,
            addedAt: Date.now()
        });
        await set(ref(db, `friends/${fromUid}/${currentUser.uid}`), {
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            online: true,
            addedAt: Date.now()
        });
        await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
        showToast('বন্ধু রিকোয়েস্ট গ্রহণ করা হয়েছে! 🎉');
    } catch (error) {
        showToast(`এক্সেপ্ট করতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// Reject Request
async function rejectFriendRequest(fromUid) {
    if (!currentUser) return;
    try {
        await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
        showToast('রিকোয়েস্ট রিজেক্ট করা হয়েছে');
    } catch (error) {
        showToast(`রিজেক্ট করতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// Send Friend Request
async function sendFriendRequest(toUid) {
    if (!currentUser) return;
    if (toUid === currentUser.uid) { showToast('নিজেকে রিকোয়েস্ট পাঠানো যায় না!', 'error'); return; }
    if (friends[toUid]) { showToast('ইতিমধ্যে বন্ধু!', 'error'); return; }
    if (requests[toUid] && requests[toUid].status === 'pending') { showToast('ইতিমধ্যে রিকোয়েস্ট পাঠানো!', 'error'); return; }
    try {
        const userRef = ref(db, `users/${toUid}`);
        const snapshot = await get(userRef);
        const userData = snapshot.val();
        if (!userData) { showToast('ইউজার পাওয়া যায়নি!', 'error'); return; }
        await set(ref(db, `friendRequests/${toUid}/${currentUser.uid}`), {
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            status: 'pending',
            timestamp: Date.now()
        });
        showToast('ফ্রেন্ড রিকোয়েস্ট পাঠানো হয়েছে! 📨');
        searchResults.innerHTML = `<div style="color:var(--success);font-size:0.75rem;">✅ রিকোয়েস্ট পাঠানো হয়েছে</div>`;
    } catch (error) {
        showToast(`রিকোয়েস্ট পাঠাতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// Typing
function handleTyping() {
    if (!currentUser || !currentChatFriend) return;
    const typingRef = ref(db, `typing/${currentChatFriend}/${currentUser.uid}`);
    set(typingRef, true);
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => remove(typingRef), 2000);
}

// Start Chat
function startChat(friendUid) {
    if (!friends[friendUid]) { showToast('এই ইউজার আপনার বন্ধু নয়!', 'error'); return; }
    currentChatFriend = friendUid;
    const friend = friends[friendUid];
    const name = friend.displayName || 'ইউজার';
    const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=2563EB&color=fff';
    chatFriendInfo.innerHTML = `
        <img src="${photo}" alt="${name}" loading="lazy" />
        <span class="friend-name">${name}</span>
    `;
    chatStatus.textContent = friend.online ? '🟢 অনলাইন' : '⚪ অফলাইন';
    chatStatus.className = `chat-status ${friend.online ? 'online' : ''}`;
    markAsRead(friendUid);
    document.querySelectorAll('.friend-item').forEach(el => {
        el.classList.toggle('active', el.dataset.uid === friendUid);
    });
    loadPrivateMessages(friendUid);
    messageInput.disabled = false;
    sendBtn.disabled = false;
    fileUploadBtn.disabled = false;
    messageInput.focus();
    const typingRef = ref(db, `typing/${currentUser.uid}/${friendUid}`);
    onValue(typingRef, (snapshot) => {
        const isTyping = snapshot.val();
        if (isTyping) {
            chatStatus.textContent = '✍️ টাইপ করছে...';
            chatStatus.className = 'chat-status typing';
        } else {
            const f = friends[friendUid];
            chatStatus.textContent = f?.online ? '🟢 অনলাইন' : '⚪ অফলাইন';
            chatStatus.className = `chat-status ${f?.online ? 'online' : ''}`;
        }
    });
}

// Load Messages
function loadPrivateMessages(friendUid) {
    if (messageListener) { messageListener(); messageListener = null; }
    const chatId = [currentUser.uid, friendUid].sort().join('_');
    const messagesRef = query(ref(db, `privateChats/${chatId}/messages`), orderByChild('timestamp'), limitToLast(50));
    messagesContainer.innerHTML = '';
    messageListener = onChildAdded(messagesRef, (snapshot) => {
        const msg = snapshot.val();
        const msgKey = snapshot.key;
        if (!msg) return;
        const existing = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
        if (existing) return;
        appendMessage(msgKey, msg);
    });
    onChildChanged(messagesRef, (snapshot) => {
        const msg = snapshot.val();
        const msgKey = snapshot.key;
        if (!msg) return;
        const msgElement = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
        if (msgElement) {
            const textElement = msgElement.querySelector('.msg-text');
            if (textElement) {
                if (msg.image) {
                    textElement.innerHTML = createImageHTML(msg.image, msg.fileName);
                } else {
                    textElement.innerHTML = msg.text + (msg.edited ? ' <span style="font-size:0.6rem;opacity:0.5;">(edited)</span>' : '');
                }
            }
        }
    });
    onChildRemoved(messagesRef, (snapshot) => {
        const msgKey = snapshot.key;
        const msgElement = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
        if (msgElement) {
            msgElement.style.opacity = '0.3';
            msgElement.querySelector('.msg-text').innerHTML = '🔴 This message was deleted';
        }
    });
}

// Create Image HTML
function createImageHTML(imageSrc, fileName = 'image.jpg') {
    return `
        <div class="image-container">
            <img src="${imageSrc}" alt="Image" onclick="window.openImagePreview('${imageSrc}', '${fileName}')" loading="lazy" />
            <div class="image-actions">
                <button onclick="event.stopPropagation(); window.downloadImageFromSrc('${imageSrc}', '${fileName}')" title="ডাউনলোড করুন">⬇️</button>
            </div>
        </div>
    `;
}

// Append Message
function appendMessage(msgKey, msg) {
    const isOwn = msg.uid === currentUser.uid;
    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' }) : '';
    const div = document.createElement('div');
    div.className = `message ${isOwn ? 'own' : ''}`;
    div.dataset.key = msgKey;
    div.dataset.uid = msg.uid;
    const avatar = msg.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(msg.displayName || 'U') + '&background=2563EB&color=fff';
    let content = '';
    if (msg.image) {
        const fileName = msg.fileName || `image_${Date.now()}.jpg`;
        content = createImageHTML(msg.image, fileName);
    } else {
        content = msg.text + (msg.edited ? ' <span style="font-size:0.6rem;opacity:0.5;">(edited)</span>' : '');
    }
    div.innerHTML = `
        <img src="${avatar}" alt="avatar" class="msg-avatar" loading="lazy" />
        <div class="msg-bubble">
            <div class="msg-sender">${isOwn ? 'আপনি' : (msg.displayName || 'ইউজার')}</div>
            <div class="msg-text">${content}</div>
            <div class="msg-time">${time}</div>
            ${isOwn ? `
            <div class="msg-actions">
                <button class="edit-btn" data-key="${msgKey}" title="Edit">✏️</button>
                <button class="delete-btn" data-key="${msgKey}" title="Delete">🗑️</button>
            </div>` : ''}
        </div>
    `;
    messagesContainer.appendChild(div);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    if (isOwn) {
        div.querySelector('.edit-btn')?.addEventListener('click', () => editMessage(msgKey, msg.text));
        div.querySelector('.delete-btn')?.addEventListener('click', () => deleteMessage(msgKey));
    }
}

// Global Functions
window.openImagePreview = function(imageSrc, fileName) {
    previewImage.src = imageSrc;
    previewImage.dataset.src = imageSrc;
    previewImage.dataset.filename = fileName || 'image.jpg';
    imagePreview.classList.add('active');
};
window.downloadImageFromSrc = function(imageSrc, fileName) {
    downloadImage(imageSrc, fileName || 'image.jpg');
};

// Delete Message
async function deleteMessage(msgKey) {
    if (!currentUser || !currentChatFriend) return;
    if (!confirm('এই মেসেজ ডিলিট করতে চান?')) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    try {
        await update(ref(db, `privateChats/${chatId}/messages/${msgKey}`), {
            text: '🔴 This message was deleted',
            deleted: true
        });
        showToast('✅ মেসেজ ডিলিট করা হয়েছে');
    } catch (error) {
        showToast(`ডিলিট করতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// Edit Message
async function editMessage(msgKey, oldText) {
    if (!currentUser || !currentChatFriend) return;
    const newText = prompt('মেসেজ এডিট করুন:', oldText);
    if (!newText || newText === oldText) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    try {
        await update(ref(db, `privateChats/${chatId}/messages/${msgKey}`), {
            text: newText,
            edited: true,
            editedAt: Date.now()
        });
        showToast('✅ মেসেজ এডিট করা হয়েছে');
    } catch (error) {
        showToast(`এডিট করতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// Send Message
async function sendPrivateMessage() {
    const text = messageInput.value.trim();
    if (!text || !currentUser || !currentChatFriend) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    const newMsgRef = push(ref(db, `privateChats/${chatId}/messages`));
    await set(newMsgRef, {
        text: text,
        uid: currentUser.uid,
        displayName: currentUser.displayName || 'ইউজার',
        photoURL: currentUser.photoURL || '',
        timestamp: Date.now()
    });
    const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
    const snapshot = await get(unreadRef);
    const count = (snapshot.val() || 0) + 1;
    await set(unreadRef, count);
    messageInput.value = '';
    messageInput.focus();
}

// File Upload
fileUploadBtn.addEventListener('click', () => {
    if (!currentUser || !currentChatFriend) {
        showToast('প্রথমে একটি চ্যাট নির্বাচন করুন!', 'error');
        return;
    }
    fileInput.click();
});
fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('শুধু ছবি আপলোড করতে পারবেন!', 'error'); fileInput.value = ''; return; }
    if (file.size > 2 * 1024 * 1024) { showToast('ছবি 2MB এর কম হতে হবে!', 'error'); fileInput.value = ''; return; }
    await sendImageMessageBase64(file);
    fileInput.value = '';
});

// Search
searchUserBtn.addEventListener('click', async () => {
    const query = searchUser.value.trim().toLowerCase();
    if (!query) { searchResults.innerHTML = ''; return; }
    if (!currentUser) { showToast('লগইন করুন প্রথমে!', 'error'); return; }
    let foundUsers = [];
    Object.keys(allUsersCache).forEach(uid => {
        const user = allUsersCache[uid];
        if (uid === currentUser.uid) return;
        const name = (user.displayName || '').toLowerCase();
        const email = (user.email || '').toLowerCase();
        if (name.includes(query) || email.includes(query)) {
            foundUsers.push({ uid, ...user });
        }
    });
    if (foundUsers.length === 0) {
        searchResults.innerHTML = `<div style="color:var(--text-muted);font-size:0.75rem;">কোনো ইউজার পাওয়া যায়নি</div>`;
        return;
    }
    let html = '';
    foundUsers.forEach(user => {
        const isFriend = friends[user.uid];
        const isRequested = requests[user.uid] && requests[user.uid].status === 'pending';
        const photo = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || 'U') + '&background=2563EB&color=fff';
        html += `
            <div class="search-result-item">
                <img src="${photo}" alt="${user.displayName}" loading="lazy" />
                <span class="result-name">${user.displayName || 'ইউজার'}</span>
                ${isFriend ? '<span style="color:var(--success);font-size:0.65rem;font-weight:600;">✅ বন্ধু</span>' :
                isRequested ? '<span style="color:var(--warning);font-size:0.65rem;font-weight:600;">⏳ রিকোয়েস্ট পাঠানো</span>' :
                `<button class="result-action" data-uid="${user.uid}">➕ বন্ধু করুন</button>`
                }
            </div>
        `;
    });
    searchResults.innerHTML = html;
    document.querySelectorAll('.search-result-item .result-action').forEach(btn => {
        btn.addEventListener('click', () => sendFriendRequest(btn.dataset.uid));
    });
});

searchFriend.addEventListener('input', renderFriends);

// Event Listeners
sendBtn.onclick = sendPrivateMessage;
messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendPrivateMessage(); });
messageInput.addEventListener('input', handleTyping);

// Login
loginBtn.onclick = async () => {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        await saveUserData(user);
        showToast(`স্বাগতম ${user.displayName || 'ইউজার'}! 🎉`);
    } catch (error) {
        if (error.code !== 'auth/popup-closed-by-user') {
            showToast(`লগইন ব্যর্থ: ${error.message}`, 'error');
        }
    }
};

// Logout
logoutBtn.onclick = async () => {
    try {
        if (currentUser) {
            await set(ref(db, `users/${currentUser.uid}/online`), false);
            await set(ref(db, `users/${currentUser.uid}/lastSeen`), Date.now());
        }
        await signOut(auth);
        showToast('সাইন আউট করা হয়েছে।');
    } catch (error) {
        showToast(`সাইন আউট ব্যর্থ: ${error.message}`, 'error');
    }
};

// Auth State
onAuthStateChanged(auth, async (user) => {
    updateUI(user);
    if (user) {
        await saveUserData(user);
        await set(ref(db, `users/${user.uid}/online`), true);
        await set(ref(db, `users/${user.uid}/lastSeen`), Date.now());
    }
});

// Profile Modal
userProfileMini.addEventListener('click', () => {
    if (!currentUser) return;
    modalProfilePic.src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=2563EB&color=fff';
    modalDisplayName.value = currentUser.displayName || '';

logoClick.addEventListener('click', () => {

});

modalCancel.addEventListener('click', () => profileModal.classList.remove('active'));
modalSave.addEventListener('click', async () => {
    const displayName = modalDisplayName.value.trim();
    const photoURL = modalProfilePic.src;

// Image Preview
downloadPreviewBtn.addEventListener('click', () => {

closePreviewBtn.addEventListener('click', () => imagePreview.classList.remove('active'));
imagePreview.addEventListener('click', (e) => { if (e.target === imagePreview) imagePreview.classList.remove('active'); });

// Before Unload
window.addEventListener('beforeunload', () => {
    if (currentUser) {
