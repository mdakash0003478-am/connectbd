<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConnectBD - Private Friend Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #eaf3f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 2rem;
            max-width: 1100px;
            width: 100%;
            box-shadow: 0 30px 60px -20px rgba(0, 20, 40, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(60, 130, 180, 0.15);
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            padding: 4px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: 0.3s;
        }

        .app-logo:hover {
            transform: scale(1.05);
        }

        .app-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0b2b40;
        }

        .app-title span {
            color: #1976D2;
        }

        .app-title small {
            font-size: 0.8rem;
            font-weight: 400;
            color: #3b5c6e;
            display: block;
            margin-top: -4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.6);
            padding: 6px 16px 6px 10px;
            border-radius: 40px;
            border: 1px solid rgba(200, 215, 225, 0.5);
            cursor: pointer;
            transition: 0.3s;
        }

        .user-profile-mini:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .user-profile-mini img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .user-profile-mini .user-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #0b2b40;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .header-btn {
            background: transparent;
            border: 1px solid #b6ccdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2f536b;
            cursor: pointer;
            transition: 0.15s;
        }

        .header-btn:hover {
            background: #e6eef5;
            border-color: #7f9bb3;
        }

        .header-btn.primary {
            background: #1976D2;
            border-color: #1976D2;
            color: white;
        }

        .header-btn.primary:hover {
            background: #1565C0;
        }

        .header-btn.danger {
            background: #d32f2f;
            border-color: #d32f2f;
            color: white;
        }

        .header-btn.danger:hover {
            background: #b71c1c;
        }

        .main-content {
            display: flex;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
            padding-top: 1.2rem;
        }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            max-height: 550px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-section {
            margin-bottom: 1rem;
        }

        .sidebar-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #53768b;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-count {
            background: #1976D2;
            color: white;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .badge-count.unread {
            background: #ff4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            margin-bottom: 4px;
            position: relative;
        }

        .friend-item:hover {
            background: rgba(25, 118, 210, 0.08);
        }

        .friend-item.active {
            background: rgba(25, 118, 210, 0.15);
            font-weight: 600;
        }

        .friend-item img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .friend-item .friend-name {
            flex: 1;
            font-size: 0.9rem;
            color: #1f4c66;
        }

        .friend-item .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
        }

        .friend-item .status-dot.offline {
            background: #bdbdbd;
        }

        .friend-item .unread-badge {
            background: #ff4444;
            color: white;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .friend-item .typing-indicator {
            font-size: 0.6rem;
            color: #1976D2;
            font-style: italic;
            position: absolute;
            bottom: 2px;
            right: 12px;
        }

        .request-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        .request-item img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .request-item .req-name {
            flex: 1;
            color: #1f4c66;
        }

        .request-item .req-actions {
            display: flex;
            gap: 6px;
        }

        .request-item .req-actions button {
            padding: 2px 10px;
            border: none;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-accept {
            background: #4caf50;
            color: white;
        }

        .btn-accept:hover {
            background: #388e3c;
        }

        .btn-reject {
            background: #ef5350;
            color: white;
        }

        .btn-reject:hover {
            background: #c62828;
        }

        .search-box {
            width: 100%;
            padding: 6px 12px;
            border: 1px solid #dce3e9;
            border-radius: 20px;
            font-size: 0.8rem;
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .search-box:focus {
            border-color: #1976D2;
        }

        .friend-list-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .friend-list-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .friend-list-scroll::-webkit-scrollbar-thumb {
            background: #b6ccdd;
            border-radius: 10px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(60, 130, 180, 0.1);
        }

        .chat-header .chat-friend-name {
            font-weight: 600;
            color: #0b2b40;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .chat-friend-name img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header .chat-status {
            font-size: 0.75rem;
            color: #53768b;
        }

        .chat-header .chat-status.online {
            color: #4caf50;
        }

        .chat-header .chat-status.typing {
            color: #1976D2;
            animation: pulse 1s infinite;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 4px;
            margin: 8px 0;
            max-height: 380px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
            position: relative;
        }

        .message:hover .message-actions {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid white;
        }

        .message .msg-bubble {
            background: white;
            padding: 10px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            word-wrap: break-word;
            flex: 1;
            position: relative;
        }

        .message.own .msg-bubble {
            background: #1976D2;
            color: white;
            border-top-left-radius: 18px;
            border-top-right-radius: 4px;
        }

        .message .msg-sender {
            font-size: 0.7rem;
            font-weight: 600;
            color: #1976D2;
            margin-bottom: 2px;
        }

        .message.own .msg-sender {
            color: #bbdefb;
        }

        .message .msg-text {
            font-size: 0.92rem;
            line-height: 1.4;
        }

        .message .msg-time {
            font-size: 0.6rem;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .message.own .msg-time {
            color: #bbdefb;
        }

        .message .message-actions {
            display: none;
            position: absolute;
            top: -10px;
            right: -10px;
            gap: 4px;
            background: white;
            border-radius: 12px;
            padding: 2px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message.own .message-actions {
            right: auto;
            left: -10px;
        }

        .message .message-actions button {
            background: none;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 4px;
            transition: 0.2s;
        }

        .message .message-actions button:hover {
            background: #e0e0e0;
        }

        .message .message-actions .delete-btn:hover {
            color: #d32f2f;
        }

        .message .message-actions .edit-btn:hover {
            color: #1976D2;
        }

        .message .msg-text.editing {
            background: rgba(255, 255, 0, 0.1);
            border-radius: 4px;
            padding: 2px;
        }

        .typing-indicator-global {
            font-size: 0.7rem;
            color: #1976D2;
            font-style: italic;
            padding: 4px 8px;
            min-height: 20px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(60, 130, 180, 0.1);
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #dce3e9;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            transition: 0.15s;
        }

        .input-area input:focus {
            border-color: #1976D2;
            background: white;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.08);
        }

        .input-area input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-area button {
            padding: 10px 24px;
            border: none;
            background: #1976D2;
            color: white;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
        }

        .input-area button:hover:not(:disabled) {
            background: #1565C0;
            transform: scale(1.02);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            color: #53768b;
            padding: 40px 0;
            font-size: 0.9rem;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e7e34;
            color: white;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: #d32f2f;
        }

        /* Profile Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }

        .modal h2 {
            color: #0b2b40;
            margin-bottom: 1rem;
        }

        .modal .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1rem;
            display: block;
            border: 3px solid #1976D2;
        }

        .modal .form-group {
            margin-bottom: 1rem;
        }

        .modal .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #53768b;
            margin-bottom: 4px;
        }

        .modal .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #dce3e9;
            border-radius: 12px;
            font-size: 0.95rem;
        }

        .modal .form-group input:focus {
            border-color: #1976D2;
            outline: none;
        }

        .modal .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
        }

        .modal .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal .modal-actions .save-btn {
            background: #1976D2;
            color: white;
        }

        .modal .modal-actions .save-btn:hover {
            background: #1565C0;
        }

        .modal .modal-actions .cancel-btn {
            background: #e0e0e0;
            color: #333;
        }

        .modal .modal-actions .cancel-btn:hover {
            background: #d0d0d0;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 1.2rem;
            }
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 200px;
            }
            .friend-list-scroll {
                max-height: 100px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-right {
                justify-content: space-between;
            }
            .messages-container {
                max-height: 250px;
                min-height: 180px;
            }
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 1rem;
                border-radius: 28px;
            }
            .app-title {
                font-size: 1.2rem;
            }
            .message {
                max-width: 95%;
            }
            .sidebar {
                max-height: 180px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-left">
                <img src="https://raw.githubusercontent.com/mdakash0003478-am/connectbd/main/logo.png.jpeg" alt="ConnectBD" class="app-logo" id="logoClick" />
                <div class="app-title">
                    Connect<span>BD</span>
                    <small>প্রাইভেট চ্যাট</small>
                </div>
            </div>
            <div class="header-right">
                <div id="userProfileMini" class="user-profile-mini" style="display: none;">
                    <img id="miniAvatar" src="" alt="avatar" />
                    <span class="user-name" id="miniName">User</span>
                </div>
                <button id="loginBtn" class="header-btn primary">🔑 লগইন</button>
                <button id="logoutBtn" class="header-btn danger" style="display: none;">সাইন আউট</button>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">
                        👥 বন্ধুরা
                        <span class="badge-count" id="friendCount">0</span>
                    </div>
                    <input type="text" class="search-box" id="searchFriend" placeholder="🔍 বন্ধু খুঁজুন..." />
                    <div class="friend-list-scroll" id="friendList">
                        <div class="empty-state" style="padding: 20px 0; font-size: 0.8rem;">
                            <div class="icon">👤</div>
                            কোনো বন্ধু নেই
                        </div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">
                        📨 রিকোয়েস্ট
                        <span class="badge-count" id="requestCount">0</span>
                    </div>
                    <div id="requestList">
                        <div style="color: #53768b; font-size: 0.8rem; padding: 4px 0;">কোনো রিকোয়েস্ট নেই</div>
                    </div>
                </div>

                <div class="sidebar-section">
                    <div class="sidebar-title">🔍 ইউজার খুঁজুন</div>
                    <div style="display: flex; gap: 6px;">
                        <input type="text" id="searchUser" class="search-box" placeholder="ইমেইল বা নাম..." style="margin-bottom: 0;" />
                        <button id="searchUserBtn" class="header-btn" style="font-size: 0.7rem; padding: 6px 12px;">খুঁজুন</button>
                    </div>
                    <div id="searchResults" style="margin-top: 6px; font-size: 0.8rem;"></div>
                </div>
            </div>

            <div class="chat-area">
                <div class="chat-header">
                    <div class="chat-friend-name" id="chatFriendInfo">
                        <span>💬 বন্ধু নির্বাচন করুন</span>
                    </div>
                    <span class="chat-status" id="chatStatus">অনলাইন</span>
                </div>

                <div class="typing-indicator-global" id="typingIndicator"></div>

                <div class="messages-container" id="messagesContainer">
                    <div class="empty-state">
                        <div class="icon">💬</div>
                        চ্যাট শুরু করতে বাম দিক থেকে একজন বন্ধু নির্বাচন করুন
                    </div>
                </div>

                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="মেসেজ লিখুন..." disabled />
                    <button id="sendBtn" disabled>পাঠান</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Profile Modal -->
    <div class="modal-overlay" id="profileModal">
        <div class="modal">
            <h2>👤 প্রোফাইল</h2>
            <img id="modalProfilePic" class="profile-pic" src="" alt="Profile" />
            <div class="form-group">
                <label>ডিসপ্লে নাম</label>
                <input type="text" id="modalDisplayName" />
            </div>
            <div class="form-group">
                <label>ইমেইল</label>
                <input type="email" id="modalEmail" disabled />
            </div>
            <div class="form-group">
                <label>প্রোফাইল ছবি (URL)</label>
                <input type="text" id="modalPhotoURL" placeholder="https://example.com/photo.jpg" />
            </div>
            <div class="modal-actions">
                <button class="cancel-btn" id="modalCancel">বাতিল</button>
                <button class="save-btn" id="modalSave">সেভ করুন</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            GoogleAuthProvider,
            signInWithPopup,
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getDatabase,
            ref,
            push,
            onChildAdded,
            set,
            get,
            child,
            update,
            onValue,
            query,
            limitToLast,
            orderByChild,
            remove,
            onChildRemoved,
            onChildChanged

            toastEl.textContent = message;
            toastEl.className = 'toast';
            if (type === 'error') toastEl.classList.add('error');
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');

        // Load friends and friend requests
        function loadFriendsAndRequests() {
            if (!currentUser) return;

            const friendsRef = ref(db, `friends/${currentUser.uid}`);

                const data = snapshot.val();

            const requestsRef = ref(db, `friendRequests/${currentUser.uid}`);

                const data = snapshot.val();

                requestCount.textContent = count;
                renderRequests();

            if (!currentUser) return;

        // Mark messages as read

        // Accept friend request
        async function acceptFriendRequest(fromUid) {
            if (!currentUser) return;

            try {
                const senderRef = ref(db, `users/${fromUid}`);
                const snapshot = await get(senderRef);
                const senderData = snapshot.val();

                if (!senderData) {
                    showToast('ইউজার পাওয়া যায়নি!', 'error');
                    return;
                }

                await set(ref(db, `friends/${currentUser.uid}/${fromUid}`), {
                    displayName: senderData.displayName || 'ইউজার',
                    photoURL: senderData.photoURL || '',
                    online: false,
                    addedAt: Date.now()
                });

                await set(ref(db, `friends/${fromUid}/${currentUser.uid}`), {
                    displayName: currentUser.displayName || 'ইউজার',
                    photoURL: currentUser.photoURL || '',
                    online: true,
                    addedAt: Date.now()
                });

                await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
                showToast('বন্ধু রিকোয়েস্ট গ্রহণ করা হয়েছে! 🎉');

                showToast(`এক্সেপ্ট করতে ব্যর্থ: ${error.message}`, 'error');

        // Send friend request
        async function sendFriendRequest(toUid) {

                    showToast('ইউজার পাওয়া যায়নি!', 'error');

                }

                await set(ref(db, `friendRequests/${toUid}/${currentUser.uid}`), {

                showToast(`রিকোয়েস্ট পাঠাতে ব্যর্থ: ${error.message}`, 'error');
            }

        // ===== Typing indicator =====
        function handleTyping() {
            if (!currentUser || !currentChatFriend) return;
            
            const typingRef = ref(db, `typing/${currentChatFriend}/${currentUser.uid}`);
            set(typingRef, true);
            
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                remove(typingRef);
            }, 2000);

        // Start chat with a friend
        function startChat(friendUid) {
            if (!friends[friendUid]) {
                showToast('এই ইউজার আপনার বন্ধু নয়!', 'error');
                return;
            }

            currentChatFriend = friendUid;
            const friend = friends[friendUid];
            const name = friend.displayName || 'ইউজার';
            const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) +
                '&background=1976D2&color=fff';

            chatFriendInfo.innerHTML = `
                <img src="${photo}" alt="${name}" />
                <span>${name}</span>
            `;
            chatStatus.textContent = friend.online ? '🟢 অনলাইন' : '⚪ অফলাইন';
            chatStatus.className = `chat-status ${friend.online ? 'online' : ''}`;

            // Mark messages as read
            markAsRead(friendUid);

            // Update active state
            document.querySelectorAll('.friend-item').forEach(el => {
                el.classList.toggle('active', el.dataset.uid === friendUid);
            });

            // Load messages
            loadPrivateMessages(friendUid);
            messageInput.disabled = false;
            sendBtn.disabled = false;
            messageInput.focus();
            
            // Listen for typing
            listenForTyping(friendUid);
        }

        // Listen for typing
        function listenForTyping(friendUid) {
            const typingRef = ref(db, `typing/${currentUser.uid}/${friendUid}`);
            onValue(typingRef, (snapshot) => {
                const isTyping = snapshot.val();
                if (isTyping) {
                    chatStatus.textContent = '✍️ টাইপ করছে...';
                    chatStatus.className = 'chat-status typing';
                } else {
                    const friend = friends[friendUid];
                    chatStatus.textContent = friend?.online ? '🟢 অনলাইন' : '⚪ অফলাইন';
                    chatStatus.className = `chat-status ${friend?.online ? 'online' : ''}`;
                }
            });
        }

        // Load private messages
        function loadPrivateMessages(friendUid) {
            if (messageListener) {
                messageListener();
                messageListener = null;
            }

            const chatId = [currentUser.uid, friendUid].sort().join('_');
            const messagesRef = query(
                ref(db, `privateChats/${chatId}/messages`),
                orderByChild('timestamp'),
                limitToLast(50)
            );

            messagesContainer.innerHTML = '';

            // Add listener for new messages
            messageListener = onChildAdded(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                const msgKey = snapshot.key;
                if (!msg) return;

                const existing = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
                if (existing) return;

                appendMessage(msgKey, msg);
            });

            // Listen for message edits
            onChildChanged(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                const msgKey = snapshot.key;
                if (!msg) return;
                
                const msgElement = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
                if (msgElement) {
                    const textElement = msgElement.querySelector('.msg-text');
                    if (textElement) {
                        textElement.textContent = msg.text;
                        if (msg.edited) {
                            textElement.textContent += ' (edited)';
                        }
                    }
                }
            });

            // Listen for message deletions
            onChildRemoved(messagesRef, (snapshot) => {
                const msgKey = snapshot.key;
                const msgElement = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
                if (msgElement) {
                    msgElement.style.opacity = '0.3';
                    msgElement.querySelector('.msg-text').textContent = '🔴 This message was deleted';
                }
            });
        }

        // Append message to container
        function appendMessage(msgKey, msg) {
            const isOwn = msg.uid === currentUser.uid;
            const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('bn-BD', { hour: '2-digit',
                    minute: '2-digit' }) : '';

            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : ''}`;
            div.dataset.key = msgKey;
            div.dataset.uid = msg.uid;

            const avatar = msg.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(msg
                .displayName || 'U') + '&background=1976D2&color=fff';

            div.innerHTML = `
                <img src="${avatar}" alt="avatar" class="msg-avatar" />
                <div class="msg-bubble">
                    <div class="msg-sender">${isOwn ? 'আপনি' : (msg.displayName || 'ইউজার')}</div>
                    <div class="msg-text">${msg.text}${msg.edited ? ' <span style="font-size:0.6rem;">(edited)</span>' : ''}</div>
                    <div class="msg-time">${time}</div>
                    <div class="message-actions">
                        ${isOwn ? `
                            <button class="edit-btn" data-key="${msgKey}" title="Edit">✏️</button>
                            <button class="delete-btn" data-key="${msgKey}" title="Delete">🗑️</button>
                        ` : ''}
                    </div>
                </div>
            `;

            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            // Add event listeners for actions
            if (isOwn) {
                div.querySelector('.edit-btn')?.addEventListener('click', () => {
                    editMessage(msgKey, msg.text);
                });
                div.querySelector('.delete-btn')?.addEventListener('click', () => {
                    deleteMessage(msgKey);
                });
            }
        }

        // ===== Delete message =====
        async function deleteMessage(msgKey) {
            if (!currentUser || !currentChatFriend) return;
            if (!confirm('এই মেসেজ ডিলিট করতে চান?')) return;

            const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
            const msgRef = ref(db, `privateChats/${chatId}/messages/${msgKey}`);
            try {
                await update(msgRef, {
                    text: '🔴 This message was deleted',
                    deleted: true
                });
                showToast('✅ মেসেজ ডিলিট করা হয়েছে');
            } catch (error) {
                showToast(`ডিলিট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== Edit message =====
        async function editMessage(msgKey, oldText) {
            if (!currentUser || !currentChatFriend) return;
            const newText = prompt('মেসেজ এডিট করুন:', oldText);
            if (!newText || newText === oldText) return;

            const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
            const msgRef = ref(db, `privateChats/${chatId}/messages/${msgKey}`);
            try {
                await update(msgRef, {
                    text: newText,
                    edited: true,
                    editedAt: Date.now()
                });
                showToast('✅ মেসেজ এডিট করা হয়েছে');
            } catch (error) {
                showToast(`এডিট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== Send private message =====
        async function sendPrivateMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser || !currentChatFriend) return;

            const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
            const messagesRef = ref(db, `privateChats/${chatId}/messages`);
            const newMsgRef = push(messagesRef);

            await set(newMsgRef, {
                text: text,
                uid: currentUser.uid,
                displayName: currentUser.displayName || 'ইউজার',
                photoURL: currentUser.photoURL || '',
                timestamp: Date.now()
            });

            // Update unread count for friend
            const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
            const snapshot = await get(unreadRef);
            const count = (snapshot.val() || 0) + 1;
            await set(unreadRef, count);

            messageInput.value = '';
            messageInput.focus();
        }

        // Search user
        searchUserBtn.addEventListener('click', async () => {
            const query = searchUser.value.trim().toLowerCase();
            if (!query) {
                searchResults.innerHTML = '';
                return;
            }

            if (!currentUser) {
                showToast('লগইন করুন প্রথমে!', 'error');
                return;
            }

            let foundUsers = [];
            Object.keys(allUsersCache).forEach(uid => {
                const user = allUsersCache[uid];
                if (uid === currentUser.uid) return;
                const name = (user.displayName || '').toLowerCase();
                const email = (user.email || '').toLowerCase();
                if (name.includes(query) || email.includes(query)) {
                    foundUsers.push({ uid, ...user });
                }
            });

            console.log('🔍 Search results:', foundUsers.length);

            if (foundUsers.length === 0) {
                searchResults.innerHTML = `<div style="color: #53768b; font-size: 0.8rem;">কোনো ইউজার পাওয়া যায়নি</div>`;
                return;
            }

            let html = '';
            foundUsers.forEach(user => {
                const isFriend = friends[user.uid];
                const isRequested = requests[user.uid] && requests[user.uid].status === 'pending';
                const photo = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user
                    .displayName || 'U') + '&background=1976D2&color=fff';

                html += `
                    <div style="display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.05);">
                        <img src="${photo}" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover;" />
                        <span style="flex: 1; font-size: 0.85rem;">${user.displayName || 'ইউজার'}</span>
                        ${isFriend ? '<span style="color: #4caf50; font-size: 0.7rem;">✅ বন্ধু</span>' :
                        isRequested ? '<span style="color: #ff9800; font-size: 0.7rem;">⏳ রিকোয়েস্ট পাঠানো</span>' :
                        `<button class="header-btn" style="font-size: 0.7rem; padding: 4px 12px;" data-uid="${user.uid}">➕ বন্ধু করুন</button>`
                        }
                    </div>
                `;
            });

            searchResults.innerHTML = html;

            document.querySelectorAll('#searchResults button[data-uid]').forEach(btn => {
                btn.addEventListener('click', () => {
                    sendFriendRequest(btn.dataset.uid);
                });
            });
        });

        // Search friend filter
        searchFriend.addEventListener('input', renderFriends);

        // Send message on enter or button click
        sendBtn.onclick = sendPrivateMessage;
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendPrivateMessage();
        });

        // Typing indicator
        messageInput.addEventListener('input', handleTyping);

        // ===== Login =====
        loginBtn.onclick = async () => {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                console.log('👤 User logged in:', user.displayName);
                console.log('📧 Email:', user.email);
                console.log('🆔 UID:', user.uid);
                
                await saveUserData(user);
                showToast(`স্বাগতম ${user.displayName || 'ইউজার'}! 🎉`);
                
                setTimeout(async () => {
                    console.log('🔍 Checking if fix needed...');
                    const usersRef = ref(db, 'users');
                    const snapshot = await get(usersRef);
                    const users = snapshot.val();
                    let needsFix = false;
                    if (users) {
                        for (const uid in users) {
                            if (!users[uid].displayName || !users[uid].email) {
                                needsFix = true;
                                break;
                            }
                        }
                    }
                    if (needsFix) {
                        if (confirm('🔧 কিছু ইউজারের ডেটা ঠিক করতে হবে। এখনই ঠিক করবেন?')) {
                            await fixAllUsers();
                        }
                    } else {
                        console.log('✅ All users have complete data!');
                    }
                }, 2000);
                
            } catch (error) {
                if (error.code !== 'auth/popup-closed-by-user') {
                    showToast(`লগইন ব্যর্থ: ${error.message}`, 'error');
                    console.error('Login error:', error);
                }
            }
        };

        // Logout
        logoutBtn.onclick = async () => {
            try {
                if (currentUser) {
                    await set(ref(db, `users/${currentUser.uid}/online`), false);
                    await set(ref(db, `users/${currentUser.uid}/lastSeen`), Date.now());
                }
                await signOut(auth);
                showToast('সাইন আউট করা হয়েছে।');
            } catch (error) {
                showToast(`সাইন আউট ব্যর্থ: ${error.message}`, 'error');
            }
        };

        // Auth state
        onAuthStateChanged(auth, async (user) => {
            updateUI(user);
            if (user) {
                await saveUserData(user);
                await set(ref(db, `users/${user.uid}/online`), true);
                await set(ref(db, `users/${user.uid}/lastSeen`), Date.now());
            }
        });

        // ===== Profile Modal =====
        userProfileMini.addEventListener('click', () => {
            if (!currentUser) return;
            modalProfilePic.src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=1976D2&color=fff';
            modalDisplayName.value = currentUser.displayName || '';
            modalEmail.value = currentUser.email || '';
            modalPhotoURL.value = currentUser.photoURL || '';
            profileModal.classList.add('active');
        });

        logoClick.addEventListener('click', () => {
            if (!currentUser) return;
            modalProfilePic.src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=1976D2&color=fff';
            modalDisplayName.value = currentUser.displayName || '';
            modalEmail.value = currentUser.email || '';
            modalPhotoURL.value = currentUser.photoURL || '';
            profileModal.classList.add('active');
        });

        modalCancel.addEventListener('click', () => {
            profileModal.classList.remove('active');
        });

        modalSave.addEventListener('click', async () => {
            const displayName = modalDisplayName.value.trim();
            const photoURL = modalPhotoURL.value.trim();
            if (!displayName) {
                showToast('নাম দেওয়া আবশ্যক!', 'error');
                return;
            }
            await updateProfile(displayName, photoURL);
            profileModal.classList.remove('active');
        });

        // Close modal on outside click
        profileModal.addEventListener('click', (e) => {
            if (e.target === profileModal) {
                profileModal.classList.remove('active');
            }
        });

        // Handle page unload
        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                set(ref(db, `users/${currentUser.uid}/online`), false);
                set(ref(db, `users/${currentUser.uid}/lastSeen`), Date.now());
            }
        });

        // ===== EXPOSE functions to console =====
        window.fixAllUsers = fixAllUsers;
        window.saveUserData = saveUserData;
        window.db = db;
        window.auth = auth;

        console.log('🔥 ConnectBD Private Chat ready with all features!');
        console.log('📌 Features added:');
        console.log('  ✅ Friend Request block');
        console.log('  ✅ Chat message delete/edit');
        console.log('  ✅ Typing indicator');
        console.log('  ✅ Online/Offline status');
        console.log('  ✅ Unread message count');
        console.log('  ✅ Profile picture update');
        console.log('🔧 To fix all users, run: fixAllUsers()');
    </script>
</body>
</html>
