<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ConnectBD - WhatsApp Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/peerjs@1.5.1/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --whatsapp-green: #00A884;
            --whatsapp-dark: #111B21;
            --whatsapp-dark-secondary: #202C33;
            --whatsapp-dark-tertiary: #2A3942;
            --whatsapp-text-primary: #E9EDF0;
            --whatsapp-text-secondary: #AEBAC1;
            --whatsapp-border: #2A3942;
            --whatsapp-chat-own: #D9FDD3;
            --whatsapp-radius: 8px;
            --header-height: 60px;
            --composer-height: 62px;
            --tab-height: 48px;
        }
        html, body { height: 100%; overflow: hidden; font-family: 'Inter', sans-serif; background: var(--whatsapp-dark); color: var(--whatsapp-text-primary); }
        .status-bar { height: 24px; background: var(--whatsapp-dark); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 12px; color: var(--whatsapp-text-secondary); flex-shrink: 0; }
        .status-bar .time { font-weight: 600; color: var(--whatsapp-text-primary); }
        .app-container { display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: var(--whatsapp-dark); max-width: 100%; overflow: hidden; }
        .header { height: var(--header-height); background: var(--whatsapp-dark-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; border-bottom: 1px solid var(--whatsapp-border); }
        .header-left { display: flex; align-items: center; gap: 12px; min-width: 0; }
        .header-left .app-logo { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; cursor: pointer; border: 2px solid var(--whatsapp-green); }
        .header-left .app-title { font-size: 18px; font-weight: 700; color: var(--whatsapp-text-primary); }
        .header-left .app-title span { color: var(--whatsapp-green); }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .user-profile-mini { display: flex; align-items: center; gap: 8px; cursor: pointer; padding: 4px 8px 4px 4px; border-radius: 30px; transition: all 0.2s; }
        .user-profile-mini img { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; border: 2px solid var(--whatsapp-green); }
        .user-profile-mini .user-name { font-size: 13px; font-weight: 500; color: var(--whatsapp-text-primary); max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .login-btn { background: var(--whatsapp-green); color: white; border: none; padding: 8px 20px; border-radius: 30px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .login-btn:active { transform: scale(0.94); }
        .logout-btn { background: transparent; color: #FF3B30; border: none; font-size: 20px; padding: 6px 10px; cursor: pointer; border-radius: 50%; }
        .logout-btn:active { background: rgba(255,255,255,0.05); }
        .tabs { display: flex; background: var(--whatsapp-dark-secondary); border-bottom: 1px solid var(--whatsapp-border); flex-shrink: 0; height: var(--tab-height); }
        .tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; color: var(--whatsapp-text-secondary); font-size: 13px; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; padding: 0 8px; position: relative; }
        .tab.active { color: var(--whatsapp-green); border-bottom-color: var(--whatsapp-green); }
        .tab .tab-badge { background: var(--whatsapp-green); color: white; font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 50%; min-width: 18px; text-align: center; }
        .tab .tab-badge.danger { background: #FF3B30; }
        .main-content { flex: 1; display: flex; overflow: hidden; background: var(--whatsapp-dark); position: relative; }
        .chat-list { width: 100%; max-width: 420px; flex-shrink: 0; background: var(--whatsapp-dark); display: flex; flex-direction: column; border-right: 1px solid var(--whatsapp-border); overflow: hidden; position: relative; z-index: 5; }
        .chat-list.hidden { transform: translateX(-100%); position: absolute; width: 100%; max-width: 100%; z-index: 5; }
        .search-bar { padding: 6px 12px; background: var(--whatsapp-dark-secondary); flex-shrink: 0; display: flex; gap: 8px; align-items: center; }
        .search-bar input { flex: 1; background: var(--whatsapp-dark-tertiary); border: none; border-radius: var(--whatsapp-radius); padding: 8px 14px; color: var(--whatsapp-text-primary); font-size: 14px; font-family: inherit; outline: none; }
        .search-bar input::placeholder { color: var(--whatsapp-text-secondary); }
        .friend-list-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
        .friend-item { display: flex; align-items: center; gap: 12px; padding: 10px 16px; cursor: pointer; border-bottom: 1px solid var(--whatsapp-border); }
        .friend-item:active { background: var(--whatsapp-dark-tertiary); }
        .friend-item.active { background: var(--whatsapp-dark-tertiary); }
        .friend-item .avatar { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0; border: 2px solid transparent; }
        .friend-item .avatar.online { border-color: var(--whatsapp-green); }
        .friend-item .info { flex: 1; min-width: 0; }
        .friend-item .info .name { font-size: 15px; font-weight: 500; color: var(--whatsapp-text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .friend-item .info .last-msg { font-size: 13px; color: var(--whatsapp-text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .friend-item .meta { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; flex-shrink: 0; }
        .friend-item .meta .time { font-size: 11px; color: var(--whatsapp-text-secondary); }
        .friend-item .meta .unread-badge { background: var(--whatsapp-green); color: white; font-size: 11px; font-weight: 700; padding: 1px 8px; border-radius: 50%; min-width: 20px; text-align: center; }
        .friend-item .meta .unread-badge.danger { background: #FF3B30; }
        .empty-state { text-align: center; padding: 40px 20px; color: var(--whatsapp-text-secondary); font-size: 14px; display: flex; flex-direction: column; align-items: center; gap: 8px; }
        .empty-state .icon { font-size: 48px; opacity: 0.5; }
        .chat-area { flex: 1; display: flex; flex-direction: column; background: var(--whatsapp-dark); min-width: 0; position: relative; }
        .chat-area .chat-header { height: var(--header-height); background: var(--whatsapp-dark-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; border-bottom: 1px solid var(--whatsapp-border); flex-shrink: 0; }
        .chat-area .chat-header .back-btn { display: none; background: none; border: none; color: var(--whatsapp-text-primary); font-size: 22px; cursor: pointer; padding: 4px 8px; }
        .chat-area .chat-header .chat-info { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
        .chat-area .chat-header .chat-info img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
        .chat-area .chat-header .chat-info .details { flex: 1; min-width: 0; }
        .chat-area .chat-header .chat-info .details .name { font-size: 15px; font-weight: 600; color: var(--whatsapp-text-primary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .chat-area .chat-header .chat-info .details .status { font-size: 12px; color: var(--whatsapp-text-secondary); }
        .chat-area .chat-header .chat-info .details .status.online { color: var(--whatsapp-green); }
        .chat-area .chat-header .header-actions { display: flex; gap: 2px; flex-shrink: 0; align-items: center; }
        .chat-area .chat-header .header-actions button { background: none; border: none; color: var(--whatsapp-text-secondary); font-size: 18px; padding: 6px 10px; cursor: pointer; border-radius: 50%; transition: all 0.2s; }
        .chat-area .chat-header .header-actions button:active { background: rgba(255,255,255,0.1); }
        .messages-container { flex: 1; overflow-y: auto; padding: 12px 16px 8px; display: flex; flex-direction: column; gap: 4px; background: var(--whatsapp-dark); }
        .message { display: flex; gap: 8px; max-width: 85%; animation: fadeIn 0.2s ease; }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }
        .message .msg-avatar { width: 28px; height: 28px; border-radius: 50%; object-fit: cover; flex-shrink: 0; align-self: flex-end; border: 2px solid var(--whatsapp-dark); }
        .message .msg-bubble { padding: 8px 12px; border-radius: 8px; word-wrap: break-word; max-width: 100%; position: relative; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
        .message:not(.own) .msg-bubble { background: var(--whatsapp-dark-tertiary); color: var(--whatsapp-text-primary); border-top-left-radius: 0; }
        .message.own .msg-bubble { background: var(--whatsapp-chat-own); color: #111B21; border-top-right-radius: 0; }
        .message .msg-sender { font-size: 11px; font-weight: 600; color: var(--whatsapp-green); margin-bottom: 2px; }
        .message.own .msg-sender { color: #075E54; }
        .message .msg-text { font-size: 14px; line-height: 1.5; word-break: break-word; }
        .message .msg-text .image-container img { max-width: min(100%, 240px); max-height: 180px; border-radius: 4px; cursor: pointer; display: block; }
        .message .msg-time { font-size: 10px; opacity: 0.6; margin-top: 2px; text-align: right; }
        .message.own .msg-time { color: #111B21; }
        .message .msg-actions { display: flex; gap: 2px; margin-top: 2px; justify-content: flex-end; }
        .message .msg-actions button { background: none; border: none; font-size: 11px; cursor: pointer; opacity: 0.4; padding: 2px 4px; border-radius: 4px; color: inherit; }
        .message.own .msg-actions button { color: #111B21; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .typing-indicator { font-size: 12px; color: var(--whatsapp-text-secondary); padding: 2px 20px 6px; min-height: 20px; flex-shrink: 0; }
        .typing-indicator.active { color: var(--whatsapp-green); }
        .composer { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--whatsapp-dark-secondary); border-top: 1px solid var(--whatsapp-border); flex-shrink: 0; min-height: var(--composer-height); }
        .composer .attach-btn { background: none; border: none; color: var(--whatsapp-text-secondary); font-size: 22px; cursor: pointer; padding: 4px 6px; }
        .composer .attach-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .composer input { flex: 1; background: var(--whatsapp-dark-tertiary); border: none; border-radius: var(--whatsapp-radius); padding: 9px 14px; color: var(--whatsapp-text-primary); font-size: 14px; font-family: inherit; outline: none; min-width: 0; }
        .composer input::placeholder { color: var(--whatsapp-text-secondary); }
        .composer input:disabled { opacity: 0.4; cursor: not-allowed; }
        .composer .send-btn { background: var(--whatsapp-green); color: white; border: none; border-radius: 50%; width: 42px; height: 42px; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .composer .send-btn:active { transform: scale(0.88); }
        .composer .send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
        .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--whatsapp-dark-secondary); color: var(--whatsapp-text-primary); padding: 10px 24px; border-radius: var(--whatsapp-radius); font-size: 14px; font-weight: 500; box-shadow: 0 2px 8px rgba(0,0,0,0.3); z-index: 999; opacity: 0; transition: all 0.4s ease; max-width: 92%; text-align: center; pointer-events: none; border: 1px solid var(--whatsapp-border); }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: #FF3B30; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 1000; justify-content: center; align-items: center; padding: 20px; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--whatsapp-dark-secondary); border-radius: 16px; padding: 28px; max-width: 400px; width: 100%; max-height: 90vh; overflow-y: auto; border: 1px solid var(--whatsapp-border); }
        .modal h2 { font-size: 20px; font-weight: 700; color: var(--whatsapp-text-primary); margin-bottom: 20px; text-align: center; }
        .profile-pic-wrapper { position: relative; width: 100px; margin: 0 auto 20px; }
        .profile-pic-wrapper .profile-pic { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; display: block; border: 3px solid var(--whatsapp-green); }
        .profile-pic-wrapper .upload-overlay { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 4px 14px; border-radius: 30px; font-size: 11px; font-weight: 500; cursor: pointer; white-space: nowrap; }
        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label { display: block; font-size: 12px; font-weight: 600; color: var(--whatsapp-text-secondary); margin-bottom: 4px; }
        .modal .form-group input { width: 100%; padding: 10px 14px; border: 1px solid var(--whatsapp-border); border-radius: var(--whatsapp-radius); font-size: 14px; font-family: inherit; background: var(--whatsapp-dark); color: var(--whatsapp-text-primary); }
        .modal .form-group input:focus { border-color: var(--whatsapp-green); outline: none; }
        .modal .form-group input:disabled { opacity: 0.6; }
        .modal .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .modal .modal-actions button { flex: 1; padding: 10px; border: none; border-radius: var(--whatsapp-radius); font-weight: 600; font-size: 14px; cursor: pointer; }
        .modal .modal-actions .save-btn { background: var(--whatsapp-green); color: white; }
        .modal .modal-actions .cancel-btn { background: var(--whatsapp-dark-tertiary); color: var(--whatsapp-text-primary); }
        .image-preview-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.92); z-index: 2000; justify-content: center; align-items: center; cursor: pointer; padding: 20px; }
        .image-preview-overlay.active { display: flex; }
        .image-preview-overlay .preview-content { position: relative; max-width: 95%; max-height: 95%; }
        .image-preview-overlay img { max-width: 100%; max-height: 85vh; object-fit: contain; border-radius: 4px; }
        .image-preview-overlay .preview-actions { position: absolute; bottom: 20px; right: 20px; display: flex; gap: 10px; }
        .image-preview-overlay .preview-actions button { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 50%; width: 44px; height: 44px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .image-preview-overlay .preview-actions .download-btn-preview { background: var(--whatsapp-green); border-color: var(--whatsapp-green); }
        .call-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.95); z-index: 3000; justify-content: center; align-items: center; flex-direction: column; padding: 20px; }
        .call-overlay.active { display: flex; }
        .call-avatar { width: 120px; height: 120px; border-radius: 50%; object-fit: cover; border: 4px solid var(--whatsapp-green); margin-bottom: 20px; }
        .call-name { font-size: 24px; font-weight: 600; color: white; margin-bottom: 8px; }
        .call-status { font-size: 16px; color: var(--whatsapp-text-secondary); margin-bottom: 30px; }
        .call-status.ringing { color: var(--whatsapp-green); animation: pulse 1s infinite; }
        .call-actions { display: flex; gap: 30px; margin-top: 20px; }
        .call-actions button { width: 60px; height: 60px; border-radius: 50%; border: none; font-size: 28px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .call-actions button:active { transform: scale(0.9); }
        .call-actions .call-end { background: #FF3B30; color: white; }
        .call-actions .call-answer { background: var(--whatsapp-green); color: white; }
        .call-actions .call-mute { background: var(--whatsapp-dark-tertiary); color: white; }
        .call-actions .call-mute.active { background: #FF3B30; }
        .call-timer { font-size: 20px; color: white; font-weight: 300; margin-bottom: 20px; }
        .video-container { position: relative; width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; display: none; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .video-container .local-video { position: absolute; bottom: 20px; right: 20px; width: 120px; height: 160px; border-radius: 8px; border: 2px solid rgba(255,255,255,0.3); object-fit: cover; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @media (max-width: 768px) {
            .chat-list { max-width: 100%; position: absolute; z-index: 5; width: 100%; height: 100%; background: var(--whatsapp-dark); transition: transform 0.3s ease; }
            .chat-list.hidden { transform: translateX(-100%); position: absolute; }
            .chat-list:not(.hidden) { transform: translateX(0); position: relative; }
            .chat-area .chat-header .back-btn { display: flex !important; }
            .status-bar { display: none; }
            .friend-item .avatar { width: 44px; height: 44px; }
            .message { max-width: 90%; }
            .video-container .local-video { width: 80px; height: 106px; }
            .call-avatar { width: 80px; height: 80px; }
            .call-actions button { width: 50px; height: 50px; font-size: 22px; }
        }
        @media (min-width: 769px) {
            .chat-list.hidden { transform: none; position: relative; width: 420px; }
            .chat-area .chat-header .back-btn { display: none !important; }
        }
    </style>
</head>
<body>

<div class="status-bar">
    <span class="time" id="statusTime">12:00</span>
    <span class="icons">📶 📶 🔋</span>
</div>

<div class="app-container">
    <header class="header">
        <div class="header-left">
            <img src="https://raw.githubusercontent.com/mdakash0003478-am/connectbd/main/logo.png.jpeg" alt="ConnectBD" class="app-logo" id="logoClick" />
            <div class="app-title">Connect<span>BD</span></div>
        </div>
        <div class="header-right">
            <div id="userProfileMini" class="user-profile-mini" style="display:none;">
                <img id="miniAvatar" src="" alt="avatar" />
                <span class="user-name" id="miniName">User</span>
            </div>
            <button id="loginBtn" class="login-btn">🔑 লগইন</button>
            <button id="logoutBtn" class="logout-btn" style="display:none;">🚪</button>
        </div>
    </header>

    <div class="tabs">
        <div class="tab active" data-tab="chats">💬 চ্যাট <span class="tab-badge" id="friendCount">0</span></div>
        <div class="tab" data-tab="requests">📨 রিকোয়েস্ট <span class="tab-badge danger" id="requestCount">0</span></div>
        <div class="tab" data-tab="search">🔍 খুঁজুন</div>
    </div>

    <div class="main-content">
        <div class="chat-list" id="chatList">
            <div class="search-bar">
                <input type="text" id="searchFriend" placeholder="বন্ধু খুঁজুন..." />
            </div>
            <div class="friend-list-scroll" id="friendList">
                <div class="empty-state"><div class="icon">💬</div><span>কোনো বন্ধু নেই</span></div>
            </div>
        </div>

        <div class="chat-area" id="chatArea">
            <div class="chat-header">
                <button class="back-btn" id="backBtn">←</button>
                <div class="chat-info" id="chatFriendInfo">
                    <span style="color:var(--whatsapp-text-secondary);font-weight:500;">💬 বন্ধু নির্বাচন করুন</span>
                </div>
                <div class="header-actions" id="headerActions">
                    <button id="chatMenuBtn">⋮</button>
                </div>
            </div>

            <div class="typing-indicator" id="typingIndicator"></div>

            <div class="messages-container" id="messagesContainer">
                <div class="empty-state"><div class="icon">💬</div><span>একটি চ্যাট শুরু করুন</span></div>
            </div>

            <div class="composer">
                <button class="attach-btn" id="fileUploadBtn" disabled>📎</button>
                <input type="text" id="messageInput" placeholder="মেসেজ লিখুন..." disabled />
                <button class="send-btn" id="sendBtn" disabled>➤</button>
            </div>
        </div>
    </div>
</div>

<!-- CALL OVERLAY -->
<div class="call-overlay" id="callOverlay">
    <img id="callAvatar" class="call-avatar" src="" alt="Caller" />
    <div class="call-name" id="callName">Caller Name</div>
    <div class="call-status" id="callStatus">🔔 কল হচ্ছে...</div>
    <div class="call-timer" id="callTimer">00:00</div>
    <div class="video-container" id="videoContainer">
        <video class="remote-video" id="remoteVideo" autoplay playsinline></video>
        <video class="local-video" id="localVideo" autoplay playsinline muted></video>
    </div>
    <div class="call-actions">
        <button class="call-mute" id="callMuteBtn">🔊</button>
        <button class="call-end" id="callEndBtn">📞</button>
        <button class="call-answer" id="callAnswerBtn" style="display:none;">📞</button>
    </div>
</div>

<!-- MODALS -->
<div class="modal-overlay" id="profileModal">
    <div class="modal">
        <h2>👤 প্রোফাইল</h2>
        <div class="profile-pic-wrapper">
            <img id="modalProfilePic" class="profile-pic" src="" alt="Profile" />
            <div class="upload-overlay" id="modalUploadPic">📸 পরিবর্তন</div>
        </div>
        <div class="form-group"><label>ডিসপ্লে নাম</label><input type="text" id="modalDisplayName" /></div>
        <div class="form-group"><label>ইমেইল</label><input type="email" id="modalEmail" disabled /></div>
        <div class="modal-actions">
            <button class="cancel-btn" id="modalCancel">বাতিল</button>
            <button class="save-btn" id="modalSave">💾 সেভ করুন</button>
        </div>
    </div>
</div>

<div class="image-preview-overlay" id="imagePreview">
    <div class="preview-content">
        <img id="previewImage" src="" alt="Preview" />
        <div class="preview-actions">
            <button class="download-btn-preview" id="downloadPreviewBtn">⬇️</button>
            <button id="closePreviewBtn">✕</button>

// ============================================
// PEER / CALL SYSTEM
// ============================================
function initPeer(userId) {
    if (peer) { 
        peer.destroy(); 
        peer = null; 
        peerInitialized = false;
        peerId = null;
    }
    
    try {
        const id = userId;
        peerId = id;
        
        peer = new Peer(id, {
            debug: 0,
            config: {
                iceServers: [
                    { urls: 'stun:stun.l.google.com:19302' },
                    { urls: 'stun:stun1.l.google.com:19302' },
                    { urls: 'stun:stun2.l.google.com:19302' }
                ]
            }
        });
        
        peer.on('open', (id) => {
            console.log('📞 Peer connected:', id);
            peerInitialized = true;
            peerId = id;
            if (currentUser) {
                updateOnlineStatus(currentUser.uid, true);
                update(ref(db, `users/${currentUser.uid}`), { peerId: id });
                showToast('📞 কল সংযোগ প্রস্তুত!', 'success');
            }
        });
        
        peer.on('call', (incomingCall) => {
            console.log('📞 Incoming call from:', incomingCall.peer);
            const meta = incomingCall.metadata || {};
            let callerName = meta.callerName || 'ইউজার';
            let callerPhoto = meta.callerPhoto || '';
            for (const uid in allUsersCache) {
                if (allUsersCache[uid]?.peerId === incomingCall.peer) {
                    callerName = allUsersCache[uid].displayName || callerName;
                    callerPhoto = allUsersCache[uid].photoURL || callerPhoto;
                    break;
                }
            }
            incomingCallData = {
                call: incomingCall,
                callerName: callerName,
                callerPhoto: callerPhoto,
                callType: meta.callType || 'voice'
            };
            showIncomingCall(callerName, callerPhoto, incomingCall);
        });
        
        peer.on('error', (err) => {
            console.error('Peer error:', err);
            if (err.type === 'unavailable-id') {
                const newId = userId + '_' + Date.now();
                peerId = newId;
                setTimeout(() => initPeer(newId), 1000);
            }
        });
        
        peer.on('disconnected', () => {
            console.log('Peer disconnected, reconnecting...');
            peerInitialized = false;
            setTimeout(() => {
                if (peer && currentUser) {
                    peer.reconnect();
                }
            }, 3000);
        });
        
        peer.on('close', () => {
            console.log('Peer closed');
            peerInitialized = false;
            peerId = null;
        });
        
    } catch (e) { 
        console.error('Peer init error:', e);
        setTimeout(() => {
            if (currentUser) {
                const newId = currentUser.uid + '_' + Date.now();
                peerId = newId;
                initPeer(newId);
            }
        }, 3000);
    }
}

// ============================================
// START CALL
// ============================================
async function startCall(receiverId, callType = 'voice') {
    if (!currentUser) {
        showToast('প্রথমে লগইন করুন!', 'error');
        return;
    }
    
    if (!peerInitialized || !peer) {
        showToast('📞 কল সংযোগ তৈরি হচ্ছে...', 'success');
        await initPeer(currentUser.uid);
        await new Promise(resolve => {
            const checkPeer = () => {
                if (peerInitialized) {
                    resolve();
                } else {
                    setTimeout(checkPeer, 500);
                }
            };
            checkPeer();
        });
        setTimeout(() => startCall(receiverId, callType), 500);
        return;
    }
    
    try {
        const snap = await get(ref(db, `users/${receiverId}`));
        const receiverData = snap.val();
        
        if (!receiverData) {
            showToast('ব্যবহারকারী পাওয়া যায়নি!', 'error');
            return;
        }
        
        const receiverPeerId = receiverData.peerId;
        if (!receiverPeerId) {
            showToast('ব্যবহারকারী কলের জন্য উপলব্ধ নয়!', 'error');
            return;
        }
        
        if (!receiverData.online) {
            showToast('ব্যবহারকারী অফলাইনে!', 'error');
            return;
        }

        const stream = await navigator.mediaDevices.getUserMedia({ 
            audio: true, 
            video: callType === 'video' 
        });
        
        localStream = stream;
        
        if (callType === 'video') {
            DOM.videoContainer.style.display = 'block';
            DOM.localVideo.srcObject = stream;
        }

        const call = peer.call(receiverPeerId, stream, {
            metadata: { 
                callerName: currentUser.displayName || 'ইউজার', 
                callerPhoto: currentUser.photoURL || '', 
                callType: callType 
            }
        });
        
        currentCall = call;
        incomingCallData = null;
        showCallUI(receiverData, 'calling', callType);

        call.on('stream', (remoteStream) => {
            if (callType === 'video') {
                DOM.videoContainer.style.display = 'block';
                DOM.remoteVideo.srcObject = remoteStream;
            } else {
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play();
            }
            updateCallStatus('answered');
            DOM.callAnswer.style.display = 'none';
            startCallTimer();
        });
        
        call.on('close', () => {
            endCall();
        });
        
    } catch (e) {
        console.error('Call error:', e);
        showToast('কল শুরু করতে ব্যর্থ! মাইক্রোফোন/ক্যামেরা পারমিশন চেক করুন', 'error');
        endCall();
    }
}

// ============================================
// SHOW INCOMING CALL
// ============================================
function showIncomingCall(name, photo, incomingCall) {
    if (DOM.callOverlay.classList.contains('active')) {
        incomingCall.close();
        return;
    }
    
    currentCall = incomingCall;
    DOM.callAvatar.src = photo || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=00A884&color=fff';
    DOM.callName.textContent = name;
    DOM.callStatus.textContent = '📞 ইনকামিং কল...';
    DOM.callStatus.className = 'call-status ringing';
    DOM.callTimer.textContent = '00:00';
    DOM.videoContainer.style.display = 'none';
    DOM.callAnswer.style.display = 'flex';
    DOM.callMute.style.display = 'none';
    DOM.callOverlay.classList.add('active');
    
    if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);
    playRingtone();
    
    setTimeout(() => {
        if (DOM.callOverlay.classList.contains('active') && currentCall) {
            endCall();
            showToast('কল রিজেক্ট (টাইমআউট)', 'error');
        }
    }, 30000);
}

// ============================================
// ANSWER CALL
// ============================================
async function answerCall() {
    if (!currentCall || !incomingCallData) return;
    
    try {
        const callType = incomingCallData.callType || 'voice';
        const stream = await navigator.mediaDevices.getUserMedia({ 
            audio: true, 
            video: callType === 'video' 
        });
        
        localStream = stream;
        
        if (callType === 'video') {
            DOM.videoContainer.style.display = 'block';
            DOM.localVideo.srcObject = stream;
        }
        
        currentCall.answer(stream);
        DOM.callAnswer.style.display = 'none';
        DOM.callMute.style.display = 'flex';
        DOM.callMute.textContent = '🔊';
        DOM.callMute.classList.remove('active');
        isMuted = false;
        
        currentCall.on('stream', (remoteStream) => {
            if (callType === 'video') {
                DOM.remoteVideo.srcObject = remoteStream;
            } else {
                const audio = new Audio();
                audio.srcObject = remoteStream;
                audio.play();
            }
            updateCallStatus('answered');
            startCallTimer();
        });
        
        currentCall.on('close', () => {
            endCall();
        });
        
        stopRingtone();
        
    } catch (e) {
        console.error('Answer call error:', e);
        showToast('কল গ্রহণ ব্যর্থ!', 'error');
        endCall();
    }
}

function showCallUI(userData, status, callType = 'voice') {
    DOM.callAvatar.src = userData.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(userData.displayName || 'User') + '&background=00A884&color=fff';
    DOM.callName.textContent = userData.displayName || 'ইউজার';
    DOM.callTimer.textContent = '00:00';
    DOM.callStatus.textContent = status === 'calling' ? '🔔 কল হচ্ছে...' : '📞 ইনকামিং কল...';
    DOM.callStatus.className = 'call-status ringing';
    DOM.callAnswer.style.display = 'none';
    DOM.callMute.style.display = 'flex';
    DOM.callMute.textContent = '🔊';
    DOM.callMute.classList.remove('active');
    isMuted = false;
    DOM.videoContainer.style.display = callType === 'video' ? 'block' : 'none';
    DOM.callOverlay.classList.add('active');
}

function updateCallStatus(status) {
    const map = { 
        'ringing': '🔔 রিং হচ্ছে...', 
        'answered': '📞 সংযুক্ত', 
        'rejected': '❌ রিজেক্ট', 
        'ended': '📞 শেষ' 
    };
    DOM.callStatus.textContent = map[status] || status;
    DOM.callStatus.className = 'call-status';
    if (status === 'ringing') DOM.callStatus.classList.add('ringing');
}

function startCallTimer() {
    callStartTime = Date.now();
    if (callTimerInterval) clearInterval(callTimerInterval);
    callTimerInterval = setInterval(() => {
        const elapsed = Math.floor((Date.now() - callStartTime) / 1000);
        DOM.callTimer.textContent = `${String(Math.floor(elapsed/60)).padStart(2,'0')}:${String(elapsed%60).padStart(2,'0')}`;
    }, 1000);
}

function endCall() {
    if (localStream) { 
        localStream.getTracks().forEach(t => t.stop()); 
        localStream = null; 
    }
    if (currentCall) { 
        try { currentCall.close(); } catch(e) {} 
        currentCall = null; 
    }
    incomingCallData = null;
    DOM.callOverlay.classList.remove('active');
    DOM.videoContainer.style.display = 'none';
    DOM.callAnswer.style.display = 'none';
    DOM.callMute.style.display = 'flex';
    if (callTimerInterval) { clearInterval(callTimerInterval); callTimerInterval = null; }
    stopRingtone();
    DOM.remoteVideo.srcObject = null;
    DOM.localVideo.srcObject = null;
    if (navigator.vibrate) navigator.vibrate(0);
}

function toggleMute() {
    if (!localStream) return;
    isMuted = !isMuted;
    localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
    DOM.callMute.textContent = isMuted ? '🔇' : '🔊';
    DOM.callMute.classList.toggle('active', isMuted);
}

// ============================================
// RINGTONE
// ============================================
let ringtoneCtx = null;
let ringtoneInterval = null;

function playRingtone() {
    try {
        ringtoneCtx = new (window.AudioContext || window.webkitAudioContext)();
        let count = 0;
        ringtoneInterval = setInterval(() => {
            if (count >= 20 || !ringtoneCtx) { 
                clearInterval(ringtoneInterval); 
                return; 
            }
            try {
                const osc = ringtoneCtx.createOscillator();
                const gain = ringtoneCtx.createGain();
                osc.connect(gain); 
                gain.connect(ringtoneCtx.destination);
                osc.frequency.value = 440; 
                osc.type = 'sine';
                gain.gain.setValueAtTime(0.2, ringtoneCtx.currentTime);
                osc.start(); 
                osc.stop(ringtoneCtx.currentTime + 0.3);
                setTimeout(() => {
                    if (!ringtoneCtx) return;
                    const osc2 = ringtoneCtx.createOscillator();
                    const gain2 = ringtoneCtx.createGain();
                    osc2.connect(gain2); 
                    gain2.connect(ringtoneCtx.destination);
                    osc2.frequency.value = 440; 
                    osc2.type = 'sine';
                    gain2.gain.setValueAtTime(0.2, ringtoneCtx.currentTime);
                    osc2.start(); 
                    osc2.stop(ringtoneCtx.currentTime + 0.3);
                }, 400);
            } catch(e) {}
            count += 2;
        }, 1000);
    } catch(e) { console.log('Ringtone error:', e); }
}

function stopRingtone() {
    if (ringtoneInterval) { 
        clearInterval(ringtoneInterval); 
        ringtoneInterval = null; 
    }
    if (ringtoneCtx) { 
        try { ringtoneCtx.close(); } catch(e) {} 
        ringtoneCtx = null; 
    }
}

// ============================================
// START CHAT
// ============================================
function startChat(friendUid) {
    if (!friends[friendUid]) { 
        showToast('এই ইউজার আপনার বন্ধু নয়!', 'error'); 
        return; 
    }
    
    currentChatFriend = friendUid;
    const friend = friends[friendUid];
    const name = friend.displayName || 'ইউজার';
    const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=00A884&color=fff';
    
    const isOnline = allUsersCache[friendUid]?.online || false;
    
    DOM.chatFriendInfo.innerHTML = `
        <img src="${photo}" alt="${name}" />
        <div class="details">
            <div class="name">${name}</div>
            <div class="status ${isOnline ? 'online' : ''}" id="chatStatus">${isOnline ? '🟢 অনলাইন' : '⚪ অফলাইন'}</div>
        </div>
    `;
    
    markAsRead(friendUid);
    document.querySelectorAll('.friend-item').forEach(el => {
        el.classList.toggle('active', el.dataset.uid === friendUid);
    });
    
    if (isMobile) DOM.chatList.classList.add('hidden');
    
    loadPrivateMessages(friendUid);
    DOM.messageInput.disabled = false;
    DOM.sendBtn.disabled = false;
    DOM.fileUpload.disabled = false;
    DOM.messageInput.focus();
    
    setTimeout(addCallButtons, 500);
    
    const typingRef = ref(db, `typing/${currentUser.uid}/${friendUid}`);
    onValue(typingRef, (snapshot) => {
        const isTyping = snapshot.val();
        const statusEl = document.getElementById('chatStatus');
        if (isTyping) {
            statusEl.textContent = '✍️ টাইপ করছে...';
            statusEl.className = 'status typing';
        } else {
            const online = allUsersCache[friendUid]?.online || false;
            statusEl.textContent = online ? '🟢 অনলাইন' : '⚪ অফলাইন';
            statusEl.className = `status ${online ? 'online' : ''}`;
        }
    });
}

// ============================================
// LOAD MESSAGES
// ============================================
function loadPrivateMessages(friendUid) {
    if (messageListener) { messageListener(); messageListener = null; }
    const chatId = [currentUser.uid, friendUid].sort().join('_');
    const messagesRef = query(ref(db, `privateChats/${chatId}/messages`), orderByChild('timestamp'), limitToLast(50));
    DOM.messages.innerHTML = '';
    messageListener = onChildAdded(messagesRef, (snapshot) => {
        const msg = snapshot.val();
        if (!msg) return;
        if (DOM.messages.querySelector(`[data-key="${snapshot.key}"]`)) return;
        appendMessage(snapshot.key, msg);
    });
    onChildChanged(messagesRef, (snapshot) => {
        const msg = snapshot.val();
        const el = DOM.messages.querySelector(`[data-key="${snapshot.key}"]`);
        if (el) {
            const textEl = el.querySelector('.msg-text');
            if (textEl) {
                if (msg.image) textEl.innerHTML = `<div class="image-container"><img src="${msg.image}" onclick="window.openImagePreview('${msg.image}')" /></div>`;
                else textEl.innerHTML = msg.text + (msg.edited ? ' <span style="font-size:10px;opacity:0.5;">(edited)</span>' : '');
            }
        }
    });
    onChildRemoved(messagesRef, (snapshot) => {
        const el = DOM.messages.querySelector(`[data-key="${snapshot.key}"]`);
        if (el) { el.style.opacity = '0.3'; el.querySelector('.msg-text').innerHTML = '🔴 ডিলিট করা হয়েছে'; }
    });
}

function appendMessage(key, msg) {
    const isOwn = msg.uid === currentUser.uid;
    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' }) : '';
    const div = document.createElement('div');
    div.className = `message ${isOwn ? 'own' : ''}`;
    div.dataset.key = key;
    const avatar = msg.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(msg.displayName || 'U') + '&background=00A884&color=fff';
    let content = '';
    if (msg.image) {
        content = `<div class="image-container"><img src="${msg.image}" onclick="window.openImagePreview('${msg.image}')" /></div>`;
    } else {
        content = msg.text + (msg.edited ? ' <span style="font-size:10px;opacity:0.5;">(edited)</span>' : '');
    }
    div.innerHTML = `
        <img src="${avatar}" class="msg-avatar" loading="lazy" />
        <div class="msg-bubble">
            <div class="msg-sender">${isOwn ? 'আপনি' : (msg.displayName || 'ইউজার')}</div>
            <div class="msg-text">${content}</div>
            <div class="msg-time">${time}</div>
            ${isOwn ? `<div class="msg-actions"><button class="edit-btn" data-key="${key}">✏️</button><button class="delete-btn" data-key="${key}">🗑️</button></div>` : ''}
        </div>
    `;
    DOM.messages.appendChild(div);
    DOM.messages.scrollTop = DOM.messages.scrollHeight;
    if (isOwn) {
        div.querySelector('.edit-btn')?.addEventListener('click', () => editMessage(key, msg.text));
        div.querySelector('.delete-btn')?.addEventListener('click', () => deleteMessage(key));
    }
}

// ============================================
// DELETE / EDIT MESSAGE
// ============================================
async function deleteMessage(key) {
    if (!currentUser || !currentChatFriend || !confirm('মেসেজ ডিলিট করতে চান?')) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    try {
        await update(ref(db, `privateChats/${chatId}/messages/${key}`), { text: '🔴 ডিলিট করা হয়েছে', deleted: true });
        showToast('✅ ডিলিট করা হয়েছে');
    } catch(e) { showToast('ডিলিট ব্যর্থ!', 'error'); }
}
async function editMessage(key, oldText) {
    if (!currentUser || !currentChatFriend) return;
    const newText = prompt('মেসেজ এডিট করুন:', oldText);
    if (!newText || newText === oldText) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    try {
        await update(ref(db, `privateChats/${chatId}/messages/${key}`), { text: newText, edited: true, editedAt: Date.now() });
        showToast('✅ এডিট করা হয়েছে');
    } catch(e) { showToast('এডিট ব্যর্থ!', 'error'); }
}

// ============================================
// SEND MESSAGE
// ============================================
async function sendPrivateMessage() {
    const text = DOM.messageInput.value.trim();
    if (!text || !currentUser || !currentChatFriend) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    const newMsgRef = push(ref(db, `privateChats/${chatId}/messages`));
    await set(newMsgRef, {
        text, uid: currentUser.uid, displayName: currentUser.displayName || 'ইউজার',
        photoURL: currentUser.photoURL || '', timestamp: Date.now()
    });
    const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
    const snap = await get(unreadRef);
    await set(unreadRef, (snap.val() || 0) + 1);
    DOM.messageInput.value = '';
    DOM.messageInput.focus();
}

DOM.fileInput.addEventListener('change', async (e) => {

    if (!file) return;
    if (!file.type.startsWith('image/')) { showToast('শুধু ছবি আপলোড করতে পারবেন!', 'error'); DOM.fileInput.value = ''; return; }
    if (file.size > 2 * 1024 * 1024) { showToast('ছবি 2MB এর কম হতে হবে!', 'error'); DOM.fileInput.value = ''; return; }
    await sendImageMessageBase64(file);
    DOM.fileInput.value = '';
});

// ============================================
// SEND IMAGE
// ============================================
async function sendImageMessageBase64(file) {
    if (!file || !currentUser || !currentChatFriend) { showToast('ছবি পাঠাতে ব্যর্থ!', 'error'); return; }
    try {
        showToast('📤 ছবি প্রস্তুত হচ্ছে...', 'success');
        const base64Image = await imageToBase64(file);
        const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
        const messagesRef = ref(db, `privateChats/${chatId}/messages`);
        const newMsgRef = push(messagesRef);
        const fileExt = file.name.split('.').pop() || 'jpg';
        const fileName = `image_${Date.now()}.${fileExt}`;
        await set(newMsgRef, {
            text: '📷',
            image: base64Image,
            uid: currentUser.uid,
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            timestamp: Date.now(),
            isBase64: true,
            fileName: fileName
        });
        const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
        const snapshot = await get(unreadRef);
        await set(unreadRef, (snapshot.val() || 0) + 1);
        showToast('✅ ছবি পাঠানো হয়েছে!');
    } catch (e) { showToast(`ছবি পাঠাতে ব্যর্থ: ${e.message}`, 'error'); }
}

function switchTab(tabName) {
    tabs.forEach(t => t.classList.remove('active'));
    const target = document.querySelector(`[data-tab="${tabName}"]`);
    if (target) target.classList.add('active');
    if (isMobile) { DOM.chatList.classList.remove('hidden'); DOM.chatList.style.display = 'flex'; }
    else { DOM.chatList.classList.remove('hidden'); DOM.chatList.style.display = 'flex'; }
    if (tabName === 'chats') renderFriends();
    else if (tabName === 'requests') renderRequestsTab();
    else if (tabName === 'search') renderSearchTab();
}

tabs.forEach(tab => tab.addEventListener('click', () => switchTab(tab.dataset.tab)));

    if (pending.length === 0) {
        html = `<div class="empty-state"><div class="icon">📨</div><span>কোনো রিকোয়েস্ট নেই</span></div>`;
    } else {
        pending.forEach(uid => {
            const req = requests[uid];
            const name = req.displayName || 'ইউজার';
            const photo = req.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=00A884&color=fff';
            html += `
                <div class="friend-item" style="cursor:default;" data-uid="${uid}">
                    <img src="${photo}" class="avatar" loading="lazy" />
                    <div class="info"><div class="name">${name}</div><div class="last-msg" style="color:var(--whatsapp-text-secondary);">📨 রিকোয়েস্ট</div></div>
                    <div class="meta" style="flex-direction:row;gap:4px;">
                        <button class="btn-accept" style="background:var(--whatsapp-green);color:white;border:none;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;" data-uid="${uid}">✅ গ্রহণ</button>

    document.querySelectorAll('.btn-accept').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); acceptFriendRequest(b.dataset.uid); }));
    document.querySelectorAll('.btn-reject').forEach(b => b.addEventListener('click', (e) => { e.stopPropagation(); rejectFriendRequest(b.dataset.uid); }));

        document.querySelectorAll('.send-request-btn').forEach(b => b.addEventListener('click', () => sendFriendRequest(b.dataset.uid)));
    });
}

// ============================================
// FRIEND REQUESTS
// ============================================
async function acceptFriendRequest(fromUid) {
    if (!currentUser) return;
    try {
        const snap = await get(ref(db, `users/${fromUid}`));
        const senderData = snap.val();
        if (!senderData) { showToast('ইউজার পাওয়া যায়নি!', 'error'); return; }
        await set(ref(db, `friends/${currentUser.uid}/${fromUid}`), {
            displayName: senderData.displayName || 'ইউজার',
            photoURL: senderData.photoURL || '',
            online: senderData.online || false,
            addedAt: Date.now()
        });
        await set(ref(db, `friends/${fromUid}/${currentUser.uid}`), {
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            online: true,
            addedAt: Date.now()
        });
        await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
        showToast('বন্ধু রিকোয়েস্ট গ্রহণ করা হয়েছে! 🎉');
        friends[fromUid] = senderData;
        DOM.friendCount.textContent = Object.keys(friends).length;
        switchTab('chats');
        setTimeout(() => { renderFriends(); if (isMobile) { DOM.chatList.classList.remove('hidden'); DOM.chatList.style.display = 'flex'; } }, 200);
    } catch(e) { showToast(`এক্সেপ্ট ব্যর্থ: ${e.message}`, 'error'); }
}
async function rejectFriendRequest(fromUid) {
    if (!currentUser) return;
    try { await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`)); showToast('রিকোয়েস্ট রিজেক্ট করা হয়েছে'); renderRequestsTab(); }
    catch(e) { showToast(`রিজেক্ট ব্যর্থ: ${e.message}`, 'error'); }
}
async function sendFriendRequest(toUid) {
    if (!currentUser) return;
    if (toUid === currentUser.uid) { showToast('নিজেকে রিকোয়েস্ট পাঠানো যায় না!', 'error'); return; }
    if (friends[toUid]) { showToast('ইতিমধ্যে বন্ধু!', 'error'); return; }
    if (requests[toUid] && requests[toUid].status === 'pending') { showToast('ইতিমধ্যে রিকোয়েস্ট পাঠানো!', 'error'); return; }
    try {
        const snap = await get(ref(db, `users/${toUid}`));
        if (!snap.exists()) { showToast('ইউজার পাওয়া যায়নি!', 'error'); return; }
        await set(ref(db, `friendRequests/${toUid}/${currentUser.uid}`), {
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            status: 'pending',
            timestamp: Date.now()
        });
        showToast('ফ্রেন্ড রিকোয়েস্ট পাঠানো হয়েছে! 📨');
        $('searchResults').innerHTML = `<div style="color:var(--whatsapp-green);text-align:center;padding:8px;">✅ রিকোয়েস্ট পাঠানো হয়েছে</div>`;
    } catch(e) { showToast(`রিকোয়েস্ট ব্যর্থ: ${e.message}`, 'error'); }
}

// ============================================
// EVENT LISTENERS
// ============================================
DOM.sendBtn.onclick = sendPrivateMessage;
DOM.messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendPrivateMessage(); });
DOM.messageInput.addEventListener('input', handleTyping);
DOM.backBtn.addEventListener('click', () => { DOM.chatList.classList.remove('hidden'); DOM.chatList.style.display = 'flex'; });
DOM.callEnd.addEventListener('click', endCall);
DOM.callAnswer.addEventListener('click', answerCall);
DOM.callMute.addEventListener('click', toggleMute);

// ============================================
// LOGIN
// ============================================
DOM.loginBtn.onclick = async () => {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        await saveUserData(user);
        showToast(`স্বাগতম ${user.displayName || 'ইউজার'}! 🎉`);
    } catch (e) {
        if (e.code !== 'auth/popup-closed-by-user') {
            showToast(`লগইন ব্যর্থ: ${e.message}`, 'error');
            console.error('Login error:', e);
        }
    }
};

// ============================================
// LOGOUT
// ============================================
DOM.logoutBtn.onclick = async () => {
    try {
        if (currentUser) {
            await updateOnlineStatus(currentUser.uid, false);
            if (peer) { peer.destroy(); peer = null; peerInitialized = false; peerId = null; }
        }
        await signOut(auth);
        showToast('সাইন আউট করা হয়েছে।');
    } catch(e) { showToast(`সাইন আউট ব্যর্থ: ${e.message}`, 'error'); }
};

// ============================================
// AUTH STATE
// ============================================
onAuthStateChanged(auth, async (user) => {
    updateUI(user);
    if (user) {
        await saveUserData(user);
        await updateOnlineStatus(user.uid, true);
        setTimeout(() => initPeer(user.uid), 1500);
    }
});

// ============================================
// PROFILE MODAL
// ============================================
DOM.userProfileMini.addEventListener('click', () => {
    if (!currentUser) return;
    DOM.modalPic.src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=00A884&color=fff';
    DOM.modalName.value = currentUser.displayName || '';
    DOM.modalEmail.value = currentUser.email || '';
    DOM.profileModal.classList.add('active');
});
DOM.logo.addEventListener('click', () => {
    if (!currentUser) return;
    DOM.modalPic.src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=00A884&color=fff';
    DOM.modalName.value = currentUser.displayName || '';
    DOM.modalEmail.value = currentUser.email || '';
    DOM.profileModal.classList.add('active');
});
DOM.modalUpload.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        if (file.size > 2 * 1024 * 1024) { showToast('ছবি 2MB এর কম হতে হবে!', 'error'); return; }
        showToast('📤 আপলোড হচ্ছে...', 'success');
        const base64 = await imageToBase64(file);
        if (base64) { DOM.modalPic.src = base64; showToast('✅ প্রোফাইল ছবি আপলোড হয়েছে!'); }
    };
    input.click();
});
DOM.modalCancel.addEventListener('click', () => DOM.profileModal.classList.remove('active'));
DOM.modalSave.addEventListener('click', async () => {
    const name = DOM.modalName.value.trim();
    const photo = DOM.modalPic.src;
    if (!name) { showToast('নাম দেওয়া আবশ্যক!', 'error'); return; }
    await updateUserProfile(name, photo);
    DOM.profileModal.classList.remove('active');
});
DOM.profileModal.addEventListener('click', (e) => { if (e.target === DOM.profileModal) DOM.profileModal.classList.remove('active'); });

// ============================================
// IMAGE PREVIEW
// ============================================
DOM.downloadPreview.addEventListener('click', () => {
    const src = DOM.previewImage.src;
    if (src) downloadImage(src);
});
DOM.closePreview.addEventListener('click', () => DOM.imagePreview.classList.remove('active'));
DOM.imagePreview.addEventListener('click', (e) => { if (e.target === DOM.imagePreview) DOM.imagePreview.classList.remove('active'); });

// ============================================
// WINDOW RESIZE
// ============================================
window.addEventListener('resize', () => {
    isMobile = window.innerWidth <= 768;
    if (!isMobile) { DOM.chatList.classList.remove('hidden'); DOM.chatList.style.display = 'flex'; }
});

// ============================================
// BEFORE UNLOAD
// ============================================
window.addEventListener('beforeunload', () => {
    if (currentUser) updateOnlineStatus(currentUser.uid, false);
    if (localStream) localStream.getTracks().forEach(t => t.stop());
    if (peer) { peer.destroy(); peer = null; }
});

console.log('📱 ConnectBD WhatsApp Style Ready!');
console.log('📞 Call System Fully Fixed!');
console.log('🔍 Search works with email and name!');
console.log('✅ Online status updates every 3 seconds!');
</script>
