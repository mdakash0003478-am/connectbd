<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConnectBD - Private Friend Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #eaf3f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 2rem;
            max-width: 1100px;
            width: 100%;
            box-shadow: 0 30px 60px -20px rgba(0, 20, 40, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(60, 130, 180, 0.15);
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            padding: 4px;
            border: 2px solid rgba(255, 255, 255, 0.9);
            cursor: pointer;
            transition: 0.3s;
        }

        .app-logo:hover {
            transform: scale(1.05);
        }

        .app-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0b2b40;
        }

        .app-title span {
            color: #1976D2;
        }

        .app-title small {
            font-size: 0.8rem;
            font-weight: 400;
            color: #3b5c6e;
            display: block;
            margin-top: -4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.6);
            padding: 6px 16px 6px 10px;
            border-radius: 40px;
            border: 1px solid rgba(200, 215, 225, 0.5);
            cursor: pointer;
            transition: 0.3s;
        }

        .user-profile-mini:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .user-profile-mini img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .user-profile-mini .user-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #0b2b40;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .header-btn {
            background: transparent;
            border: 1px solid #b6ccdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2f536b;
            cursor: pointer;
            transition: 0.15s;
        }

        .header-btn:hover {
            background: #e6eef5;
            border-color: #7f9bb3;
        }

        .header-btn.primary {
            background: #1976D2;
            border-color: #1976D2;
            color: white;
        }

        .header-btn.primary:hover {
            background: #1565C0;
        }

        .header-btn.danger {
            background: #d32f2f;
            border-color: #d32f2f;
            color: white;
        }

        .header-btn.danger:hover {
            background: #b71c1c;
        }

        .main-content {
            display: flex;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
            padding-top: 1.2rem;
        }

        .sidebar {
            width: 260px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            max-height: 550px;
            display: flex;
            flex-direction: column;
        }

        .sidebar-section {
            margin-bottom: 1rem;
        }

        .sidebar-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #53768b;
            font-weight: 600;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .badge-count {
            background: #1976D2;
            color: white;
            font-size: 0.6rem;
            padding: 2px 8px;
            border-radius: 20px;
        }

        .badge-count.unread {
            background: #ff4444;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            margin-bottom: 4px;
            position: relative;
        }

        .friend-item:hover {
            background: rgba(25, 118, 210, 0.08);
        }

        .friend-item.active {
            background: rgba(25, 118, 210, 0.15);
            font-weight: 600;
        }

        .friend-item img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .friend-item .friend-name {
            flex: 1;
            font-size: 0.9rem;
            color: #1f4c66;
        }

        .friend-item .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4caf50;
            display: inline-block;
        }

        .friend-item .status-dot.offline {
            background: #bdbdbd;
        }

        .friend-item .unread-badge {
            background: #ff4444;
            color: white;
            font-size: 0.6rem;
            padding: 2px 6px;
            border-radius: 10px;
            min-width: 18px;
            text-align: center;
        }

        .request-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 6px 10px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.5);
            margin-bottom: 6px;
            font-size: 0.85rem;
        }

        .request-item img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .request-item .req-name {
            flex: 1;
            color: #1f4c66;
        }

        .request-item .req-actions {
            display: flex;
            gap: 6px;
        }

        .request-item .req-actions button {
            padding: 2px 10px;
            border: none;
            border-radius: 20px;
            font-size: 0.7rem;
            cursor: pointer;
            font-weight: 600;
        }

        .btn-accept {
            background: #4caf50;
            color: white;
        }

        .btn-accept:hover {
            background: #388e3c;
        }

        .btn-reject {
            background: #ef5350;
            color: white;
        }

        .btn-reject:hover {
            background: #c62828;
        }

        .search-box {
            width: 100%;
            padding: 6px 12px;
            border: 1px solid #dce3e9;
            border-radius: 20px;
            font-size: 0.8rem;
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            margin-bottom: 8px;
        }

        .search-box:focus {
            border-color: #1976D2;
        }

        .friend-list-scroll {
            flex: 1;
            overflow-y: auto;
        }

        .friend-list-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .friend-list-scroll::-webkit-scrollbar-thumb {
            background: #b6ccdd;
            border-radius: 10px;
        }

        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(60, 130, 180, 0.1);
        }

        .chat-header .chat-friend-name {
            font-weight: 600;
            color: #0b2b40;
            font-size: 1.1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chat-header .chat-friend-name img {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
        }

        .chat-header .chat-status {
            font-size: 0.75rem;
            color: #53768b;
        }

        .chat-header .chat-status.online {
            color: #4caf50;
        }

        .chat-header .chat-status.typing {
            color: #1976D2;
            animation: pulse 1s infinite;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 4px;
            margin: 8px 0;
            max-height: 380px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
            position: relative;
        }

        .message:hover .message-actions {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(6px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid white;
        }

        .message .msg-bubble {
            background: white;
            padding: 10px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
            word-wrap: break-word;
            flex: 1;
            position: relative;
            max-width: 100%;
        }

        .message.own .msg-bubble {
            background: #1976D2;
            color: white;
            border-top-left-radius: 18px;
            border-top-right-radius: 4px;
        }

        .message .msg-sender {
            font-size: 0.7rem;
            font-weight: 600;
            color: #1976D2;
            margin-bottom: 2px;
        }

        .message.own .msg-sender {
            color: #bbdefb;
        }

        .message .msg-text {
            font-size: 0.92rem;
            line-height: 1.4;
            word-break: break-word;
        }

        .message .msg-text .image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
        }

        .message .msg-text .image-container img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 8px;
            margin: 4px 0;
            cursor: pointer;
            transition: 0.3s;
            display: block;
        }

        .message .msg-text .image-container img:hover {
            transform: scale(1.02);
        }

        .message .msg-text .image-container .image-actions {
            position: absolute;
            bottom: 10px;
            right: 10px;
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: 0.3s;
        }

        .message .msg-text .image-container:hover .image-actions {
            opacity: 1;
        }

        .message .msg-text .image-container .image-actions button {
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 32px;
            height: 32px;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .message .msg-text .image-container .image-actions button:hover {
            background: rgba(0,0,0,0.9);
            transform: scale(1.1);
        }

        .message .msg-text .image-container .image-actions .download-btn:hover {
            background: #1976D2;
        }

        .message .msg-time {
            font-size: 0.6rem;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .message.own .msg-time {
            color: #bbdefb;
        }

        .message .message-actions {
            display: none;
            position: absolute;
            top: -10px;
            right: -10px;
            gap: 4px;
            background: white;
            border-radius: 12px;
            padding: 2px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .message.own .message-actions {
            right: auto;
            left: -10px;
        }

        .message .message-actions button {
            background: none;
            border: none;
            padding: 2px 6px;
            cursor: pointer;
            font-size: 0.7rem;
            border-radius: 4px;
            transition: 0.2s;
        }

        .message .message-actions button:hover {
            background: #e0e0e0;
        }

        .message .message-actions .delete-btn:hover {
            color: #d32f2f;
        }

        .message .message-actions .edit-btn:hover {
            color: #1976D2;
        }

        .typing-indicator-global {
            font-size: 0.7rem;
            color: #1976D2;
            font-style: italic;
            padding: 4px 8px;
            min-height: 20px;
        }

        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(60, 130, 180, 0.1);
            flex-wrap: wrap;
        }

        .input-area .input-wrapper {
            flex: 1;
            display: flex;
            gap: 8px;
            min-width: 0;
        }

        .input-area input[type="text"] {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #dce3e9;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            transition: 0.15s;
            min-width: 0;
        }

        .input-area input[type="text"]:focus {
            border-color: #1976D2;
            background: white;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.08);
        }

        .input-area input[type="text"]:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-area .file-upload-btn {
            padding: 10px 16px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.15s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .input-area .file-upload-btn:hover:not(:disabled) {
            background: #388e3c;
            transform: scale(1.02);
        }

        .input-area .file-upload-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-area .send-btn {
            padding: 10px 24px;
            border: none;
            background: #1976D2;
            color: white;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
        }

        .input-area .send-btn:hover:not(:disabled) {
            background: #1565C0;
            transform: scale(1.02);
        }

        .input-area .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .empty-state {
            text-align: center;
            color: #53768b;
            padding: 40px 0;
            font-size: 0.9rem;
        }

        .empty-state .icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e7e34;
            color: white;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: #d32f2f;
        }

        /* Profile Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 24px;
            padding: 2rem;
            max-width: 400px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: fadeIn 0.3s ease;
        }

        .modal h2 {
            color: #0b2b40;
            margin-bottom: 1rem;
        }

        .modal .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            margin: 0 auto 1rem;
            display: block;
            border: 3px solid #1976D2;
        }

        .modal .profile-pic-wrapper {
            position: relative;
            width: 100px;
            margin: 0 auto 1rem;
        }

        .modal .profile-pic-wrapper .upload-overlay {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 0.6rem;
            cursor: pointer;
        }

        .modal .form-group {
            margin-bottom: 1rem;
        }

        .modal .form-group label {
            display: block;
            font-size: 0.8rem;
            color: #53768b;
            margin-bottom: 4px;
        }

        .modal .form-group input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #dce3e9;
            border-radius: 12px;
            font-size: 0.95rem;
        }

        .modal .form-group input:focus {
            border-color: #1976D2;
            outline: none;
        }

        .modal .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 1rem;
        }

        .modal .modal-actions button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }

        .modal .modal-actions .save-btn {
            background: #1976D2;
            color: white;
        }

        .modal .modal-actions .save-btn:hover {
            background: #1565C0;
        }

        .modal .modal-actions .cancel-btn {
            background: #e0e0e0;
            color: #333;
        }

        .modal .modal-actions .cancel-btn:hover {
            background: #d0d0d0;
        }

        /* Image Preview Modal */
        .image-preview-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 2000;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }

        .image-preview-overlay.active {
            display: flex;
        }

        .image-preview-overlay .preview-content {
            position: relative;
            max-width: 90%;
            max-height: 90%;
        }

        .image-preview-overlay img {
            max-width: 100%;
            max-height: 90vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .image-preview-overlay .preview-actions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            display: flex;
            gap: 10px;
        }

        .image-preview-overlay .preview-actions button {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            color: white;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            width: 44px;
            height: 44px;
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-preview-overlay .preview-actions button:hover {
            background: rgba(255,255,255,0.4);
            transform: scale(1.1);
        }

        .image-preview-overlay .preview-actions .download-btn-preview {
            background: #1976D2;
            border-color: #1976D2;
        }

        .image-preview-overlay .preview-actions .download-btn-preview:hover {
            background: #1565C0;
        }

        @media (max-width: 768px) {
            .app-container {
                padding: 1.2rem;
            }
            .main-content {
                flex-direction: column;
            }
            .sidebar {
                width: 100%;
                max-height: 200px;
            }
            .friend-list-scroll {
                max-height: 100px;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
            }
            .header-right {
                justify-content: space-between;
            }
            .messages-container {
                max-height: 250px;
                min-height: 180px;
            }
            .input-area .input-wrapper {
                flex-wrap: wrap;
            }
            .message .msg-text .image-container img {
                max-height: 150px;
            }
        }

        @media (max-width: 480px) {
            .app-container {
                padding: 1rem;
                border-radius: 28px;
            }
            .app-title {
                font-size: 1.2rem;
            }
            .message {
                max-width: 95%;
            }
            .sidebar {
                max-height: 180px;
            }
            .message .msg-text .image-container img {
                max-height: 120px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <div class="header-left">
                <img src="https://raw.githubusercontent.com/mdakash0003478-am/connectbd/main/logo.png.jpeg" alt="ConnectBD" class="app-logo" id="logoClick" />
                <div class="app-title">
                    Connect<span>BD</span>
                    <small>প্রাইভেট চ্যাট</small>
                </div>
            </div>
            <div class="header-right">
                <div id="userProfileMini" class="user-profile-mini" style="display: none;">
                    <img id="miniAvatar" src="" alt="avatar" />
                    <span class="user-name" id="miniName">User</span>
                </div>
                <button id="loginBtn" class="header-btn primary">🔑 লগইন</button>
                <button id="logoutBtn" class="header-btn danger" style="display: none;">সাইন আউট</button>
            </div>
        </div>

        <div class="main-content">
            <div class="sidebar">
                <div class="sidebar-section">
                    <div class="sidebar-title">
                        👥 বন্ধুরা
                        <span class="badge-count" id="friendCount">0</span>
                    </div>

        function showToast(message, type = 'success') {
            if (toastTimeout) {
                clearTimeout(toastTimeout);
                toastEl.classList.remove('show');
            }
            toastEl.textContent = message;
            toastEl.className = 'toast';
            if (type === 'error') toastEl.classList.add('error');
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
                toastTimeout = null;
            }, 3500);
        }

        // ===== Compress Image =====
        function compressImage(file, maxWidth, maxHeight) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = (event) => {
                    const img = new Image();
                    img.src = event.target.result;
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;
                        
                        if (width > height) {
                            if (width > maxWidth) {
                                height = Math.round(height * maxWidth / width);
                                width = maxWidth;
                            }
                        } else {
                            if (height > maxHeight) {
                                width = Math.round(width * maxHeight / height);
                                height = maxHeight;
                            }
                        }
                        
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        canvas.toBlob((blob) => {
                            resolve(blob);
                        }, 'image/jpeg', 0.7);
                    };
                    img.onerror = reject;
                };
                reader.onerror = reject;
            });
        }

        // ===== Image to Base64 =====
        function imageToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            });
        }

        // ===== Download Image =====
        function downloadImage(imageSrc, filename = 'image.jpg') {
            try {
                const link = document.createElement('a');
                link.href = imageSrc;
                link.download = filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
                showToast('✅ ছবি ডাউনলোড শুরু হয়েছে!');
            } catch (error) {
                console.error('Download error:', error);
                showToast('ডাউনলোড করতে ব্যর্থ!', 'error');
            }
        }

        // ===== Send Image as Base64 =====
        async function sendImageMessageBase64(file) {
            if (!file || !currentUser || !currentChatFriend) {
                showToast('ছবি পাঠাতে ব্যর্থ!', 'error');
                return;
            }

            try {
                showToast('📤 ছবি প্রস্তুত হচ্ছে...', 'success');
                
                // Compress image before sending
                const compressed = await compressImage(file, 800, 800);
                const base64Image = await imageToBase64(compressed);
                
                const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
                const messagesRef = ref(db, `privateChats/${chatId}/messages`);
                const newMsgRef = push(messagesRef);

                const fileExt = file.name.split('.').pop() || 'jpg';
                const fileName = `image_${Date.now()}.${fileExt}`;

                await set(newMsgRef, {
                    text: '📷',
                    image: base64Image,
                    uid: currentUser.uid,
                    displayName: currentUser.displayName || 'ইউজার',
                    photoURL: currentUser.photoURL || '',
                    timestamp: Date.now(),
                    isBase64: true,
                    fileName: fileName
                });

                // Try unread count (silent fail)
                try {
                    const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
                    const snapshot = await get(unreadRef);
                    const count = (snapshot.val() || 0) + 1;
                    await set(unreadRef, count);
                } catch (_) {
                    // Ignore unread errors
                }

                showToast('✅ ছবি পাঠানো হয়েছে!');
            } catch (error) {
                console.error('Send image error:', error);
                showToast(`ছবি পাঠাতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== Save user data =====
        async function saveUserData(user) {
            try {
                const userRef = ref(db, `users/${user.uid}`);
                const snapshot = await get(userRef);
                const existingData = snapshot.val();
                
                const completeUserData = {
                    displayName: user.displayName || 'ইউজার',
                    email: user.email || '',
                    photoURL: user.photoURL || '',
                    online: true,
                    lastSeen: Date.now()
                };
                
                if (!existingData || !existingData.displayName || !existingData.email) {
                    console.log('📝 Creating/Updating user with complete data...');
                    await set(userRef, completeUserData);
                    return true;
                } else {
                    await update(userRef, {
                        online: true,
                        lastSeen: Date.now()
                    });
                    return false;
                }
            } catch (error) {
                console.error('❌ Error saving user data:', error);
                return false;
            }
        }

        // ===== Fix all users =====
        async function fixAllUsers() {
            if (!currentUser) {
                showToast('প্রথমে লগইন করুন!', 'error');
                return;
            }
            
            try {
                const usersRef = ref(db, 'users');
                const snapshot = await get(usersRef);
                const users = snapshot.val();
                
                if (!users) {
                    showToast('কোনো ইউজার নেই!', 'error');
                    return;
                }
                
                let fixed = 0;
                for (const uid in users) {
                    const user = users[uid];
                    if (!user.displayName || !user.email) {
                        await update(ref(db, `users/${uid}`), {
                            displayName: user.displayName || 'ইউজার',
                            email: user.email || 'user@email.com',
                            photoURL: user.photoURL || ''
                        });
                        fixed++;
                        console.log(`✅ Fixed user: ${uid}`);
                    }
                }
                
                showToast(`✅ ${fixed} জন ইউজার ফিক্স করা হয়েছে!`);
                loadAllUsers();
                return fixed;
            } catch (error) {
                showToast(`ফিক্স করতে ব্যর্থ: ${error.message}`, 'error');
                return 0;
            }
        }

        // ===== Update profile with compression =====
        async function updateUserProfile(displayName, photoURL) {
            if (!currentUser) return;
            try {
                let finalPhotoURL = photoURL;
                
                // If photo is base64 and too large, compress it
                if (photoURL && photoURL.startsWith('data:image')) {
                    const sizeInBytes = (photoURL.length * 3) / 4;
                    if (sizeInBytes > 150 * 1024) { // 150KB limit
                        showToast('ছবি কম্প্রেস করা হচ্ছে...', 'success');
                        try {
                            const response = await fetch(photoURL);
                            const blob = await response.blob();
                            const compressed = await compressImage(blob, 150, 150);
                            finalPhotoURL = await imageToBase64(compressed);
                        } catch (e) {
                            console.warn('Compression failed, using original:', e);
                            finalPhotoURL = photoURL;
                        }
                    }
                }
                
                await update(ref(db, `users/${currentUser.uid}`), {
                    displayName: displayName,
                    photoURL: finalPhotoURL
                });
                
                try {
                    await firebaseUpdateProfile(auth.currentUser, {
                        displayName: displayName,
                        photoURL: finalPhotoURL
                    });
                } catch (e) {
                    console.warn('Auth profile update failed:', e);
                }
                
                showToast('✅ প্রোফাইল আপডেট করা হয়েছে!');
                updateUI(currentUser);
            } catch (error) {
                console.error('Profile update error:', error);
                showToast(`প্রোফাইল আপডেট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // Load all users
        function loadAllUsers() {
            const usersRef = ref(db, 'users');
            onValue(usersRef, (snapshot) => {
                const data = snapshot.val();
                if (data) {
                    allUsersCache = data;
                }
            });
        }

        // Load friends
        function loadFriendsAndRequests() {
            if (!currentUser) return;

            const friendsRef = ref(db, `friends/${currentUser.uid}`);
            onValue(friendsRef, (snapshot) => {
                const data = snapshot.val();
                friends = data || {};
                friendCount.textContent = Object.keys(friends).length;
                renderFriends();
                loadUnreadCounts();
            });

            const requestsRef = ref(db, `friendRequests/${currentUser.uid}`);
            onValue(requestsRef, (snapshot) => {
                const data = snapshot.val();
                requests = data || {};
                const count = Object.keys(requests).filter(key => requests[key].status === 'pending').length;
                requestCount.textContent = count;
                renderRequests();
            });
        }

        // Load unread counts
        function loadUnreadCounts() {
            if (!currentUser) return;
            const unreadRef = ref(db, `unread/${currentUser.uid}`);
            onValue(unreadRef, (snapshot) => {
                unreadCounts = snapshot.val() || {};
                renderFriends();
            });
        }

        // Mark as read
        async function markAsRead(friendUid) {
            if (!currentUser || !friendUid) return;
            const unreadRef = ref(db, `unread/${currentUser.uid}/${friendUid}`);
            await remove(unreadRef);
            unreadCounts[friendUid] = 0;
            renderFriends();
        }

        // Render friends
        function renderFriends() {
            const searchTerm = searchFriend.value.toLowerCase();
            let html = '';
            let friendKeys = Object.keys(friends);

            if (friendKeys.length === 0) {
                html = `<div class="empty-state" style="padding: 20px 0; font-size: 0.8rem;"><div class="icon">👤</div>কোনো বন্ধু নেই</div>`;
            } else {
                friendKeys.forEach(uid => {
                    const friend = friends[uid];
                    const name = friend.displayName || 'ইউজার';
                    const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) +
                        '&background=1976D2&color=fff';
                    const unread = unreadCounts[uid] || 0;

                    if (searchTerm && !name.toLowerCase().includes(searchTerm)) return;

                    const isActive = currentChatFriend === uid;
                    html += `
                        <div class="friend-item ${isActive ? 'active' : ''}" data-uid="${uid}">
                            <img src="${photo}" alt="${name}" />
                            <span class="friend-name">${name}</span>
                            ${unread > 0 ? `<span class="unread-badge">${unread}</span>` : ''}
                            <span class="status-dot ${friend.online ? '' : 'offline'}"></span>
                        </div>
                    `;
                });
            }

            friendList.innerHTML = html;

            document.querySelectorAll('.friend-item').forEach(el => {
                el.addEventListener('click', () => {
                    const uid = el.dataset.uid;
                    if (uid && friends[uid]) {
                        startChat(uid);
                    }
                });
            });
        }

        // Render requests
        function renderRequests() {
            let html = '';
            let pendingRequests = Object.keys(requests).filter(key => requests[key].status === 'pending');

            if (pendingRequests.length === 0) {
                html = `<div style="color: #53768b; font-size: 0.8rem; padding: 4px 0;">কোনো রিকোয়েস্ট নেই</div>`;
            } else {
                pendingRequests.forEach(uid => {
                    const req = requests[uid];
                    const name = req.displayName || 'ইউজার';
                    const photo = req.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) +
                        '&background=1976D2&color=fff';
                    html += `
                        <div class="request-item" data-uid="${uid}">
                            <img src="${photo}" alt="${name}" />
                            <span class="req-name">${name}</span>
                            <div class="req-actions">

                                <button class="btn-reject" data-uid="${uid}">❌</button>
                            </div>
                        </div>
                    `;
                });
            }

            requestList.innerHTML = html;

            document.querySelectorAll('.btn-accept').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const uid = btn.dataset.uid;
                    acceptFriendRequest(uid);
                });
            });

            document.querySelectorAll('.btn-reject').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const uid = btn.dataset.uid;
                    rejectFriendRequest(uid);
                });
            });
        }

        // Accept friend request
        async function acceptFriendRequest(fromUid) {
            if (!currentUser) return;

            try {
                const senderRef = ref(db, `users/${fromUid}`);
                const snapshot = await get(senderRef);
                const senderData = snapshot.val();

                if (!senderData) {
                    showToast('ইউজার পাওয়া যায়নি!', 'error');
                    return;
                }

                await set(ref(db, `friends/${currentUser.uid}/${fromUid}`), {
                    displayName: senderData.displayName || 'ইউজার',
                    photoURL: senderData.photoURL || '',
                    online: false,
                    addedAt: Date.now()
                });

                await set(ref(db, `friends/${fromUid}/${currentUser.uid}`), {
                    displayName: currentUser.displayName || 'ইউজার',
                    photoURL: currentUser.photoURL || '',
                    online: true,
                    addedAt: Date.now()
                });

                await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
                showToast('বন্ধু রিকোয়েস্ট গ্রহণ করা হয়েছে! 🎉');
            } catch (error) {
                showToast(`এক্সেপ্ট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // Reject friend request
        async function rejectFriendRequest(fromUid) {
            if (!currentUser) return;
            try {
                await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
                showToast('রিকোয়েস্ট রিজেক্ট করা হয়েছে');
            } catch (error) {
                showToast(`রিজেক্ট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // Send friend request
        async function sendFriendRequest(toUid) {
            if (!currentUser) return;
            if (toUid === currentUser.uid) {
                showToast('নিজেকে ফ্রেন্ড রিকোয়েস্ট পাঠানো যায় না!', 'error');
                return;
            }

            if (friends[toUid]) {
                showToast('ইতিমধ্যে বন্ধু!', 'error');
                return;
            }

            if (requests[toUid] && requests[toUid].status === 'pending') {
                showToast('ইতিমধ্যে রিকোয়েস্ট পাঠানো হয়েছে!', 'error');
                return;
            }

            try {
                const userRef = ref(db, `users/${toUid}`);
                const snapshot = await get(userRef);
                const userData = snapshot.val();

                if (!userData) {
                    showToast('ইউজার পাওয়া যায়নি!', 'error');
                    return;
                }

                await set(ref(db, `friendRequests/${toUid}/${currentUser.uid}`), {
                    displayName: currentUser.displayName || 'ইউজার',
                    photoURL: currentUser.photoURL || '',
                    status: 'pending',
                    timestamp: Date.now()
                });

                showToast('ফ্রেন্ড রিকোয়েস্ট পাঠানো হয়েছে! 📨');
                searchResults.innerHTML = `<div style="color: #4caf50;">✅ রিকোয়েস্ট পাঠানো হয়েছে</div>`;
            } catch (error) {
                showToast(`রিকোয়েস্ট পাঠাতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // Typing indicator
        function handleTyping() {
            if (!currentUser || !currentChatFriend) return;
            const typingRef = ref(db, `typing/${currentChatFriend}/${currentUser.uid}`);
            set(typingRef, true);
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                remove(typingRef);
            }, 2000);
        }

        // Start chat
        function startChat(friendUid) {
            if (!friends[friendUid]) {
                showToast('এই ইউজার আপনার বন্ধু নয়!', 'error');
                return;
            }

            currentChatFriend = friendUid;
            const friend = friends[friendUid];
            const name = friend.displayName || 'ইউজার';
            const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) +
                '&background=1976D2&color=fff';

            chatFriendInfo.innerHTML = `
                <img src="${photo}" alt="${name}" />
                <span>${name}</span>
            `;
            chatStatus.textContent = friend.online ? '🟢 অনলাইন' : '⚪ অফলাইন';
            chatStatus.className = `chat-status ${friend.online ? 'online' : ''}`;

            markAsRead(friendUid);

            document.querySelectorAll('.friend-item').forEach(el => {
                el.classList.toggle('active', el.dataset.uid === friendUid);
            });

            loadPrivateMessages(friendUid);
            messageInput.disabled = false;
            sendBtn.disabled = false;
            fileUploadBtn.disabled = false;
            messageInput.focus();
            
            const typingRef = ref(db, `typing/${currentUser.uid}/${friendUid}`);
            onValue(typingRef, (snapshot) => {
                const isTyping = snapshot.val();
                if (isTyping) {
                    chatStatus.textContent = '✍️ টাইপ করছে...';
                    chatStatus.className = 'chat-status typing';
                } else {
                    const friend = friends[friendUid];
                    chatStatus.textContent = friend?.online ? '🟢 অনলাইন' : '⚪ অফলাইন';
                    chatStatus.className = `chat-status ${friend?.online ? 'online' : ''}`;
                }
            });
        }

        // Load messages
        function loadPrivateMessages(friendUid) {
            if (messageListener) {
                messageListener();
                messageListener = null;
            }

            const chatId = [currentUser.uid, friendUid].sort().join('_');
            const messagesRef = query(
                ref(db, `privateChats/${chatId}/messages`),
                orderByChild('timestamp'),
                limitToLast(50)
            );

            messagesContainer.innerHTML = '';

            messageListener = onChildAdded(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                const msgKey = snapshot.key;
                if (!msg) return;

                const existing = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
                if (existing) return;

                appendMessage(msgKey, msg);
            });

            onChildChanged(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                const msgKey = snapshot.key;
                if (!msg) return;
                
                const msgElement = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
                if (msgElement) {
                    const textElement = msgElement.querySelector('.msg-text');
                    if (textElement) {
                        if (msg.image) {
                            textElement.innerHTML = createImageHTML(msg.image, msg.fileName);
                        } else {
                            textElement.innerHTML = msg.text + (msg.edited ? ' <span style="font-size:0.6rem;">(edited)</span>' : '');
                        }
                    }
                }
            });

            onChildRemoved(messagesRef, (snapshot) => {
                const msgKey = snapshot.key;
                const msgElement = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
                if (msgElement) {
                    msgElement.style.opacity = '0.3';
                    msgElement.querySelector('.msg-text').innerHTML = '🔴 This message was deleted';
                }
            });
        }

        // ===== Create Image HTML =====
        function createImageHTML(imageSrc, fileName = 'image.jpg') {
            return `
                <div class="image-container">
                    <img src="${imageSrc}" alt="Image" onclick="openImagePreview('${imageSrc}', '${fileName}')" />
                    <div class="image-actions">
                        <button class="download-btn" onclick="event.stopPropagation(); downloadImageFromSrc('${imageSrc}', '${fileName}')" title="ডাউনলোড করুন">⬇️</button>
                    </div>
                </div>
            `;
        }

        // ===== Append message =====
        function appendMessage(msgKey, msg) {
            const isOwn = msg.uid === currentUser.uid;
            const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('bn-BD', { hour: '2-digit',
                    minute: '2-digit' }) : '';

            const div = document.createElement('div');
            div.className = `message ${isOwn ? 'own' : ''}`;
            div.dataset.key = msgKey;
            div.dataset.uid = msg.uid;

            const avatar = msg.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(msg
                .displayName || 'U') + '&background=1976D2&color=fff';

            let content = '';
            if (msg.image) {
                const fileName = msg.fileName || `image_${Date.now()}.jpg`;
                content = createImageHTML(msg.image, fileName);
            } else {
                content = msg.text + (msg.edited ? ' <span style="font-size:0.6rem;">(edited)</span>' : '');
            }

            div.innerHTML = `
                <img src="${avatar}" alt="avatar" class="msg-avatar" />
                <div class="msg-bubble">
                    <div class="msg-sender">${isOwn ? 'আপনি' : (msg.displayName || 'ইউজার')}</div>
                    <div class="msg-text">${content}</div>
                    <div class="msg-time">${time}</div>
                    <div class="message-actions">
                        ${isOwn ? `
                            <button class="edit-btn" data-key="${msgKey}" title="Edit">✏️</button>
                            <button class="delete-btn" data-key="${msgKey}" title="Delete">🗑️</button>
                        ` : ''}
                    </div>
                </div>
            `;

            messagesContainer.appendChild(div);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;

            if (isOwn) {
                div.querySelector('.edit-btn')?.addEventListener('click', () => {
                    editMessage(msgKey, msg.text);
                });
                div.querySelector('.delete-btn')?.addEventListener('click', () => {
                    deleteMessage(msgKey);
                });
            }
        }

        // ===== Global functions =====
        window.openImagePreview = function(imageSrc, fileName) {
            previewImage.src = imageSrc;
            previewImage.dataset.src = imageSrc;
            previewImage.dataset.filename = fileName || 'image.jpg';
            imagePreview.classList.add('active');
        };

        window.downloadImageFromSrc = function(imageSrc, fileName) {
            downloadImage(imageSrc, fileName || 'image.jpg');
        };

        // ===== Image Preview =====
        downloadPreviewBtn.addEventListener('click', () => {
            const src = previewImage.dataset.src || previewImage.src;
            const filename = previewImage.dataset.filename || 'image.jpg';
            downloadImage(src, filename);
        });

        closePreviewBtn.addEventListener('click', () => {
            imagePreview.classList.remove('active');
        });

        imagePreview.addEventListener('click', (e) => {
            if (e.target === imagePreview) {
                imagePreview.classList.remove('active');
            }
        });

        // ===== Delete message =====
        async function deleteMessage(msgKey) {
            if (!currentUser || !currentChatFriend) return;
            if (!confirm('এই মেসেজ ডিলিট করতে চান?')) return;

            const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
            const msgRef = ref(db, `privateChats/${chatId}/messages/${msgKey}`);
            try {
                await update(msgRef, {
                    text: '🔴 This message was deleted',
                    deleted: true
                });
                showToast('✅ মেসেজ ডিলিট করা হয়েছে');
            } catch (error) {
                showToast(`ডিলিট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== Edit message =====
        async function editMessage(msgKey, oldText) {
            if (!currentUser || !currentChatFriend) return;
            const newText = prompt('মেসেজ এডিট করুন:', oldText);
            if (!newText || newText === oldText) return;

            const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
            const msgRef = ref(db, `privateChats/${chatId}/messages/${msgKey}`);
            try {
                await update(msgRef, {
                    text: newText,
                    edited: true,
                    editedAt: Date.now()
                });
                showToast('✅ মেসেজ এডিট করা হয়েছে');
            } catch (error) {
                showToast(`এডিট করতে ব্যর্থ: ${error.message}`, 'error');
            }
        }

        // ===== Send message =====
        async function sendPrivateMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser || !currentChatFriend) return;

            const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
            const messagesRef = ref(db, `privateChats/${chatId}/messages`);
            const newMsgRef = push(messagesRef);

            await set(newMsgRef, {
                text: text,
                uid: currentUser.uid,
                displayName: currentUser.displayName || 'ইউজার',
                photoURL: currentUser.photoURL || '',
                timestamp: Date.now()
            });

            try {
                const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
                const snapshot = await get(unreadRef);
                const count = (snapshot.val() || 0) + 1;
                await set(unreadRef, count);
            } catch (_) {}

            messageInput.value = '';
            messageInput.focus();
        }

        // ===== File Upload =====
        fileUploadBtn.addEventListener('click', () => {
            if (!currentUser || !currentChatFriend) {
                showToast('প্রথমে একটি চ্যাট নির্বাচন করুন!', 'error');
                return;
            }
            fileInput.click();
        });

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!file.type.startsWith('image/')) {
                showToast('শুধু ছবি আপলোড করতে পারবেন!', 'error');
                fileInput.value = '';
                return;
            }

            if (file.size > 2 * 1024 * 1024) {
                showToast('ছবি 2MB এর কম হতে হবে!', 'error');
                fileInput.value = '';
                return;
            }

            await sendImageMessageBase64(file);
            fileInput.value = '';
        });

        // ===== Search =====
        searchUserBtn.addEventListener('click', async () => {
            const query = searchUser.value.trim().toLowerCase();
            if (!query) {
                searchResults.innerHTML = '';
                return;
            }

            if (!currentUser) {
                showToast('লগইন করুন প্রথমে!', 'error');
                return;
            }

            let foundUsers = [];
            Object.keys(allUsersCache).forEach(uid => {
                const user = allUsersCache[uid];
                if (uid === currentUser.uid) return;
                const name = (user.displayName || '').toLowerCase();
                const email = (user.email || '').toLowerCase();
                if (name.includes(query) || email.includes(query)) {
                    foundUsers.push({ uid, ...user });
                }
            });

            if (foundUsers.length === 0) {
                searchResults.innerHTML = `<div style="color: #53768b; font-size: 0.8rem;">কোনো ইউজার পাওয়া যায়নি</div>`;
                return;
            }

            let html = '';
            foundUsers.forEach(user => {
                const isFriend = friends[user.uid];
                const isRequested = requests[user.uid] && requests[user.uid].status === 'pending';
                const photo = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user
                    .displayName || 'U') + '&background=1976D2&color=fff';

                html += `
                    <div style="display: flex; align-items: center; gap: 8px; padding: 4px 0; border-bottom: 1px solid rgba(0,0,0,0.05);">
                        <img src="${photo}" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover;" />
                        <span style="flex: 1; font-size: 0.85rem;">${user.displayName || 'ইউজার'}</span>
                        ${isFriend ? '<span style="color: #4caf50; font-size: 0.7rem;">✅ বন্ধু</span>' :
                        isRequested ? '<span style="color: #ff9800; font-size: 0.7rem;">⏳ রিকোয়েস্ট পাঠানো</span>' :
                        `<button class="header-btn" style="font-size: 0.7rem; padding: 4px 12px;" data-uid="${user.uid}">➕ বন্ধু করুন</button>`
                        }
                    </div>
                `;
            });

            searchResults.innerHTML = html;

            document.querySelectorAll('#searchResults button[data-uid]').forEach(btn => {
                btn.addEventListener('click', () => {
                    sendFriendRequest(btn.dataset.uid);
                });
            });
        });

        searchFriend.addEventListener('input', renderFriends);

        // Send message
        sendBtn.onclick = sendPrivateMessage;
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendPrivateMessage();
        });
        messageInput.addEventListener('input', handleTyping);

        // ===== Login =====
        loginBtn.onclick = async () => {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;
                
                await saveUserData(user);
                showToast(`স্বাগতম ${user.displayName || 'ইউজার'}! 🎉`);
                
                setTimeout(async () => {
                    const usersRef = ref(db, 'users');
                    const snapshot = await get(usersRef);
                    const users = snapshot.val();
                    let needsFix = false;
                    if (users) {
                        for (const uid in users) {
                            if (!users[uid].displayName || !users[uid].email) {
                                needsFix = true;
                                break;
                            }
                        }
                    }
                    if (needsFix) {
                        if (confirm('🔧 কিছু ইউজারের ডেটা ঠিক করতে হবে। এখনই ঠিক করবেন?')) {
                            await fixAllUsers();
                        }
                    }
                }, 2000);
                
            } catch (error) {
                if (error.code !== 'auth/popup-closed-by-user') {
                    showToast(`লগইন ব্যর্থ: ${error.message}`, 'error');
                }
            }
        };

        // Logout
        logoutBtn.onclick = async () => {
            try {
                if (currentUser) {
                    await set(ref(db, `users/${currentUser.uid}/online`), false);
                    await set(ref(db, `users/${currentUser.uid}/lastSeen`), Date.now());
                }
                await signOut(auth);
                showToast('সাইন আউট করা হয়েছে।');
            } catch (error) {
                showToast(`সাইন আউট ব্যর্থ: ${error.message}`, 'error');
            }
        };

        // Auth state
        onAuthStateChanged(auth, async (user) => {
            updateUI(user);
            if (user) {
                await saveUserData(user);
                await set(ref(db, `users/${user.uid}/online`), true);
                await set(ref(db, `users/${user.uid}/lastSeen`), Date.now());
            }
        });

        // ===== Profile Modal =====
        userProfileMini.addEventListener('click', () => {
            if (!currentUser) return;
            modalProfilePic.src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=1976D2&color=fff';
            modalDisplayName.value = currentUser.displayName || '';
            modalEmail.value = currentUser.email || '';
            profileModal.classList.add('active');
        });

        logoClick.addEventListener('click', () => {
            if (!currentUser) return;
            modalProfilePic.src = currentUser.photoURL || 'https://ui-avatars.com/api/?name=User&background=1976D2&color=fff';
            modalDisplayName.value = currentUser.displayName || '';
            modalEmail.value = currentUser.email || '';
            profileModal.classList.add('active');
        });

        // ===== Profile Upload Handler (with compression) =====
        modalUploadPic.addEventListener('click', () => {
            const input = document.createElement('input');
            input.type = 'file';
            input.accept = 'image/*';
            input.onchange = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                
                // Max 500KB for profile picture
                if (file.size > 500 * 1024) {
                    showToast('প্রোফাইল ছবি 500KB এর কম হতে হবে!', 'error');
                    return;
                }
                
                showToast('📤 কম্প্রেস করা হচ্ছে...', 'success');
                
                try {
                    // Compress to 150x150
                    const compressed = await compressImage(file, 150, 150);
                    const base64 = await imageToBase64(compressed);
                    
                    // Check final size
                    const sizeInBytes = (base64.length * 3) / 4;
                    if (sizeInBytes > 150 * 1024) {
                        // Compress more if still too large
                        const smaller = await compressImage(compressed, 100, 100);
                        const smallerBase64 = await imageToBase64(smaller);
                        modalProfilePic.src = smallerBase64;
                    } else {
                        modalProfilePic.src = base64;
                    }
                    showToast('✅ প্রোফাইল ছবি আপলোড হয়েছে!');
                } catch (error) {
                    console.error('Upload error:', error);
                    showToast('ছবি আপলোড করতে ব্যর্থ!', 'error');
                }
            };
            input.click();
        });

        modalCancel.addEventListener('click', () => {
            profileModal.classList.remove('active');
        });

        modalSave.addEventListener('click', async () => {
            const displayName = modalDisplayName.value.trim();
            const photoURL = modalProfilePic.src;
            if (!displayName) {
                showToast('নাম দেওয়া আবশ্যক!', 'error');
                return;
            }
            await updateUserProfile(displayName, photoURL);
            profileModal.classList.remove('active');
        });

        profileModal.addEventListener('click', (e) => {
            if (e.target === profileModal) {
                profileModal.classList.remove('active');
            }
        });

        // Handle page unload
        window.addEventListener('beforeunload', () => {
            if (currentUser) {
                set(ref(db, `users/${currentUser.uid}/online`), false);
                set(ref(db, `users/${currentUser.uid}/lastSeen`), Date.now());
            }
        });

        // ===== EXPOSE functions =====
        window.fixAllUsers = fixAllUsers;
        window.saveUserData = saveUserData;
        window.downloadImage = downloadImage;
        window.db = db;
        window.auth = auth;

        console.log('🔥 ConnectBD Private Chat ready with Image Download & Profile Fix!');
        console.log('📌 Features:');
        console.log('  ✅ Image Upload (Base64 - No Storage needed)');
        console.log('  ✅ Image Download (⬇️ button on image)');
        console.log('  ✅ Profile Picture Upload (Auto Compressed)');
        console.log('  ✅ Chat Message Delete/Edit');
        console.log('  ✅ Typing Indicator');
        console.log('  ✅ Online/Offline Status');
        console.log('  ✅ Unread Message Count');
        console.log('🔧 To fix all users, run: fixAllUsers()');
        console.log('💡 Profile image auto compressed to < 150KB');
    </script>
</body>
</html>
