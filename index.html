<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>ConnectBD - WhatsApp Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --whatsapp-green: #00A884;
            --whatsapp-dark: #111B21;
            --whatsapp-dark-secondary: #202C33;
            --whatsapp-dark-tertiary: #2A3942;
            --whatsapp-light: #E9EDF0;
            --whatsapp-light-secondary: #F0F2F5;
            --whatsapp-chat-own: #D9FDD3;
            --whatsapp-chat-other: #FFFFFF;
            --whatsapp-text-primary: #E9EDF0;
            --whatsapp-text-secondary: #AEBAC1;
            --whatsapp-text-dark: #111B21;
            --whatsapp-border: #2A3942;
            --whatsapp-shadow: 0 2px 8px rgba(0,0,0,0.3);
            --whatsapp-radius: 8px;
            --whatsapp-avatar-size: 40px;
            --status-bar-height: 24px;
            --header-height: 60px;
            --composer-height: 62px;
            --tab-height: 48px;
        }

        html, body {
            height: 100%;
            overflow: hidden;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--whatsapp-dark);
            color: var(--whatsapp-text-primary);
        }

        /* WhatsApp Status Bar */
        .status-bar {
            height: var(--status-bar-height);
            background: var(--whatsapp-dark);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            font-size: 12px;
            font-weight: 500;
            color: var(--whatsapp-text-secondary);
            flex-shrink: 0;
        }
        .status-bar .time { font-weight: 600; color: var(--whatsapp-text-primary); }
        .status-bar .icons { display: flex; gap: 6px; font-size: 13px; }

        /* App Container - Full Screen */
        .app-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            height: 100dvh;
            background: var(--whatsapp-dark);
            max-width: 100%;
            overflow: hidden;
        }

        /* ===== HEADER ===== */
        .header {
            height: var(--header-height);
            background: var(--whatsapp-dark-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            flex-shrink: 0;
            border-bottom: 1px solid var(--whatsapp-border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 0;
        }

        .header-left .app-logo {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            cursor: pointer;
            border: 2px solid var(--whatsapp-green);
        }

        .header-left .app-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--whatsapp-text-primary);
            letter-spacing: -0.3px;
        }
        .header-left .app-title span { color: var(--whatsapp-green); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .header-btn {
            background: transparent;
            border: none;
            color: var(--whatsapp-text-secondary);
            font-size: 20px;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
        }
        .header-btn:active { background: rgba(255,255,255,0.1); transform: scale(0.92); }
        .header-btn .badge {
            position: absolute;
            top: 2px;
            right: 2px;
            background: var(--whatsapp-green);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 50%;
            min-width: 18px;
            text-align: center;
        }
        .header-btn .badge.danger { background: #FF3B30; }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 4px 8px 4px 4px;
            border-radius: 30px;
            transition: all 0.2s;
        }
        .user-profile-mini:active { background: rgba(255,255,255,0.05); }
        .user-profile-mini img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--whatsapp-green);
        }
        .user-profile-mini .user-name {
            font-size: 13px;
            font-weight: 500;
            color: var(--whatsapp-text-primary);
            max-width: 80px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .login-btn {
            background: var(--whatsapp-green);
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .login-btn:active { transform: scale(0.94); opacity: 0.8; }

        /* ===== TABS ===== */
        .tabs {
            display: flex;
            background: var(--whatsapp-dark-secondary);
            border-bottom: 1px solid var(--whatsapp-border);
            flex-shrink: 0;
            height: var(--tab-height);
        }
        .tab {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            color: var(--whatsapp-text-secondary);
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 3px solid transparent;
            padding: 0 8px;
            touch-action: manipulation;
            position: relative;
        }
        .tab.active {
            color: var(--whatsapp-green);
            border-bottom-color: var(--whatsapp-green);
        }
        .tab:active { background: rgba(255,255,255,0.03); }
        .tab .tab-badge {
            background: var(--whatsapp-green);
            color: white;
            font-size: 10px;
            font-weight: 700;
            padding: 1px 6px;
            border-radius: 50%;
            min-width: 18px;
            text-align: center;
        }
        .tab .tab-badge.danger { background: #FF3B30; }

        /* ===== MAIN CONTENT ===== */
        .main-content {
            flex: 1;
            display: flex;
            overflow: hidden;
            background: var(--whatsapp-dark);
            position: relative;
        }

        /* ===== CHAT LIST (Sidebar) ===== */
        .chat-list {
            width: 100%;
            max-width: 420px;
            flex-shrink: 0;
            background: var(--whatsapp-dark);
            display: flex;
            flex-direction: column;
            border-right: 1px solid var(--whatsapp-border);
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .chat-list.hidden {
            transform: translateX(-100%);
            position: absolute;
            width: 100%;
            max-width: 100%;
            z-index: 10;
        }

        /* Search Bar */
        .search-bar {
            padding: 6px 12px;
            background: var(--whatsapp-dark-secondary);
            flex-shrink: 0;
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-bar .search-icon {
            color: var(--whatsapp-text-secondary);
            font-size: 16px;
            padding: 4px;
        }
        .search-bar input {
            flex: 1;
            background: var(--whatsapp-dark-tertiary);
            border: none;
            border-radius: var(--whatsapp-radius);
            padding: 8px 14px;
            color: var(--whatsapp-text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
        }
        .search-bar input::placeholder { color: var(--whatsapp-text-secondary); }
        .search-bar input:focus { background: var(--whatsapp-dark); }

        /* Friend List */
        .friend-list-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }

        .friend-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            cursor: pointer;
            transition: all 0.15s;
            border-bottom: 1px solid var(--whatsapp-border);
            touch-action: manipulation;
        }
        .friend-item:active { background: var(--whatsapp-dark-tertiary); }
        .friend-item.active { background: var(--whatsapp-dark-tertiary); }

        .friend-item .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid transparent;
        }
        .friend-item .avatar.online { border-color: var(--whatsapp-green); }

        .friend-item .info {
            flex: 1;
            min-width: 0;
        }
        .friend-item .info .name {
            font-size: 15px;
            font-weight: 500;
            color: var(--whatsapp-text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .friend-item .info .last-msg {
            font-size: 13px;
            color: var(--whatsapp-text-secondary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .friend-item .info .last-msg .sender { font-weight: 500; color: var(--whatsapp-text-primary); }

        .friend-item .meta {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
            flex-shrink: 0;
        }
        .friend-item .meta .time {
            font-size: 11px;
            color: var(--whatsapp-text-secondary);
        }
        .friend-item .meta .unread-badge {
            background: var(--whatsapp-green);
            color: white;
            font-size: 11px;
            font-weight: 700;
            padding: 1px 8px;
            border-radius: 50%;
            min-width: 20px;
            text-align: center;
        }
        .friend-item .meta .unread-badge.danger { background: #FF3B30; }

        .friend-item .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--whatsapp-green);
            flex-shrink: 0;
            border: 2px solid var(--whatsapp-dark-secondary);
        }
        .friend-item .status-dot.offline { background: var(--whatsapp-text-secondary); }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--whatsapp-text-secondary);
            font-size: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        .empty-state .icon { font-size: 48px; opacity: 0.5; }

        /* ===== CHAT AREA ===== */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--whatsapp-dark);
            min-width: 0;
            position: relative;
        }

        .chat-area .chat-header {
            height: var(--header-height);
            background: var(--whatsapp-dark-secondary);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            border-bottom: 1px solid var(--whatsapp-border);
            flex-shrink: 0;
        }

        .chat-area .chat-header .back-btn {
            display: none;
            background: none;
            border: none;
            color: var(--whatsapp-text-primary);
            font-size: 22px;
            cursor: pointer;
            padding: 4px 8px;
        }

        .chat-area .chat-header .chat-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
            min-width: 0;
        }
        .chat-area .chat-header .chat-info img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
        }
        .chat-area .chat-header .chat-info .details {
            flex: 1;
            min-width: 0;
        }
        .chat-area .chat-header .chat-info .details .name {
            font-size: 15px;
            font-weight: 600;
            color: var(--whatsapp-text-primary);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chat-area .chat-header .chat-info .details .status {
            font-size: 12px;
            color: var(--whatsapp-text-secondary);
        }
        .chat-area .chat-header .chat-info .details .status.online { color: var(--whatsapp-green); }
        .chat-area .chat-header .chat-info .details .status.typing { color: var(--whatsapp-green); animation: pulse 1s infinite; }

        .chat-area .chat-header .header-actions {
            display: flex;
            gap: 2px;
            flex-shrink: 0;
        }
        .chat-area .chat-header .header-actions button {
            background: none;
            border: none;
            color: var(--whatsapp-text-secondary);
            font-size: 18px;
            padding: 6px 10px;
            cursor: pointer;
            border-radius: 50%;
            transition: all 0.2s;
        }
        .chat-area .chat-header .header-actions button:active { background: rgba(255,255,255,0.1); }

        /* Messages */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding: 12px 16px 8px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            background: var(--whatsapp-dark);
            background-image: 
                radial-gradient(ellipse at 20% 50%, rgba(0, 168, 132, 0.03) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 50%, rgba(0, 168, 132, 0.03) 0%, transparent 50%);
        }

        .message {
            display: flex;
            gap: 8px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }
        .message.own { align-self: flex-end; flex-direction: row-reverse; }

        .message .msg-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            align-self: flex-end;
            border: 2px solid var(--whatsapp-dark);
        }

        .message .msg-bubble {
            padding: 8px 12px;
            border-radius: 8px;
            word-wrap: break-word;
            max-width: 100%;
            position: relative;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }
        .message:not(.own) .msg-bubble {
            background: var(--whatsapp-dark-tertiary);
            color: var(--whatsapp-text-primary);
            border-top-left-radius: 0;
        }
        .message.own .msg-bubble {
            background: var(--whatsapp-chat-own);
            color: var(--whatsapp-text-dark);
            border-top-right-radius: 0;
        }

        .message .msg-sender {
            font-size: 11px;
            font-weight: 600;
            color: var(--whatsapp-green);
            margin-bottom: 2px;
        }
        .message.own .msg-sender { color: #075E54; }

        .message .msg-text {
            font-size: 14px;
            line-height: 1.5;
            word-break: break-word;
        }

        .message .msg-text .image-container {
            position: relative;
            display: inline-block;
            max-width: 100%;
            margin: -4px 0;
        }
        .message .msg-text .image-container img {
            max-width: min(100%, 240px);
            max-height: 180px;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: block;
        }
        .message .msg-text .image-container img:active { transform: scale(0.97); }
        .message .msg-text .image-container .image-actions {
            position: absolute;
            bottom: 4px;
            right: 4px;
            display: flex;
            gap: 4px;
            opacity: 0;
            transition: all 0.2s;
        }
        .message .msg-text .image-container:hover .image-actions,
        .message .msg-text .image-container:active .image-actions { opacity: 1; }
        .message .msg-text .image-container .image-actions button {
            background: rgba(0,0,0,0.7);
            color: white;
            border: none;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            cursor: pointer;
            font-size: 11px;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .message .msg-text .image-container .image-actions button:active { transform: scale(0.85); }

        .message .msg-time {
            font-size: 10px;
            opacity: 0.6;
            margin-top: 2px;
            text-align: right;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 4px;
        }
        .message.own .msg-time { color: var(--whatsapp-text-dark); }

        .message .msg-actions {
            display: flex;
            gap: 2px;
            margin-top: 2px;
            justify-content: flex-end;
        }
        .message .msg-actions button {
            background: none;
            border: none;
            font-size: 11px;
            cursor: pointer;
            opacity: 0.4;
            transition: all 0.2s;
            padding: 2px 4px;
            border-radius: 4px;
            color: inherit;
        }
        .message .msg-actions button:hover { opacity: 1; background: rgba(0,0,0,0.05); }
        .message.own .msg-actions button { color: var(--whatsapp-text-dark); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Typing Indicator */
        .typing-indicator {
            font-size: 12px;
            color: var(--whatsapp-text-secondary);
            padding: 2px 20px 6px;
            min-height: 20px;
            flex-shrink: 0;
            font-style: italic;
        }
        .typing-indicator.active { color: var(--whatsapp-green); }

        /* ===== COMPOSER ===== */
        .composer {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--whatsapp-dark-secondary);
            border-top: 1px solid var(--whatsapp-border);
            flex-shrink: 0;
            min-height: var(--composer-height);
        }
        .composer .emoji-btn,
        .composer .attach-btn {
            background: none;
            border: none;
            color: var(--whatsapp-text-secondary);
            font-size: 22px;
            cursor: pointer;
            padding: 4px 6px;
            transition: all 0.2s;
            touch-action: manipulation;
        }
        .composer .emoji-btn:active,
        .composer .attach-btn:active { transform: scale(0.88); }
        .composer .attach-btn:disabled { opacity: 0.3; cursor: not-allowed; }

        .composer input {
            flex: 1;
            background: var(--whatsapp-dark-tertiary);
            border: none;
            border-radius: var(--whatsapp-radius);
            padding: 9px 14px;
            color: var(--whatsapp-text-primary);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.2s;
            min-width: 0;
        }
        .composer input::placeholder { color: var(--whatsapp-text-secondary); }
        .composer input:focus { background: var(--whatsapp-dark); }
        .composer input:disabled { opacity: 0.4; cursor: not-allowed; }

        .composer .send-btn {
            background: var(--whatsapp-green);
            color: white;
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            touch-action: manipulation;
            flex-shrink: 0;
        }
        .composer .send-btn:active { transform: scale(0.88); }
        .composer .send-btn:disabled { opacity: 0.3; cursor: not-allowed; transform: none; }

        /* ===== TOAST ===== */
        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--whatsapp-dark-secondary);
            color: var(--whatsapp-text-primary);
            padding: 10px 24px;
            border-radius: var(--whatsapp-radius);
            font-size: 14px;
            font-weight: 500;
            box-shadow: var(--whatsapp-shadow);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 92%;
            text-align: center;
            pointer-events: none;
            border: 1px solid var(--whatsapp-border);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
        .toast.error { border-color: #FF3B30; }
        .toast.success { border-color: var(--whatsapp-green); }

        /* ===== MODAL ===== */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--whatsapp-dark-secondary);
            border-radius: 16px;
            padding: 28px;
            max-width: 400px;
            width: 100%;
            box-shadow: var(--whatsapp-shadow);
            animation: fadeIn 0.3s ease;
            max-height: 90vh;
            overflow-y: auto;
            border: 1px solid var(--whatsapp-border);
        }
        .modal h2 {
            font-size: 20px;
            font-weight: 700;
            color: var(--whatsapp-text-primary);
            margin-bottom: 20px;
            text-align: center;
        }

        .profile-pic-wrapper {
            position: relative;
            width: 100px;
            margin: 0 auto 20px;
        }
        .profile-pic-wrapper .profile-pic {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            object-fit: cover;
            display: block;
            border: 3px solid var(--whatsapp-green);
        }
        .profile-pic-wrapper .upload-overlay {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            backdrop-filter: blur(4px);
        }
        .profile-pic-wrapper .upload-overlay:active { transform: translateX(-50%) scale(0.94); }

        .modal .form-group { margin-bottom: 16px; }
        .modal .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--whatsapp-text-secondary);
            margin-bottom: 4px;
        }
        .modal .form-group input {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid var(--whatsapp-border);
            border-radius: var(--whatsapp-radius);
            font-size: 14px;
            font-family: inherit;
            transition: all 0.2s;
            background: var(--whatsapp-dark);
            color: var(--whatsapp-text-primary);
        }
        .modal .form-group input:focus {
            border-color: var(--whatsapp-green);
            outline: none;
        }

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
    updateProfile as firebaseUpdateProfile
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
    getDatabase, ref, push, onChildAdded, set, get, update, onValue,
    query, limitToLast, orderByChild, remove, onChildRemoved, onChildChanged
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDZliPdFlc3iQRMGxs5-hgcDGQYNdACqm4",
    authDomain: "connectbd-4a8f2.firebaseapp.com",
    databaseURL: "https://connectbd-4a8f2-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "connectbd-4a8f2",
    storageBucket: "connectbd-4a8f2.firebasestorage.app",
    messagingSenderId: "38217840543",
    appId: "1:38217840543:web:aeedd8517f697b16c12faa",
    measurementId: "G-RPBSS1M9LD"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// DOM Elements
const messagesContainer = document.getElementById('messagesContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const loginBtn = document.getElementById('loginBtn');
const logoutBtn = document.getElementById('logoutBtn');
const userProfileMini = document.getElementById('userProfileMini');
const miniAvatar = document.getElementById('miniAvatar');
const miniName = document.getElementById('miniName');
const friendList = document.getElementById('friendList');
const friendCount = document.getElementById('friendCount');
const requestCount = document.getElementById('requestCount');
const chatFriendInfo = document.getElementById('chatFriendInfo');
const chatStatus = document.getElementById('chatStatus');
const searchFriend = document.getElementById('searchFriend');
const toastEl = document.getElementById('toast');
const fileUploadBtn = document.getElementById('fileUploadBtn');
const fileInput = document.getElementById('fileInput');
const logoClick = document.getElementById('logoClick');
const backBtn = document.getElementById('backBtn');
const chatList = document.getElementById('chatList');
const chatArea = document.getElementById('chatArea');

// Modal Elements
const profileModal = document.getElementById('profileModal');
const modalProfilePic = document.getElementById('modalProfilePic');
const modalDisplayName = document.getElementById('modalDisplayName');
const modalEmail = document.getElementById('modalEmail');
const modalSave = document.getElementById('modalSave');
const modalCancel = document.getElementById('modalCancel');
const modalUploadPic = document.getElementById('modalUploadPic');

// Image Preview
const imagePreview = document.getElementById('imagePreview');
const previewImage = document.getElementById('previewImage');
const downloadPreviewBtn = document.getElementById('downloadPreviewBtn');
const closePreviewBtn = document.getElementById('closePreviewBtn');

// Tab switching
const tabs = document.querySelectorAll('.tab');
const tabContents = {
    chats: document.getElementById('chatList'),
    requests: null,
    search: null
};

let currentUser = null;
let currentChatFriend = null;
let messageListener = null;
let friends = {};
let requests = {};
let allUsersCache = {};
let unreadCounts = {};
let typingTimeout = null;
let toastTimeout = null;
let isMobile = window.innerWidth <= 768;

// ===== TOAST =====
function showToast(message, type = 'success') {
    if (toastTimeout) { clearTimeout(toastTimeout); toastEl.classList.remove('show'); }
    toastEl.textContent = message;
    toastEl.className = 'toast';
    if (type === 'error') toastEl.classList.add('error');
    if (type === 'success') toastEl.classList.add('success');
    void toastEl.offsetWidth;
    toastEl.classList.add('show');
    toastTimeout = setTimeout(() => {
        toastEl.classList.remove('show');
        toastTimeout = null;
    }, 3000);
}

// ===== STATUS BAR TIME =====
function updateStatusTime() {
    const now = new Date();
    const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    document.getElementById('statusTime').textContent = time;
}
updateStatusTime();
setInterval(updateStatusTime, 30000);

// ===== DOWNLOAD IMAGE =====
function downloadImage(imageSrc, filename = 'image.jpg') {
    try {
        const link = document.createElement('a');
        link.href = imageSrc;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        showToast('✅ ছবি ডাউনলোড শুরু হয়েছে!');
    } catch (error) {
        showToast('ডাউনলোড করতে ব্যর্থ!', 'error');
    }
}

// ===== IMAGE TO BASE64 =====
function imageToBase64(file) {
    return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
    });
}

// ===== SEND IMAGE =====
async function sendImageMessageBase64(file) {
    if (!file || !currentUser || !currentChatFriend) {
        showToast('ছবি পাঠাতে ব্যর্থ!', 'error');
        return;
    }
    try {
        showToast('📤 ছবি প্রস্তুত হচ্ছে...', 'success');
        const base64Image = await imageToBase64(file);
        const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
        const messagesRef = ref(db, `privateChats/${chatId}/messages`);
        const newMsgRef = push(messagesRef);
        const fileExt = file.name.split('.').pop() || 'jpg';
        const fileName = `image_${Date.now()}.${fileExt}`;
        await set(newMsgRef, {
            text: '📷',
            image: base64Image,
            uid: currentUser.uid,
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            timestamp: Date.now(),
            isBase64: true,
            fileName: fileName
        });
        const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
        const snapshot = await get(unreadRef);
        const count = (snapshot.val() || 0) + 1;
        await set(unreadRef, count);
        showToast('✅ ছবি পাঠানো হয়েছে!');
    } catch (error) {
        showToast(`ছবি পাঠাতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// ===== SAVE USER =====
async function saveUserData(user) {
    try {
        const userRef = ref(db, `users/${user.uid}`);
        const snapshot = await get(userRef);
        const existingData = snapshot.val();
        const completeUserData = {
            displayName: user.displayName || 'ইউজার',
            email: user.email || '',
            photoURL: user.photoURL || '',
            online: true,
            lastSeen: Date.now()
        };
        if (!existingData || !existingData.displayName || !existingData.email) {
            await set(userRef, completeUserData);
            return true;
        } else {
            await update(userRef, { online: true, lastSeen: Date.now() });
            return false;
        }
    } catch (error) {
        console.error('Error saving user:', error);
        return false;
    }
}

// ===== UPDATE PROFILE =====
async function updateUserProfile(displayName, photoURL) {
    if (!currentUser) return;
    try {
        await update(ref(db, `users/${currentUser.uid}`), { displayName, photoURL });
        await firebaseUpdateProfile(auth.currentUser, { displayName, photoURL });
        showToast('✅ প্রোফাইল আপডেট করা হয়েছে!');
        updateUI(currentUser);
    } catch (error) {
        showToast(`প্রোফাইল আপডেট করতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// ===== UPDATE UI =====
function updateUI(user) {
    currentUser = user;
    if (user) {
        userProfileMini.style.display = 'flex';
        miniAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=User&background=00A884&color=fff';
        miniName.textContent = user.displayName || 'User';
        loginBtn.style.display = 'none';
        logoutBtn.style.display = 'flex';
        messageInput.disabled = false;
        sendBtn.disabled = false;
        fileUploadBtn.disabled = false;
        loadFriendsAndRequests();
        loadAllUsers();
    } else {
        userProfileMini.style.display = 'none';
        loginBtn.style.display = 'flex';
        logoutBtn.style.display = 'none';
        messageInput.disabled = true;
        sendBtn.disabled = true;
        fileUploadBtn.disabled = true;
        messagesContainer.innerHTML = `<div class="empty-state"><div class="icon">🔑</div><span>চ্যাট শুরু করতে লগইন করুন</span></div>`;
        chatFriendInfo.innerHTML = `<span style="color:var(--whatsapp-text-secondary);font-weight:500;">💬 বন্ধু নির্বাচন করুন</span>`;
        friendList.innerHTML = `<div class="empty-state"><div class="icon">💬</div><span>কোনো বন্ধু নেই</span><span style="font-size:12px;">লগইন করে বন্ধু যোগ করুন</span></div>`;
        friendCount.textContent = '0';
        requestCount.textContent = '0';
        currentChatFriend = null;
        if (messageListener) { messageListener(); messageListener = null; }
    }
}

// ===== LOAD ALL USERS =====
function loadAllUsers() {
    const usersRef = ref(db, 'users');
    onValue(usersRef, (snapshot) => {
        const data = snapshot.val();
        if (data) allUsersCache = data;
    });
}

// ===== LOAD FRIENDS & REQUESTS =====
function loadFriendsAndRequests() {
    if (!currentUser) return;
    const friendsRef = ref(db, `friends/${currentUser.uid}`);
    onValue(friendsRef, (snapshot) => {
        friends = snapshot.val() || {};
        friendCount.textContent = Object.keys(friends).length;
        renderFriends();
        loadUnreadCounts();
    });
    const requestsRef = ref(db, `friendRequests/${currentUser.uid}`);
    onValue(requestsRef, (snapshot) => {
        requests = snapshot.val() || {};
        const count = Object.keys(requests).filter(key => requests[key].status === 'pending').length;
        requestCount.textContent = count;
    });
}

// ===== LOAD UNREAD =====
function loadUnreadCounts() {
    if (!currentUser) return;
    const unreadRef = ref(db, `unread/${currentUser.uid}`);
    onValue(unreadRef, (snapshot) => {
        unreadCounts = snapshot.val() || {};
        renderFriends();
    });
}

// ===== MARK AS READ =====
async function markAsRead(friendUid) {
    if (!currentUser || !friendUid) return;
    const unreadRef = ref(db, `unread/${currentUser.uid}/${friendUid}`);
    await remove(unreadRef);
    unreadCounts[friendUid] = 0;
    renderFriends();
}

// ===== RENDER FRIENDS =====
function renderFriends() {
    const searchTerm = searchFriend.value.toLowerCase();
    let html = '';
    let friendKeys = Object.keys(friends);
    if (friendKeys.length === 0) {
        html = `<div class="empty-state"><div class="icon">💬</div><span>কোনো বন্ধু নেই</span><span style="font-size:12px;">বন্ধু যোগ করুন</span></div>`;
    } else {
        friendKeys.forEach(uid => {
            const friend = friends[uid];
            const name = friend.displayName || 'ইউজার';
            const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=00A884&color=fff';
            const unread = unreadCounts[uid] || 0;
            if (searchTerm && !name.toLowerCase().includes(searchTerm)) return;
            const isActive = currentChatFriend === uid;
            html += `
                <div class="friend-item ${isActive ? 'active' : ''}" data-uid="${uid}">
                    <img src="${photo}" alt="${name}" class="avatar ${friend.online ? 'online' : ''}" loading="lazy" />
                    <div class="info">
                        <div class="name">${name}</div>
                        <div class="last-msg">
                            <span>${unread > 0 ? '🔴 নতুন মেসেজ' : 'ক্লিক করুন চ্যাট শুরু করতে'}</span>
                        </div>
                    </div>
                    <div class="meta">
                        <span class="time">${friend.online ? 'অনলাইন' : 'অফলাইন'}</span>
                        ${unread > 0 ? `<span class="unread-badge danger">${unread}</span>` : ''}
                    </div>
                </div>
            `;
        });
    }
    friendList.innerHTML = html;
    document.querySelectorAll('.friend-item').forEach(el => {
        el.addEventListener('click', () => {
            const uid = el.dataset.uid;
            if (uid && friends[uid]) startChat(uid);
        });
    });
}

// ===== TYPING =====
function handleTyping() {
    if (!currentUser || !currentChatFriend) return;
    const typingRef = ref(db, `typing/${currentChatFriend}/${currentUser.uid}`);
    set(typingRef, true);
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => remove(typingRef), 2000);
}

// ===== START CHAT =====
function startChat(friendUid) {
    if (!friends[friendUid]) { showToast('এই ইউজার আপনার বন্ধু নয়!', 'error'); return; }
    currentChatFriend = friendUid;
    const friend = friends[friendUid];
    const name = friend.displayName || 'ইউজার';
    const photo = friend.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=00A884&color=fff';
    
    chatFriendInfo.innerHTML = `
        <img src="${photo}" alt="${name}" />
        <div class="details">
            <div class="name">${name}</div>
            <div class="status ${friend.online ? 'online' : ''}" id="chatStatus">${friend.online ? '🟢 অনলাইন' : '⚪ অফলাইন'}</div>
        </div>
    `;
    
    markAsRead(friendUid);
    document.querySelectorAll('.friend-item').forEach(el => {
        el.classList.toggle('active', el.dataset.uid === friendUid);
    });
    
    // Hide chat list on mobile
    if (isMobile) {
        chatList.classList.add('hidden');
    }
    
    loadPrivateMessages(friendUid);
    messageInput.disabled = false;
    sendBtn.disabled = false;
    fileUploadBtn.disabled = false;
    messageInput.focus();
    
    const typingRef = ref(db, `typing/${currentUser.uid}/${friendUid}`);
    onValue(typingRef, (snapshot) => {
        const isTyping = snapshot.val();
        const statusEl = document.getElementById('chatStatus');
        if (isTyping) {
            statusEl.textContent = '✍️ টাইপ করছে...';
            statusEl.className = 'status typing';
        } else {
            const f = friends[friendUid];
            statusEl.textContent = f?.online ? '🟢 অনলাইন' : '⚪ অফলাইন';
            statusEl.className = `status ${f?.online ? 'online' : ''}`;
        }
    });
}

// ===== LOAD MESSAGES =====
function loadPrivateMessages(friendUid) {
    if (messageListener) { messageListener(); messageListener = null; }
    const chatId = [currentUser.uid, friendUid].sort().join('_');
    const messagesRef = query(ref(db, `privateChats/${chatId}/messages`), orderByChild('timestamp'), limitToLast(50));
    messagesContainer.innerHTML = '';
    messageListener = onChildAdded(messagesRef, (snapshot) => {
        const msg = snapshot.val();
        const msgKey = snapshot.key;
        if (!msg) return;
        const existing = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
        if (existing) return;
        appendMessage(msgKey, msg);
    });
    onChildChanged(messagesRef, (snapshot) => {
        const msg = snapshot.val();
        const msgKey = snapshot.key;
        if (!msg) return;
        const msgElement = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
        if (msgElement) {
            const textElement = msgElement.querySelector('.msg-text');
            if (textElement) {
                if (msg.image) {
                    textElement.innerHTML = createImageHTML(msg.image, msg.fileName);
                } else {
                    textElement.innerHTML = msg.text + (msg.edited ? ' <span style="font-size:10px;opacity:0.5;">(edited)</span>' : '');
                }
            }
        }
    });
    onChildRemoved(messagesRef, (snapshot) => {
        const msgKey = snapshot.key;
        const msgElement = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
        if (msgElement) {
            msgElement.style.opacity = '0.3';
            msgElement.querySelector('.msg-text').innerHTML = '🔴 This message was deleted';
        }
    });
}

// ===== CREATE IMAGE HTML =====
function createImageHTML(imageSrc, fileName = 'image.jpg') {
    return `
        <div class="image-container">
            <img src="${imageSrc}" alt="Image" onclick="window.openImagePreview('${imageSrc}', '${fileName}')" loading="lazy" />
            <div class="image-actions">
                <button onclick="event.stopPropagation(); window.downloadImageFromSrc('${imageSrc}', '${fileName}')" title="ডাউনলোড">⬇️</button>
            </div>
        </div>
    `;
}

// ===== APPEND MESSAGE =====
function appendMessage(msgKey, msg) {
    const isOwn = msg.uid === currentUser.uid;
    const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' }) : '';
    const div = document.createElement('div');
    div.className = `message ${isOwn ? 'own' : ''}`;
    div.dataset.key = msgKey;
    div.dataset.uid = msg.uid;
    const avatar = msg.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(msg.displayName || 'U') + '&background=00A884&color=fff';
    let content = '';
    if (msg.image) {
        const fileName = msg.fileName || `image_${Date.now()}.jpg`;
        content = createImageHTML(msg.image, fileName);
    } else {
        content = msg.text + (msg.edited ? ' <span style="font-size:10px;opacity:0.5;">(edited)</span>' : '');
    }
    div.innerHTML = `
        <img src="${avatar}" alt="avatar" class="msg-avatar" loading="lazy" />
        <div class="msg-bubble">
            <div class="msg-sender">${isOwn ? 'আপনি' : (msg.displayName || 'ইউজার')}</div>
            <div class="msg-text">${content}</div>
            <div class="msg-time">${time}</div>
            ${isOwn ? `
            <div class="msg-actions">
                <button class="edit-btn" data-key="${msgKey}" title="Edit">✏️</button>
                <button class="delete-btn" data-key="${msgKey}" title="Delete">🗑️</button>
            </div>` : ''}
        </div>
    `;
    messagesContainer.appendChild(div);
    messagesContainer.scrollTop = messagesContainer.scrollHeight;
    if (isOwn) {
        div.querySelector('.edit-btn')?.addEventListener('click', () => editMessage(msgKey, msg.text));
        div.querySelector('.delete-btn')?.addEventListener('click', () => deleteMessage(msgKey));
    }
}

    previewImage.src = imageSrc;
    previewImage.dataset.src = imageSrc;
    previewImage.dataset.filename = fileName || 'image.jpg';
    imagePreview.classList.add('active');
};
window.downloadImageFromSrc = function(imageSrc, fileName) {

};

// ===== DELETE MESSAGE =====
async function deleteMessage(msgKey) {
    if (!currentUser || !currentChatFriend) return;
    if (!confirm('এই মেসেজ ডিলিট করতে চান?')) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    try {
        await update(ref(db, `privateChats/${chatId}/messages/${msgKey}`), {
            text: '🔴 This message was deleted',
            deleted: true
        });
        showToast('✅ মেসেজ ডিলিট করা হয়েছে');
    } catch (error) {
        showToast(`ডিলিট করতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// ===== EDIT MESSAGE =====
async function editMessage(msgKey, oldText) {
    if (!currentUser || !currentChatFriend) return;
    const newText = prompt('মেসেজ এডিট করুন:', oldText);
    if (!newText || newText === oldText) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    try {
        await update(ref(db, `privateChats/${chatId}/messages/${msgKey}`), {
            text: newText,
            edited: true,
            editedAt: Date.now()
        });
        showToast('✅ মেসেজ এডিট করা হয়েছে');
    } catch (error) {
        showToast(`এডিট করতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// ===== SEND MESSAGE =====
async function sendPrivateMessage() {
    const text = messageInput.value.trim();
    if (!text || !currentUser || !currentChatFriend) return;
    const chatId = [currentUser.uid, currentChatFriend].sort().join('_');
    const newMsgRef = push(ref(db, `privateChats/${chatId}/messages`));
    await set(newMsgRef, {
        text: text,
        uid: currentUser.uid,
        displayName: currentUser.displayName || 'ইউজার',
        photoURL: currentUser.photoURL || '',
        timestamp: Date.now()
    });
    const unreadRef = ref(db, `unread/${currentChatFriend}/${currentUser.uid}`);
    const snapshot = await get(unreadRef);
    const count = (snapshot.val() || 0) + 1;
    await set(unreadRef, count);
    messageInput.value = '';
    messageInput.focus();
}

        return;

});
fileInput.addEventListener('change', async (e) => {

// ===== TABS =====

function renderRequestsTab() {
    let html = '';
    let pendingRequests = Object.keys(requests).filter(key => requests[key].status === 'pending');
    if (pendingRequests.length === 0) {
        html = `<div class="empty-state"><div class="icon">📨</div><span>কোনো রিকোয়েস্ট নেই</span></div>`;
    } else {
        pendingRequests.forEach(uid => {
            const req = requests[uid];
            const name = req.displayName || 'ইউজার';
            const photo = req.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=00A884&color=fff';
            html += `
                <div class="friend-item" style="cursor:default;" data-uid="${uid}">
                    <img src="${photo}" class="avatar" loading="lazy" />
                    <div class="info">
                        <div class="name">${name}</div>
                        <div class="last-msg" style="color:var(--whatsapp-text-secondary);">📨 ফ্রেন্ড রিকোয়েস্ট</div>
                    </div>
                    <div class="meta" style="flex-direction:row;gap:4px;">
                        <button class="btn-accept" style="background:var(--whatsapp-green);color:white;border:none;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;" data-uid="${uid}">✅</button>
                        <button class="btn-reject" style="background:#FF3B30;color:white;border:none;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;" data-uid="${uid}">❌</button>
                    </div>
                </div>
            `;
        });
    }
    friendList.innerHTML = html;
    document.querySelectorAll('.btn-accept').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); acceptFriendRequest(btn.dataset.uid); });
    });
    document.querySelectorAll('.btn-reject').forEach(btn => {
        btn.addEventListener('click', (e) => { e.stopPropagation(); rejectFriendRequest(btn.dataset.uid); });
    });
}

function renderSearchTab() {
    let html = `
        <div style="padding:12px;">
            <div style="display:flex;gap:8px;margin-bottom:12px;">
                <input type="text" id="searchUserInput" placeholder="ইমেইল বা নাম..." style="flex:1;background:var(--whatsapp-dark-tertiary);border:none;border-radius:8px;padding:8px 14px;color:var(--whatsapp-text-primary);font-size:14px;font-family:inherit;outline:none;" />
                <button id="searchUserBtn" style="background:var(--whatsapp-green);color:white;border:none;border-radius:8px;padding:8px 16px;font-weight:600;cursor:pointer;">খুঁজুন</button>
            </div>
            <div id="searchResults"></div>
        </div>
    `;
    friendList.innerHTML = html;
    
    document.getElementById('searchUserBtn')?.addEventListener('click', async () => {
        const query = document.getElementById('searchUserInput').value.trim().toLowerCase();
        if (!query) { document.getElementById('searchResults').innerHTML = ''; return; }
        if (!currentUser) { showToast('লগইন করুন প্রথমে!', 'error'); return; }
        let foundUsers = [];
        Object.keys(allUsersCache).forEach(uid => {
            const user = allUsersCache[uid];
            if (uid === currentUser.uid) return;
            const name = (user.displayName || '').toLowerCase();
            const email = (user.email || '').toLowerCase();
            if (name.includes(query) || email.includes(query)) {
                foundUsers.push({ uid, ...user });
            }
        });
        const resultsDiv = document.getElementById('searchResults');
        if (foundUsers.length === 0) {
            resultsDiv.innerHTML = `<div style="color:var(--whatsapp-text-secondary);font-size:14px;text-align:center;padding:20px;">কোনো ইউজার পাওয়া যায়নি</div>`;
            return;
        }
        let html2 = '';
        foundUsers.forEach(user => {
            const isFriend = friends[user.uid];
            const isRequested = requests[user.uid] && requests[user.uid].status === 'pending';
            const photo = user.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(user.displayName || 'U') + '&background=00A884&color=fff';
            html2 += `
                <div style="display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--whatsapp-border);">
                    <img src="${photo}" style="width:40px;height:40px;border-radius:50%;object-fit:cover;" loading="lazy" />
                    <span style="flex:1;font-size:14px;font-weight:500;">${user.displayName || 'ইউজার'}</span>
                    ${isFriend ? '<span style="color:var(--whatsapp-green);font-size:12px;font-weight:600;">✅ বন্ধু</span>' :
                    isRequested ? '<span style="color:#F59E0B;font-size:12px;font-weight:600;">⏳ রিকোয়েস্ট পাঠানো</span>' :
                    `<button class="send-request-btn" style="background:var(--whatsapp-green);color:white;border:none;border-radius:20px;padding:4px 14px;font-size:12px;font-weight:600;cursor:pointer;" data-uid="${user.uid}">➕ বন্ধু করুন</button>`
                    }
                </div>
            `;
        });
        resultsDiv.innerHTML = html2;
        document.querySelectorAll('.send-request-btn').forEach(btn => {
            btn.addEventListener('click', () => sendFriendRequest(btn.dataset.uid));
        });
    });
}

// ===== ACCEPT REQUEST =====
async function acceptFriendRequest(fromUid) {
    if (!currentUser) return;
    try {
        const senderRef = ref(db, `users/${fromUid}`);
        const snapshot = await get(senderRef);
        const senderData = snapshot.val();
        if (!senderData) { showToast('ইউজার পাওয়া যায়নি!', 'error'); return; }
        await set(ref(db, `friends/${currentUser.uid}/${fromUid}`), {
            displayName: senderData.displayName || 'ইউজার',
            photoURL: senderData.photoURL || '',
            online: false,
            addedAt: Date.now()
        });
        await set(ref(db, `friends/${fromUid}/${currentUser.uid}`), {
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            online: true,
            addedAt: Date.now()
        });
        await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
        showToast('বন্ধু রিকোয়েস্ট গ্রহণ করা হয়েছে! 🎉');
        // Switch to chats tab
        tabs.forEach(t => t.classList.remove('active'));
        document.querySelector('[data-tab="chats"]').classList.add('active');
        renderFriends();
    } catch (error) {
        showToast(`এক্সেপ্ট করতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// ===== REJECT REQUEST =====
async function rejectFriendRequest(fromUid) {
    if (!currentUser) return;
    try {
        await remove(ref(db, `friendRequests/${currentUser.uid}/${fromUid}`));
        showToast('রিকোয়েস্ট রিজেক্ট করা হয়েছে');
        renderRequestsTab();
    } catch (error) {
        showToast(`রিজেক্ট করতে ব্যর্থ: ${error.message}`, 'error');
    }
}

// ===== SEND FRIEND REQUEST =====
async function sendFriendRequest(toUid) {
    if (!currentUser) return;
    if (toUid === currentUser.uid) { showToast('নিজেকে রিকোয়েস্ট পাঠানো যায় না!', 'error'); return; }
    if (friends[toUid]) { showToast('ইতিমধ্যে বন্ধু!', 'error'); return; }
    if (requests[toUid] && requests[toUid].status === 'pending') { showToast('ইতিমধ্যে রিকোয়েস্ট পাঠানো!', 'error'); return; }
    try {
        const userRef = ref(db, `users/${toUid}`);
        const snapshot = await get(userRef);
        const userData = snapshot.val();
        if (!userData) { showToast('ইউজার পাওয়া যায়নি!', 'error'); return; }
        await set(ref(db, `friendRequests/${toUid}/${currentUser.uid}`), {
            displayName: currentUser.displayName || 'ইউজার',
            photoURL: currentUser.photoURL || '',
            status: 'pending',
            timestamp: Date.now()
        });
        showToast('ফ্রেন্ড রিকোয়েস্ট পাঠানো হয়েছে! 📨');
        document.getElementById('searchResults').innerHTML = `<div style="color:var(--whatsapp-green);font-size:14px;text-align:center;padding:8px;">✅ রিকোয়েস্ট পাঠানো হয়েছে</div>`;
    } catch (error) {
        showToast(`রিকোয়েস্ট পাঠাতে ব্যর্থ: ${error.message}`, 'error');
    }
}
