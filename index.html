<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConnectBD Chat - Real-time Group Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: linear-gradient(145deg, #f6f9fc 0%, #eaf3f9 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .app-container {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 40px;
            padding: 2rem;
            max-width: 900px;
            width: 100%;
            box-shadow: 0 30px 60px -20px rgba(0, 20, 40, 0.3),
                        0 8px 20px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.5);
            max-height: 95vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 1rem;
            border-bottom: 2px solid rgba(60, 130, 180, 0.15);
            flex-wrap: wrap;
            gap: 10px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .app-logo {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            background: white;
            padding: 4px;
            border: 2px solid rgba(255, 255, 255, 0.9);
        }

        .app-title {
            font-size: 1.6rem;
            font-weight: 700;
            color: #0b2b40;
        }

        .app-title span {
            color: #1976D2;
        }

        .app-title small {
            font-size: 0.8rem;
            font-weight: 400;
            color: #3b5c6e;
            display: block;
            margin-top: -4px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255, 255, 255, 0.6);
            padding: 6px 16px 6px 10px;
            border-radius: 40px;
            border: 1px solid rgba(200, 215, 225, 0.5);
        }

        .user-profile-mini img {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid white;
        }

        .user-profile-mini .user-name {
            font-size: 0.85rem;
            font-weight: 500;
            color: #0b2b40;
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .header-btn {
            background: transparent;
            border: 1px solid #b6ccdd;
            padding: 6px 16px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #2f536b;
            cursor: pointer;
            transition: 0.15s;
        }

        .header-btn:hover {
            background: #e6eef5;
            border-color: #7f9bb3;
        }

        .header-btn.primary {
            background: #1976D2;
            border-color: #1976D2;
            color: white;
        }

        .header-btn.primary:hover {
            background: #1565C0;
        }

        /* Main chat area */
        .chat-main {
            display: flex;
            gap: 1.5rem;
            flex: 1;
            min-height: 0;
            padding-top: 1.2rem;
        }

        /* Sidebar - Groups */
        .sidebar {
            width: 200px;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 24px;
            padding: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            max-height: 500px;
            overflow-y: auto;
        }

        .sidebar-title {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #53768b;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .group-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.15s;
            margin-bottom: 4px;
            font-size: 0.9rem;
            color: #1f4c66;
        }

        .group-item:hover {
            background: rgba(25, 118, 210, 0.08);
        }

        .group-item.active {
            background: rgba(25, 118, 210, 0.15);
            font-weight: 600;
            color: #0b2b40;
        }

        .group-item .group-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #d4e3ed;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            flex-shrink: 0;
        }

        .group-item .group-name {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .group-item .badge {
            background: #1976D2;
            color: white;
            font-size: 0.65rem;
            padding: 2px 8px;
            border-radius: 20px;
            font-weight: 600;
        }

        .create-group-btn {
            width: 100%;
            margin-top: 8px;
            padding: 8px;
            border: 1px dashed #b6ccdd;
            border-radius: 12px;
            background: transparent;
            color: #2f536b;
            cursor: pointer;
            font-size: 0.8rem;
            transition: 0.15s;
        }

        .create-group-btn:hover {
            background: rgba(25, 118, 210, 0.05);
            border-color: #1976D2;
        }

        /* Chat messages */
        .chat-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }

        .chat-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(60, 130, 180, 0.1);
        }

        .chat-header .chat-group-name {
            font-weight: 600;
            color: #0b2b40;
            font-size: 1.1rem;
        }

        .chat-header .member-count {
            font-size: 0.75rem;
            color: #53768b;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 12px 4px;
            margin: 8px 0;
            max-height: 350px;
            min-height: 250px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .message {
            display: flex;
            gap: 10px;
            max-width: 85%;
            animation: fadeIn 0.2s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.own {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message .msg-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            border: 2px solid white;
        }

        .message .msg-bubble {
            background: white;
            padding: 10px 14px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            word-wrap: break-word;
            flex: 1;
        }

        .message.own .msg-bubble {
            background: #1976D2;
            color: white;
            border-top-left-radius: 18px;
            border-top-right-radius: 4px;
        }

        .message .msg-sender {
            font-size: 0.7rem;
            font-weight: 600;
            color: #1976D2;
            margin-bottom: 2px;
        }

        .message.own .msg-sender {
            color: #bbdefb;
        }

        .message .msg-text {
            font-size: 0.92rem;
            line-height: 1.4;
        }

        .message .msg-time {
            font-size: 0.6rem;
            opacity: 0.6;
            margin-top: 4px;
            text-align: right;
        }

        .message.own .msg-time {
            color: #bbdefb;
        }

        /* Input area */
        .input-area {
            display: flex;
            gap: 10px;
            margin-top: 8px;
            padding-top: 10px;
            border-top: 1px solid rgba(60, 130, 180, 0.1);
        }

        .input-area input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid #dce3e9;
            border-radius: 30px;
            font-size: 0.95rem;
            outline: none;
            background: rgba(255, 255, 255, 0.6);
            transition: 0.15s;
        }

        .input-area input:focus {
            border-color: #1976D2;
            background: white;
            box-shadow: 0 0 0 3px rgba(25, 118, 210, 0.08);
        }

        .input-area input:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .input-area button {
            padding: 10px 24px;
            border: none;
            background: #1976D2;
            color: white;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.15s;
            white-space: nowrap;
        }

        .input-area button:hover:not(:disabled) {
            background: #1565C0;
            transform: scale(1.02);
        }

        .input-area button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Toast */
        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #1e7e34;
            color: white;
            padding: 14px 32px;
            border-radius: 40px;
            font-weight: 500;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
            z-index: 999;
            opacity: 0;
            transition: all 0.4s ease;
            max-width: 90%;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast.error {
            background: #d32f2f;
        }

        /* Scrollbar */
        .messages-container::-webkit-scrollbar,
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-thumb,
        .sidebar::-webkit-scrollbar-thumb {
            background: #b6ccdd;
            border-radius: 10px;
        }

        @media (max-width: 700px) {
            .app-container { padding: 1.2rem; }
            .chat-main { flex-direction: column; }
            .sidebar {
                width: 100%;
                max-height: 120px;
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
                padding: 10px;
                align-items: center;
            }
            .sidebar-title { display: none; }
            .group-item {
                padding: 4px 12px;
                font-size: 0.8rem;
                margin-bottom: 0;
                background: rgba(255,255,255,0.5);
                border-radius: 20px;
            }
            .create-group-btn { width: auto; margin-top: 0; padding: 4px 12px; }
            .header { flex-direction: column; align-items: stretch; }
            .header-right { justify-content: space-between; }
            .user-profile-mini .user-name { max-width: 80px; }
            .messages-container { max-height: 250px; min-height: 180px; }
        }

        @media (max-width: 480px) {
            .app-container { padding: 1rem; border-radius: 28px; }
            .app-title { font-size: 1.2rem; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="header">
            <div class="header-left">
                <img 
                    src="https://raw.githubusercontent.com/mdakash0003478-am/connectbd/main/logo.png.jpeg" 
                    alt="ConnectBD" 
                    class="app-logo"
                    onerror="this.style.display='none'"
                />
                <div class="app-title">
                    Connect<span>BD</span>
                    <small>রিয়েল-টাইম চ্যাট</small>
                </div>
            </div>
            <div class="header-right">
                <div id="userProfileMini" class="user-profile-mini" style="display: none;">
                    <img id="miniAvatar" src="" alt="avatar" />
                    <span class="user-name" id="miniName">User</span>
                </div>
                <button id="loginBtn" class="header-btn primary">🔑 লগইন</button>
                <button id="logoutBtn" class="header-btn" style="display: none;">সাইন আউট</button>
            </div>
        </div>

        <!-- Chat Main -->
        <div class="chat-main">
            <!-- Sidebar -->
            <div class="sidebar" id="sidebar">
                <div class="sidebar-title">📌 গ্রুপসমূহ</div>
                <div id="groupList">
                    <div class="group-item active" data-group="general">
                        <span class="group-icon">💬</span>
                        <span class="group-name">জেনারেল</span>
                        <span class="badge">5</span>
                    </div>
                    <div class="group-item" data-group="tech">
                        <span class="group-icon">💻</span>
                        <span class="group-name">টেক</span>
                    </div>
                    <div class="group-item" data-group="random">
                        <span class="group-icon">🎯</span>
                        <span class="group-name">র‍্যান্ডম</span>
                    </div>
                </div>
                <button class="create-group-btn" id="createGroupBtn">+ নতুন গ্রুপ</button>
            </div>

            <!-- Chat Area -->
            <div class="chat-area">
                <div class="chat-header">
                    <span class="chat-group-name" id="currentGroupName"># জেনারেল</span>
                    <span class="member-count" id="memberCount">👥 ০ সদস্য</span>
                </div>

                <div class="messages-container" id="messagesContainer">
                    <div style="text-align: center; color: #53768b; padding: 30px 0; font-size: 0.9rem;">
                        👋 চ্যাট শুরু করতে লগইন করুন
                    </div>
                </div>

                <div class="input-area">
                    <input 
                        type="text" 
                        id="messageInput" 
                        placeholder="মেসেজ লিখুন..." 
                        disabled
                    />
                    <button id="sendBtn" disabled>পাঠান</button>
                </div>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import {
            getAuth,
            GoogleAuthProvider,
            signInWithPopup,
            signOut,
            onAuthStateChanged
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import {
            getDatabase,
            ref,
            push,
            onChildAdded,
            set,
            get,
            child,
            update,
            onValue,
            query,
            limitToLast,
            orderByChild
        } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDZliPdFlc3iQRMGxs5-hgcDGQYNdACqm4",
            authDomain: "connectbd-4a8f2.firebaseapp.com",
            projectId: "connectbd-4a8f2",
            storageBucket: "connectbd-4a8f2.firebasestorage.app",
            messagingSenderId: "38217840543",
            appId: "1:38217840543:web:aeedd8517f697b16c12faa",
            measurementId: "G-RPBSS1M9LD"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // DOM elements
        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const loginBtn = document.getElementById('loginBtn');
        const logoutBtn = document.getElementById('logoutBtn');
        const userProfileMini = document.getElementById('userProfileMini');
        const miniAvatar = document.getElementById('miniAvatar');
        const miniName = document.getElementById('miniName');
        const groupList = document.getElementById('groupList');
        const currentGroupName = document.getElementById('currentGroupName');
        const memberCount = document.getElementById('memberCount');
        const toastEl = document.getElementById('toast');
        const createGroupBtn = document.getElementById('createGroupBtn');

        let currentUser = null;
        let currentGroup = 'general';
        let groupListeners = {};

        // Toast
        let toastTimeout = null;
        function showToast(message, type = 'success') {
            if (toastTimeout) {
                clearTimeout(toastTimeout);
                toastEl.classList.remove('show');
            }
            toastEl.textContent = message;
            toastEl.className = 'toast';
            if (type === 'error') toastEl.classList.add('error');
            void toastEl.offsetWidth;
            toastEl.classList.add('show');
            toastTimeout = setTimeout(() => {
                toastEl.classList.remove('show');
                toastTimeout = null;
            }, 3500);
        }

        // Render user profile
        function updateUI(user) {
            currentUser = user;
            if (user) {
                userProfileMini.style.display = 'flex';
                miniAvatar.src = user.photoURL || 'https://ui-avatars.com/api/?name=User&background=1976D2&color=fff';
                miniName.textContent = user.displayName || 'User';
                loginBtn.style.display = 'none';
                logoutBtn.style.display = 'inline-block';
                messageInput.disabled = false;
                sendBtn.disabled = false;
                // Load messages for current group
                loadMessages(currentGroup);
                // Update member count
                updateMemberCount(currentGroup);
            } else {
                userProfileMini.style.display = 'none';
                loginBtn.style.display = 'inline-block';
                logoutBtn.style.display = 'none';
                messageInput.disabled = true;
                sendBtn.disabled = true;
                messagesContainer.innerHTML = `
                    <div style="text-align: center; color: #53768b; padding: 30px 0; font-size: 0.9rem;">
                        👋 চ্যাট শুরু করতে লগইন করুন
                    </div>
                `;
                // Remove listeners
                Object.keys(groupListeners).forEach(key => {
                    if (groupListeners[key]) {
                        groupListeners[key]();
                        delete groupListeners[key];
                    }
                });
            }
        }

        // Load messages for a group
        function loadMessages(group) {
            // Remove old listener
            if (groupListeners[group]) {
                groupListeners[group]();
                delete groupListeners[group];
            }

            const messagesRef = query(
                ref(db, `groups/${group}/messages`),
                orderByChild('timestamp'),
                limitToLast(50)
            );

            // Clear container but keep placeholder
            messagesContainer.innerHTML = '';

            const listener = onChildAdded(messagesRef, (snapshot) => {
                const msg = snapshot.val();
                const msgKey = snapshot.key;
                if (!msg) return;

                // Check if message already exists in DOM (avoid duplicates)
                const existing = messagesContainer.querySelector(`[data-key="${msgKey}"]`);
                if (existing) return;

                const isOwn = msg.uid === currentUser?.uid;
                const time = msg.timestamp ? new Date(msg.timestamp).toLocaleTimeString('bn-BD', { hour: '2-digit', minute: '2-digit' }) : '';

                const div = document.createElement('div');
                div.className = `message ${isOwn ? 'own' : ''}`;
                div.dataset.key = msgKey;

                const avatar = msg.photoURL || 'https://ui-avatars.com/api/?name=' + encodeURIComponent(msg.displayName || 'U') + '&background=1976D2&color=fff';

                div.innerHTML = `
                    <img src="${avatar}" alt="avatar" class="msg-avatar" />
                    <div class="msg-bubble">
                        <div class="msg-sender">${isOwn ? 'আপনি' : (msg.displayName || 'ইউজার')}</div>
                        <div class="msg-text">${msg.text}</div>
                        <div class="msg-time">${time}</div>
                    </div>
                `;

                messagesContainer.appendChild(div);
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
            });

            groupListeners[group] = () => {
                listener();
            };

            // Also load member count
            updateMemberCount(group);
        }

        // Update member count
        function updateMemberCount(group) {
            const membersRef = ref(db, `groups/${group}/members`);
            onValue(membersRef, (snapshot) => {
                const members = snapshot.val();
                const count = members ? Object.keys(members).length : 0;
                memberCount.textContent = `👥 ${count} সদস্য`;
            }, { onlyOnce: true });
        }

        // Send message
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || !currentUser || !currentGroup) return;

            const messagesRef = ref(db, `groups/${currentGroup}/messages`);
            const newMsgRef = push(messagesRef);

            await set(newMsgRef, {
                text: text,
                uid: currentUser.uid,
                displayName: currentUser.displayName || 'ইউজার',
                photoURL: currentUser.photoURL || '',
                timestamp: Date.now()
            });

            // Update member presence
            const memberRef = ref(db, `groups/${currentGroup}/members/${currentUser.uid}`);
            await set(memberRef, {
                displayName: currentUser.displayName || 'ইউজার',
                photoURL: currentUser.photoURL || '',
                lastSeen: Date.now()
            });

            messageInput.value = '';
            messageInput.focus();
        }

        // Group switching
        groupList.addEventListener('click', (e) => {
            const item = e.target.closest('.group-item');
            if (!item) return;
            const group = item.dataset.group;
            if (!group || group === currentGroup) return;

            // Update active state
            document.querySelectorAll('.group-item').forEach(el => el.classList.remove('active'));
            item.classList.add('active');

            currentGroup = group;
            currentGroupName.textContent = `# ${group.charAt(0).toUpperCase() + group.slice(1)}`;
            
            if (currentUser) {
                loadMessages(group);
            }
        });

        // Create new group
        createGroupBtn.addEventListener('click', () => {
            const name = prompt('নতুন গ্রুপের নাম লিখুন (ইংরেজি):');
            if (!name) return;
            const cleanName = name.trim().toLowerCase().replace(/\s+/g, '_');
            if (!cleanName) return;

            const groupRef = ref(db, `groups/${cleanName}`);
            get(groupRef).then((snapshot) => {
                if (snapshot.exists()) {
                    showToast('এই নামে গ্রুপ ইতিমধ্যে আছে!', 'error');
                    return;
                }

                // Create group
                set(groupRef, {
                    name: cleanName,
                    createdAt: Date.now(),
                    createdBy: currentUser?.uid || 'anonymous'
                }).then(() => {
                    // Add to group list
                    const groupItem = document.createElement('div');
                    groupItem.className = 'group-item';
                    groupItem.dataset.group = cleanName;
                    groupItem.innerHTML = `
                        <span class="group-icon">📢</span>
                        <span class="group-name">${name}</span>
                    `;
                    groupList.appendChild(groupItem);
                    showToast(`"${name}" গ্রুপ তৈরি হয়েছে! 🎉`);
                    
                    // Switch to new group
                    groupItem.click();
                });
            });
        });

        // Login
        loginBtn.onclick = async () => {
            const provider = new GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            try {
                const result = await signInWithPopup(auth, provider);
                showToast(`স্বাগতম ${result.user.displayName || 'ইউজার'}! 🎉`);
            } catch (error) {
                if (error.code !== 'auth/popup-closed-by-user') {
                    showToast(`লগইন ব্যর্থ: ${error.message}`, 'error');
                }
            }
        };

        // Logout
        logoutBtn.onclick = async () => {
            try {
                await signOut(auth);
                showToast('সাইন আউট করা হয়েছে।');
            } catch (error) {
                showToast(`সাইন আউট ব্যর্থ: ${error.message}`, 'error');
            }
        };

        // Send on enter or button click
        sendBtn.onclick = sendMessage;
        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        // Auth state
        onAuthStateChanged(auth, (user) => {
            updateUI(user);
        });

        // Auto-load general group messages if user already logged in
        setTimeout(() => {
            if (currentUser) {
                loadMessages('general');
            }
        }, 500);

        console.log('🔥 ConnectBD Chat ready');
    </script>
</body>
</html>
